<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>星链导航后台管理</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 16px;
            color: #1e293b;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        h1 {
            font-size: 1.5rem;
            margin: 0;
        }
        .token-area {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        input, select, textarea {
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        button.danger {
            background: #ef4444;
        }
        button.danger:hover {
            background: #dc2626;
        }
        button.secondary {
            background: #64748b;
        }
        .category-item, .subcategory-item, .site-item {
            border-left: 2px solid #e2e8f0;
            margin-left: 16px;
            padding-left: 16px;
            margin-top: 8px;
        }
        .item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .item-info {
            flex: 1;
            font-weight: 500;
            word-break: break-all;
        }
        .item-actions {
            display: flex;
            gap: 6px;
        }
        .item-actions button {
            padding: 4px 8px;
            font-size: 12px;
        }
        .form-row {
            margin-bottom: 12px;
        }
        .form-row label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #475569;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
        .hidden {
            display: none;
        }
        .tree-root {
            margin-top: 12px;
        }
        .tree-item {
            margin-bottom: 12px;
        }
        .tree-title {
            font-weight: 600;
            margin-bottom: 6px;
        }
        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .item-header {
                flex-direction: column;
                align-items: stretch;
            }
            .item-actions {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📋 导航管理</h1>
            <div class="token-area">
                <input type="password" id="tokenInput" placeholder="管理Token" style="width: 140px;">
                <button id="loginBtn">登录</button>
                <button id="logoutBtn" class="secondary hidden">退出</button>
            </div>
        </div>
        <div id="status"></div>
    </div>

    <div id="mainContent" class="hidden">
        <!-- 分类管理区域 -->
        <div class="card">
            <div class="header">
                <h2>📁 一级分类</h2>
                <button id="addCategoryBtn">+ 添加分类</button>
            </div>
            <div id="categoriesList"></div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'https://api.xldh688.eu.cc';
    let token = localStorage.getItem('admin_token') || '';

    // 通用 fetch 封装，自动携带 Authorization
    async function apiFetch(endpoint, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers,
        };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        const res = await fetch(`${API_BASE}${endpoint}`, {
            ...options,
            headers,
        });
        if (res.status === 401) {
            alert('Token 无效或已过期，请重新登录');
            logout();
            throw new Error('Unauthorized');
        }
        if (!res.ok) {
            const text = await res.text();
            throw new Error(text || `HTTP ${res.status}`);
        }
        return res.json();
    }

    // 显示状态信息
    function showStatus(msg, isError = false) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.style.color = isError ? '#ef4444' : '#10b981';
        setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
    }

    // 登录
    function login() {
        const inputToken = document.getElementById('tokenInput').value.trim();
        if (!inputToken) {
            alert('请输入管理 Token');
            return;
        }
        token = inputToken;
        localStorage.setItem('admin_token', token);
        document.getElementById('loginBtn').classList.add('hidden');
        document.getElementById('logoutBtn').classList.remove('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        loadAllData();
        showStatus('登录成功');
    }

    function logout() {
        token = '';
        localStorage.removeItem('admin_token');
        document.getElementById('loginBtn').classList.remove('hidden');
        document.getElementById('logoutBtn').classList.add('hidden');
        document.getElementById('mainContent').classList.add('hidden');
        showStatus('已退出登录');
    }

    // 加载所有数据
    let categories = [];
    let subcategories = [];
    let sites = [];

    async function loadAllData() {
        try {
            const [cats, subs, sits] = await Promise.all([
                apiFetch('/admin/categories'),
                apiFetch('/admin/subcategories'),
                apiFetch('/admin/sites'),
            ]);
            categories = cats;
            subcategories = subs;
            sites = sits;
            renderCategories();
        } catch (err) {
            console.error(err);
            showStatus('加载数据失败: ' + err.message, true);
        }
    }

    // 渲染分类树
    function renderCategories() {
        const container = document.getElementById('categoriesList');
        if (!categories.length) {
            container.innerHTML = '<div class="loading">暂无分类，请先添加</div>';
            return;
        }
        let html = '';
        for (const cat of categories) {
            const catSubs = subcategories.filter(s => s.category_id === cat.id);
            html += `
                <div class="tree-item" data-cat-id="${cat.id}">
                    <div class="item-header">
                        <div class="item-info">
                            <strong>${escapeHtml(cat.name)}</strong>
                            ${cat.icon ? ` <span style="font-size:12px;color:#666;">(${cat.icon})</span>` : ''}
                            ${cat.description ? `<br><span style="font-size:12px;color:#666;">${escapeHtml(cat.description)}</span>` : ''}
                        </div>
                        <div class="item-actions">
                            <button class="edit-cat" data-id="${cat.id}">编辑</button>
                            <button class="delete-cat danger" data-id="${cat.id}">删除</button>
                            <button class="add-sub" data-cat-id="${cat.id}">+ 子分类</button>
                        </div>
                    </div>
                    <div class="category-item">
                        ${catSubs.map(sub => renderSubcategory(sub, cat.id)).join('')}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        // 绑定事件
        document.querySelectorAll('.edit-cat').forEach(btn => {
            btn.addEventListener('click', () => editCategory(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.delete-cat').forEach(btn => {
            btn.addEventListener('click', () => deleteCategory(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.add-sub').forEach(btn => {
            btn.addEventListener('click', () => addSubcategory(parseInt(btn.dataset.catId)));
        });
        document.querySelectorAll('.edit-sub').forEach(btn => {
            btn.addEventListener('click', () => editSubcategory(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.delete-sub').forEach(btn => {
            btn.addEventListener('click', () => deleteSubcategory(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.add-site').forEach(btn => {
            btn.addEventListener('click', () => addSite(parseInt(btn.dataset.subId)));
        });
        document.querySelectorAll('.edit-site').forEach(btn => {
            btn.addEventListener('click', () => editSite(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.delete-site').forEach(btn => {
            btn.addEventListener('click', () => deleteSite(parseInt(btn.dataset.id)));
        });
    }

    function renderSubcategory(sub, catId) {
        const subSites = sites.filter(s => s.subcategory_id === sub.id);
        return `
            <div class="tree-item" style="margin-left: 16px;" data-sub-id="${sub.id}">
                <div class="item-header">
                    <div class="item-info">
                        📂 ${escapeHtml(sub.name)}
                    </div>
                    <div class="item-actions">
                        <button class="edit-sub" data-id="${sub.id}">编辑</button>
                        <button class="delete-sub danger" data-id="${sub.id}">删除</button>
                        <button class="add-site" data-sub-id="${sub.id}">+ 网站</button>
                    </div>
                </div>
                <div class="subcategory-item">
                    ${subSites.map(site => renderSite(site)).join('')}
                </div>
            </div>
        `;
    }

    function renderSite(site) {
        return `
            <div class="tree-item" style="margin-left: 32px;" data-site-id="${site.id}">
                <div class="item-header">
                    <div class="item-info">
                        🔗 <strong>${escapeHtml(site.title)}</strong><br>
                        <span style="font-size:12px;color:#666;">${escapeHtml(site.url)}</span>
                        ${site.description ? `<span style="font-size:12px;color:#666;"> - ${escapeHtml(site.description)}</span>` : ''}
                        ${site.icon ? `<span style="font-size:12px;color:#666;"> (${escapeHtml(site.icon)})</span>` : ''}
                    </div>
                    <div class="item-actions">
                        <button class="edit-site" data-id="${site.id}">编辑</button>
                        <button class="delete-site danger" data-id="${site.id}">删除</button>
                    </div>
                </div>
            </div>
        `;
    }

    // 增删改分类
    async function addCategory() {
        const name = prompt('分类名称（必填）');
        if (!name) return;
        const icon = prompt('图标（FontAwesome类名或图片URL，可选）', 'fas fa-folder');
        const description = prompt('描述（可选）', '');
        const display_order = prompt('显示顺序（数字，越小越靠前）', categories.length);
        try {
            await apiFetch('/admin/categories', {
                method: 'POST',
                body: JSON.stringify({ name, icon, description, display_order: parseInt(display_order) || 0 })
            });
            showStatus('添加成功');
            loadAllData();
        } catch (err) {
            showStatus('添加失败: ' + err.message, true);
        }
    }

    async function editCategory(id) {
        const cat = categories.find(c => c.id === id);
        if (!cat) return;
        const name = prompt('新分类名称', cat.name);
        if (name === null) return;
        const icon = prompt('图标', cat.icon || '');
        const description = prompt('描述', cat.description || '');
        const display_order = prompt('显示顺序', cat.display_order);
        try {
            await apiFetch(`/admin/categories/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ name, icon, description, display_order: parseInt(display_order) })
            });
            showStatus('修改成功');
            loadAllData();
        } catch (err) {
            showStatus('修改失败: ' + err.message, true);
        }
    }

    async function deleteCategory(id) {
        if (!confirm('删除分类将同时删除其所有子分类和网站，确定吗？')) return;
        try {
            await apiFetch(`/admin/categories/${id}`, { method: 'DELETE' });
            showStatus('删除成功');
            loadAllData();
        } catch (err) {
            showStatus('删除失败: ' + err.message, true);
        }
    }

    // 子分类操作
    async function addSubcategory(categoryId) {
        const name = prompt('子分类名称（必填）');
        if (!name) return;
        const display_order = prompt('显示顺序', 0);
        try {
            await apiFetch('/admin/subcategories', {
                method: 'POST',
                body: JSON.stringify({ category_id: categoryId, name, display_order: parseInt(display_order) })
            });
            showStatus('添加成功');
            loadAllData();
        } catch (err) {
            showStatus('添加失败: ' + err.message, true);
        }
    }

    async function editSubcategory(id) {
        const sub = subcategories.find(s => s.id === id);
        if (!sub) return;
        const name = prompt('新子分类名称', sub.name);
        if (name === null) return;
        const display_order = prompt('显示顺序', sub.display_order);
        try {
            await apiFetch(`/admin/subcategories/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ name, display_order: parseInt(display_order) })
            });
            showStatus('修改成功');
            loadAllData();
        } catch (err) {
            showStatus('修改失败: ' + err.message, true);
        }
    }

    async function deleteSubcategory(id) {
        if (!confirm('删除子分类将同时删除其下所有网站，确定吗？')) return;
        try {
            await apiFetch(`/admin/subcategories/${id}`, { method: 'DELETE' });
            showStatus('删除成功');
            loadAllData();
        } catch (err) {
            showStatus('删除失败: ' + err.message, true);
        }
    }

    // 网站操作
    async function addSite(subcategoryId) {
        const title = prompt('网站标题（必填）');
        if (!title) return;
        const url = prompt('网站URL（必填，包含https://）');
        if (!url) return;
        const description = prompt('描述', '');
        const icon = prompt('图标（图片URL或FontAwesome类名）', 'fas fa-link');
        const display_order = prompt('显示顺序', 0);
        try {
            await apiFetch('/admin/sites', {
                method: 'POST',
                body: JSON.stringify({ subcategory_id: subcategoryId, title, url, description, icon, display_order: parseInt(display_order) })
            });
            showStatus('添加成功');
            loadAllData();
        } catch (err) {
            showStatus('添加失败: ' + err.message, true);
        }
    }

    async function editSite(id) {
        const site = sites.find(s => s.id === id);
        if (!site) return;
        const title = prompt('新标题', site.title);
        if (title === null) return;
        const url = prompt('新URL', site.url);
        const description = prompt('新描述', site.description);
        const icon = prompt('新图标', site.icon);
        const display_order = prompt('显示顺序', site.display_order);
        try {
            await apiFetch(`/admin/sites/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ title, url, description, icon, display_order: parseInt(display_order) })
            });
            showStatus('修改成功');
            loadAllData();
        } catch (err) {
            showStatus('修改失败: ' + err.message, true);
        }
    }

    async function deleteSite(id) {
        if (!confirm('确定删除该网站？')) return;
        try {
            await apiFetch(`/admin/sites/${id}`, { method: 'DELETE' });
            showStatus('删除成功');
            loadAllData();
        } catch (err) {
            showStatus('删除失败: ' + err.message, true);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 初始化
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('addCategoryBtn').addEventListener('click', addCategory);

    // 如果已有 token，自动登录
    if (token) {
        document.getElementById('tokenInput').value = token;
        login();
    }
</script>
</body>
</html>
