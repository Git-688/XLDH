<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>星链导航后台管理</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#f7f8fa;font-size:13px;color:#2f3542;
            -webkit-font-smoothing:antialiased;
            padding:12px;
        }
        ::-webkit-scrollbar{display:none}
        *{-ms-overflow-style:none;scrollbar-width:none}

        .container{max-width:900px;margin:0 auto;width:100%}
        .card{
            background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;
            box-shadow:0 2px 12px rgba(0,0,0,0.05);border:1px solid #f1f3f5
        }
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
        .tool-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
        
        h1{font-size:18px;font-weight:600;color:#1e293b}
        h2{font-size:16px;font-weight:600;color:#334155}

        input,select{
            padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;
            font-size:13px;width:100%;background:#fafbfc;outline:none;
            transition:all .2s
        }
        input:focus,select:focus{border-color:#3b82f6;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
        .form-row{margin-bottom:14px}
        .form-row label{font-size:12px;color:#64748b;margin-bottom:6px;display:block}

        button{
            border:none;border-radius:8px;padding:8px 12px;
            font-size:13px;cursor:pointer;transition:all .2s;
            display:inline-flex;align-items:center;justify-content:center;
            font-weight:500
        }
        button:disabled{opacity:0.6;cursor:not-allowed}
        button.primary{background:#3b82f6;color:#fff}
        button.primary:hover{background:#2563eb}
        button.danger{background:#ef4444;color:#fff}
        button.secondary{background:#64748b;color:#fff}
        button.text{background:transparent;color:#64748b;padding:5px 8px}
        button.text:hover{color:#3b82f6}
        button.sm{padding:5px 8px;font-size:12px}

        .search-box{flex:1;min-width:180px;max-width:280px}
        .badge{padding:3px 8px;background:#e0f2fe;border-radius:6px;font-size:11px;color:#0369a1}
        .badge-danger{background:#fee2e2;color:#dc2626}

        .tree-item{margin-bottom:12px}
        .item-header{
            display:flex;justify-content:space-between;align-items:center;
            padding:11px 14px;border-radius:10px;background:#f8fafc;gap:10px;
            transition:all .2s;flex-wrap:wrap
        }
        .item-header:hover{background:#f1f5f9}
        .item-info{flex:1;font-weight:500;word-break:break-all;display:flex;align-items:center;gap:8px;min-width:200px}
        .item-info span{font-size:12px;color:#64748b}
        .item-actions{display:flex;gap:6px;flex-wrap:wrap}
        
        .category-item,.subcategory-item{
            border-left:2px solid #e2e8f0;margin-left:14px;padding-left:14px;margin-top:8px;
            overflow:hidden;transition:all 0.25s ease;
        }
        .folded{max-height:0;padding:0;margin:0;border:none}

        .modal{
            position:fixed;inset:0;background:rgba(0,0,0,0.25);
            display:flex;align-items:center;justify-content:center;
            z-index:99;opacity:0;visibility:hidden;transition:all .2s
        }
        .modal.show{opacity:1;visibility:visible}
        .modal-body{
            background:#fff;border-radius:14px;width:94%;max-width:460px;
            padding:22px;max-height:80vh;overflow-y:auto
        }
        .modal-title{font-size:16px;font-weight:600;margin-bottom:16px;color:#1e293b}
        .modal-buttons{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

        .toast{
            position:fixed;bottom:24px;left:50%;transform:translate(-50%,12px);
            padding:9px 18px;border-radius:8px;font-size:13px;color:#fff;
            z-index:999;opacity:0;visibility:hidden;transition:all .25s ease;
            box-shadow:0 4px 16px rgba(0,0,0,0.15)
        }
        .toast.show{opacity:1;visibility:visible;transform:translate(-50%,0)}
        .toast.success{background:#10b981}
        .toast.error{background:#ef4444}
        .toast.warn{background:#f59e0b}

        .log-item{padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:12px;color:#64748b}
        .log-time{color:#94a3b8;margin-right:8px}
        .empty{text-align:center;padding:24px;color:#94a3b8;font-size:13px}
        .check-result{padding:10px;border-radius:8px;background:#f8fafc;margin-top:10px;font-size:12px}
        .hidden{display:none!important}

        /* 响应式适配 */
        @media (max-width:768px){
            .tool-bar{gap:6px}
            .item-info{min-width:150px}
            button{padding:6px 10px;font-size:12px}
            .card{padding:14px}
        }
        @media (max-width:480px){
            body{padding:8px}
            .header{gap:8px}
            #tokenInput{width:110px}
            .item-actions{gap:4px}
        }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- 编辑/新增模态框 -->
<div class="modal" id="modal">
    <div class="modal-body">
        <div class="modal-title" id="modalTitle"></div>
        <div id="modalForm"></div>
        <div class="modal-buttons">
            <button class="secondary" onclick="closeModal()">取消</button>
            <button class="primary" id="modalSubmit">确认</button>
        </div>
    </div>
</div>

<!-- 操作日志模态框 -->
<div class="modal" id="logModal">
    <div class="modal-body" style="max-width:580px">
        <div class="modal-title">操作日志</div>
        <div id="logList" style="max-height:360px;overflow-y:auto"></div>
        <div class="modal-buttons"><button class="primary" onclick="closeLogModal()">关闭</button></div>
    </div>
</div>

<!-- 死链检测模态框 -->
<div class="modal" id="checkModal">
    <div class="modal-body" style="max-width:600px">
        <div class="modal-title">死链检测</div>
        <div id="checkResult" class="check-result"></div>
        <div class="modal-buttons"><button class="primary" onclick="closeCheckModal()">关闭</button></div>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>📋 导航管理</h1>
            <div style="display:flex;gap:10px;align-items:center">
                <input type="password" id="tokenInput" placeholder="管理Token" style="width:150px" autocomplete="off">
                <button class="primary" id="loginBtn">登录</button>
                <button class="secondary hidden" id="logoutBtn">退出</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="card">
            <div class="header">
                <h2>📁 分类管理</h2>
                <div class="tool-bar">
                    <input type="text" class="search-box" id="searchInput" placeholder="搜索标题/链接/描述...">
                    <button class="text sm" id="expandAll">全部展开</button>
                    <button class="text sm" id="foldAll">全部收起</button>
                    <button class="text sm" id="logBtn">操作日志</button>
                    <button class="text sm" id="exportBtn">备份导出</button>
                    <button class="primary sm" id="addCategoryBtn">+ 新增分类</button>
                </div>
            </div>
            <div id="categoriesList"></div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'https://api.xldh688.eu.cc';
    let token = localStorage.getItem('admin_token') || '';
    let modalAction = null;
    let categories = [], subcategories = [], sites = [];
    let failCount = parseInt(localStorage.getItem('login_fail_count') || 0);
    let lockTime = localStorage.getItem('login_lock_time') || 0;
    const TOKEN_EXPIRE_HOURS = 24;
    const IP_WHITELIST = ['127.0.0.1', '112.96.123.9'];

    // 提示框
    const toast = document.getElementById('toast');
    function showToast(msg, type = 'success') {
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.classList.remove('show'), 2300);
    }

    // 模态框控制
    function closeModal() { document.getElementById('modal').classList.remove('show'); modalAction = null; }
    function closeLogModal() { document.getElementById('logModal').classList.remove('show'); }
    function closeCheckModal() { document.getElementById('checkModal').classList.remove('show'); }

    // 操作日志
    function addLog(text) {
        const logs = JSON.parse(localStorage.getItem('operation_logs') || '[]');
        logs.unshift({ time: new Date().toLocaleString(), text });
        if (logs.length > 50) logs.splice(50);
        localStorage.setItem('operation_logs', JSON.stringify(logs));
    }
    function showLogs() {
        const logs = JSON.parse(localStorage.getItem('operation_logs') || '[]');
        const list = document.getElementById('logList');
        list.innerHTML = logs.length ? logs.map(i => `<div class="log-item"><span class="log-time">${i.time}</span>${i.text}</div>`).join('') : '<div class="empty">暂无操作记录</div>';
        document.getElementById('logModal').classList.add('show');
    }

    // API请求
    async function apiFetch(endpoint, opt = {}) {
        const headers = { 'Content-Type': 'application/json', ...opt.headers };
        if (token) headers.Authorization = `Bearer ${token}`;
        const res = await fetch(API_BASE + endpoint, { ...opt, headers });
        if(res.status === 401) throw new Error('Unauthorized');
        if(!res.ok) throw new Error(await res.text() || '请求失败');
        return res.json();
    }

    // IP白名单
    async function checkIP() {
        try {
            const {ip} = await (await fetch('https://api.ipify.org?format=json')).json();
            return IP_WHITELIST.includes(ip);
        } catch {return true;}
    }

    // 登录锁定
    function checkLock() {
        if(Date.now() < lockTime){showToast('登录失败过多，锁定10分钟','error');return false;}
        if(failCount >=5){localStorage.setItem('login_lock_time',Date.now()+600000);showToast('失败5次，锁定10分钟','error');return false;}
        return true;
    }

    // Token过期
    function checkTokenExpire() {
        const t = localStorage.getItem('login_time');
        if(!t)return;
        if(Date.now()-t > TOKEN_EXPIRE_HOURS*3600000){showToast('Token已过期','warn');logout();}
        else if(Date.now()-t > TOKEN_EXPIRE_HOURS*3600000*0.9){showToast('Token即将过期','warn');}
    }

    // 登录
    async function login() {
        if(!checkLock())return;
        if(!await checkIP()){showToast('当前IP无权限','error');return;}
        const ipt = document.getElementById('tokenInput'), btn = document.getElementById('loginBtn');
        const val = ipt.value.trim();
        if(!val){showToast('请输入Token','error');return;}
        btn.disabled=1;btn.textContent='登录中…';token=val;
        try{
            await apiFetch('/admin/categories');
            localStorage.setItem('admin_token',token);localStorage.setItem('login_time',Date.now());
            localStorage.setItem('login_fail_count',0);failCount=0;
            ipt.style.display='none';
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            await loadAllData();addLog('管理员登录');showToast('登录成功');
        }catch(e){
            token='';failCount++;localStorage.setItem('login_fail_count',failCount);
            showToast('Token无效','error');
        }finally{btn.disabled=0;btn.textContent='登录';}
    }

    // 退出
    function logout() {
        token='';localStorage.clear();
        document.getElementById('loginBtn').classList.remove('hidden');
        document.getElementById('logoutBtn').classList.add('hidden');
        document.getElementById('mainContent').classList.add('hidden');
        document.getElementById('tokenInput').style.display='block';
        document.getElementById('tokenInput').value='';
        addLog('退出登录');showToast('已退出');
    }

    // 折叠控制（一级+二级分类）
    function toggleCat(id){document.querySelector(`.tree-item[data-cat="${id}"] .category-item`).classList.toggle('folded');}
    function toggleSub(id){document.querySelector(`.tree-item[data-sub="${id}"] .subcategory-item`).classList.toggle('folded');}
    function expandAll(){document.querySelectorAll('.category-item,.subcategory-item').forEach(e=>e.classList.remove('folded'));}
    function foldAll(){document.querySelectorAll('.category-item,.subcategory-item').forEach(e=>e.classList.add('folded'));}

    // ICO图标接口（新接口）
    function getFavicon(url){
        try{new URL(url);return `https://api.kuleu.com/api/ico?url=${encodeURIComponent(url)}`;}
        catch{return 'fas fa-link';}
    }

    // 链接格式验证
    function checkUrl(url){try{new URL(url);return true;}catch{return false;}}

    // 死链检测（山河接口）
    async function checkDeadLink(siteId){
        const s = sites.find(x=>x.id===siteId);
        if(!s)return;
        const resBox = document.getElementById('checkResult');
        resBox.innerHTML = '检测中，请稍候...';
        document.getElementById('checkModal').classList.add('show');
        try{
            const u = encodeURIComponent(s.url);
            const res = await fetch(`http://shanhe.kim/api/wz/wzhttp.php?url=${u}`);
            const text = await res.text();
            resBox.innerHTML = text.replace(/404|5\d{2}/g, m=>`<span class="badge badge-danger">${m}</span>`);
            addLog(`检测链接：${s.title}`);
        }catch(e){
            resBox.innerHTML = '检测失败，接口异常';
            showToast('检测失败','error');
        }
    }

    // 搜索
    function doSearch(){
        const kw = document.getElementById('searchInput').value.toLowerCase().trim();
        if(!kw){renderAll();return;}
        let html='';
        for(const c of categories){
            const subs = subcategories.filter(s=>s.category_id===c.id);
            const mc = c.name.toLowerCase().includes(kw);
            let sh='';
            for(const s of subs){
                const sts = sites.filter(x=>x.subcategory_id===s.id);
                const ms = s.name.toLowerCase().includes(kw);
                let st='';
                for(const site of sts){
                    const msite = site.title.toLowerCase().includes(kw)||site.url.toLowerCase().includes(kw)||(site.description||'').toLowerCase().includes(kw);
                    if(msite||ms||mc)st+=renderSite(site);
                }
                if((ms||mc||st)&&subs.length)sh+=renderSub(s,st);
            }
            if((mc||sh)&&categories.length)html+=renderCat(c,sh);
        }
        document.getElementById('categoriesList').innerHTML=html||'<div class="empty">无匹配结果</div>';
        bind();
    }

    // 导出备份
    function exportData(){
        const blob = new Blob([JSON.stringify({categories,subcategories,sites,time:new Date().toLocaleString()},null,2)],{type:'application/json'});
        const a = document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`导航备份_${new Date().getTime()}.json`;a.click();
        addLog('导出数据备份');showToast('导出成功');
    }

    // 加载数据
    async function loadAllData(){
        checkTokenExpire();
        try{
            const [a,b,c] = await Promise.all([apiFetch('/admin/categories'),apiFetch('/admin/subcategories'),apiFetch('/admin/sites')]);
            categories=a;subcategories=b;sites=c;renderAll();
        }catch(e){
            if(e.message==='Unauthorized'){showToast('Token失效','warn');logout();}
            else showToast('加载失败','error');
        }
    }

    function esc(s){return s?s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])):'';}

    // 渲染
    function renderCat(c,subHtml){
        return `
        <div class="tree-item" data-cat="${c.id}">
            <div class="item-header">
                <div class="item-info">
                    <button class="text" onclick="toggleCat(${c.id})">▼</button>
                    ${esc(c.name)} ${c.icon?`<span>(${esc(c.icon)})</span>`:''}
                </div>
                <div class="item-actions">
                    <button class="primary edit-cat" data-id="${c.id}">编辑</button>
                    <button class="danger del-cat" data-id="${c.id}">删除</button>
                    <button class="primary add-sub" data-cid="${c.id}">+子分类</button>
                </div>
            </div>
            <div class="category-item">${subHtml}</div>
        </div>`;
    }

    function renderSub(sub,siteHtml){
        const sts = siteHtml || sites.filter(s=>s.subcategory_id===sub.id).map(s=>renderSite(s)).join('');
        return `
        <div class="tree-item" data-sub="${sub.id}">
            <div class="item-header">
                <div class="item-info">
                    <button class="text" onclick="toggleSub(${sub.id})">▼</button>
                    📂 ${esc(sub.name)}
                </div>
                <div class="item-actions">
                    <button class="primary edit-sub" data-id="${sub.id}">编辑</button>
                    <button class="danger del-sub" data-id="${sub.id}">删除</button>
                    <button class="primary add-site" data-sid="${sub.id}">+网站</button>
                </div>
            </div>
            <div class="subcategory-item">${sts}</div>
        </div>`;
    }

    function renderSite(s){
        return `
        <div class="tree-item" data-site="${s.id}">
            <div class="item-header">
                <div class="item-info">
                    🔗 ${esc(s.title)}<br><span>${esc(s.url)}</span>
                    <span class="badge">点击：${s.click || 0}</span>
                </div>
                <div class="item-actions">
                    <button class="primary sm check-link" data-id="${s.id}">检测死链</button>
                    <button class="primary edit-site" data-id="${s.id}">编辑</button>
                    <button class="danger del-site" data-id="${s.id}">删除</button>
                </div>
            </div>
        </div>`;
    }

    function renderAll(){
        const el = document.getElementById('categoriesList');
        if(!categories.length){el.innerHTML='<div class="empty">暂无分类</div>';return;}
        el.innerHTML = categories.map(c=>renderCat(c,subcategories.filter(s=>s.category_id===c.id).map(s=>renderSub(s)).join(''))).join('');
        bind();
    }

    // 事件绑定
    function bind(){
        document.querySelectorAll('.edit-cat').forEach(b=>b.onclick=()=>openEditCat(+b.dataset.id));
        document.querySelectorAll('.del-cat').forEach(b=>b.onclick=()=>delCat(+b.dataset.id));
        document.querySelectorAll('.add-sub').forEach(b=>b.onclick=()=>openAddSub(+b.dataset.cid));
        document.querySelectorAll('.edit-sub').forEach(b=>b.onclick=()=>openEditSub(+b.dataset.id));
        document.querySelectorAll('.del-sub').forEach(b=>b.onclick=()=>delSub(+b.dataset.id));
        document.querySelectorAll('.add-site').forEach(b=>b.onclick=()=>openAddSite(+b.dataset.sid));
        document.querySelectorAll('.edit-site').forEach(b=>b.onclick=()=>openEditSite(+b.dataset.id));
        document.querySelectorAll('.del-site').forEach(b=>b.onclick=()=>delSite(+b.dataset.id));
        document.querySelectorAll('.check-link').forEach(b=>b.onclick=()=>checkDeadLink(+b.dataset.id));
    }

    // 分类操作
    function openAddCat(){
        openModal('新增分类',`
            <div class="form-row"><label>名称</label><input id="name"></div>
            <div class="form-row"><label>图标</label><input id="icon" placeholder="fas fa-folder"></div>
            <div class="form-row"><label>描述</label><input id="desc"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="${categories.length}"></div>
        `,async()=>{
            const name=document.getElementById('name').value.trim();
            if(!name){showToast('请填名称','error');return;}
            await apiFetch('/admin/categories',{method:'POST',body:JSON.stringify({
                name,icon:document.getElementById('icon').value,
                description:document.getElementById('desc').value,
                display_order:+document.getElementById('sort').value||0
            })});
            addLog(`新增分类：${name}`);showToast('添加成功');loadAllData();closeModal();
        })
    }
    function openEditCat(id){
        const c = categories.find(x=>x.id===id);
        openModal('编辑分类',`
            <div class="form-row"><label>名称</label><input id="name" value="${esc(c.name)}"></div>
            <div class="form-row"><label>图标</label><input id="icon" value="${esc(c.icon||'')}"></div>
            <div class="form-row"><label>描述</label><input id="desc" value="${esc(c.description||'')}"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="${c.display_order}"></div>
        `,async()=>{
            await apiFetch(`/admin/categories/${id}`,{method:'PUT',body:JSON.stringify({
                name:document.getElementById('name').value,icon:document.getElementById('icon').value,
                description:document.getElementById('desc').value,display_order:+document.getElementById('sort').value
            })});
            addLog(`编辑分类：${c.name}`);showToast('修改成功');loadAllData();closeModal();
        })
    }
    async function delCat(id){if(!confirm('删除该分类及所有内容？'))return;
        await apiFetch(`/admin/categories/${id}`,{method:'DELETE'});
        addLog(`删除分类：${id}`);showToast('删除成功');loadAllData();
    }

    // 子分类
    function openAddSub(cid){
        openModal('新增子分类',`
            <div class="form-row"><label>名称</label><input id="name"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="0"></div>
        `,async()=>{
            const name=document.getElementById('name').value.trim();
            if(!name){showToast('请填名称','error');return;}
            await apiFetch('/admin/subcategories',{method:'POST',body:JSON.stringify({
                category_id:cid,name,display_order:+document.getElementById('sort').value||0
            })});
            addLog(`新增子分类：${name}`);showToast('添加成功');loadAllData();closeModal();
        })
    }
    function openEditSub(id){
        const s=subcategories.find(x=>x.id===id);
        openModal('编辑子分类',`
            <div class="form-row"><label>名称</label><input id="name" value="${esc(s.name)}"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="${s.display_order}"></div>
        `,async()=>{
            await apiFetch(`/admin/subcategories/${id}`,{method:'PUT',body:JSON.stringify({
                name:document.getElementById('name').value,display_order:+document.getElementById('sort').value
            })});
            addLog(`编辑子分类：${s.name}`);showToast('修改成功');loadAllData();closeModal();
        })
    }
    async function delSub(id){if(!confirm('删除该子分类及网站？'))return;
        await apiFetch(`/admin/subcategories/${id}`,{method:'DELETE'});
        addLog(`删除子分类：${id}`);showToast('删除成功');loadAllData();
    }

    // 网站
    function openAddSite(sid){
        openModal('新增网站',`
            <div class="form-row"><label>标题</label><input id="title"></div>
            <div class="form-row"><label>网址</label><input id="url" oninput="autoGetIcon()"></div>
            <div class="form-row"><label>图标</label><input id="icon" value="fas fa-link"></div>
            <div class="form-row"><label>描述</label><input id="desc"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="0"></div>
        `,async()=>{
            const t=document.getElementById('title').value,u=document.getElementById('url').value;
            if(!t||!u){showToast('标题/网址必填','error');return;}
            if(!checkUrl(u)){showToast('网址格式错误','error');return;}
            await apiFetch('/admin/sites',{method:'POST',body:JSON.stringify({
                subcategory_id:sid,title:t,url:u,description:document.getElementById('desc').value,
                icon:document.getElementById('icon').value,display_order:+document.getElementById('sort').value||0
            })});
            addLog(`新增网站：${t}`);showToast('添加成功');loadAllData();closeModal();
        })
    }
    function openEditSite(id){
        const s=sites.find(x=>x.id===id);
        openModal('编辑网站',`
            <div class="form-row"><label>标题</label><input id="title" value="${esc(s.title)}"></div>
            <div class="form-row"><label>网址</label><input id="url" value="${esc(s.url)}" oninput="autoGetIcon()"></div>
            <div class="form-row"><label>图标</label><input id="icon" value="${esc(s.icon||'fas fa-link')}"></div>
            <div class="form-row"><label>描述</label><input id="desc" value="${esc(s.description||'')}"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="${s.display_order}"></div>
        `,async()=>{
            const t=document.getElementById('title').value,u=document.getElementById('url').value;
            if(!t||!u){showToast('标题/网址必填','error');return;}
            if(!checkUrl(u)){showToast('网址格式错误','error');return;}
            await apiFetch(`/admin/sites/${id}`,{method:'PUT',body:JSON.stringify({
                title:t,url:u,description:document.getElementById('desc').value,
                icon:document.getElementById('icon').value,display_order:+document.getElementById('sort').value
            })});
            addLog(`编辑网站：${s.title}`);showToast('修改成功');loadAllData();closeModal();
        })
    }
    function autoGetIcon(){
        const url=document.getElementById('url').value;
        if(url)document.getElementById('icon').value=getFavicon(url);
    }
    async function delSite(id){if(!confirm('删除该网站？'))return;
        await apiFetch(`/admin/sites/${id}`,{method:'DELETE'});
        addLog(`删除网站：${id}`);showToast('删除成功');loadAllData();
    }

    // 初始化
    document.getElementById('loginBtn').onclick=login;
    document.getElementById('logoutBtn').onclick=logout;
    document.getElementById('addCategoryBtn').onclick=openAddCat;
    document.getElementById('expandAll').onclick=expandAll;
    document.getElementById('foldAll').onclick=foldAll;
    document.getElementById('logBtn').onclick=showLogs;
    document.getElementById('exportBtn').onclick=exportData;
    document.getElementById('modalSubmit').onclick=()=>modalAction&&modalAction();
    document.getElementById('searchInput').addEventListener('input',doSearch);
    document.getElementById('tokenInput').addEventListener('keydown',e=>e.key==='Enter'&&login());

    if(token)login();
</script>
</body>
</html>
