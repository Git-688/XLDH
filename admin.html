<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>星链导航后台管理</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#f5f7fa;font-size:12px;color:#333;
            -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent
        }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar{display:none}
        *{-ms-overflow-style:none;scrollbar-width:none}

        .container{max-width:700px;margin:0 auto;padding:10px}
        /* 极简卡片 */
        .card{
            background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;
            box-shadow:0 1px 4px rgba(0,0,0,0.04)
        }
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
        h1{font-size:16px;font-weight:600;color:#222}
        h2{font-size:14px;font-weight:600;color:#333}

        /* 输入框/表单 极致规整 */
        input{
            padding:6px 10px;border:1px solid #e6e8eb;border-radius:6px;
            font-size:12px;width:100%;background:#fafbfc;outline:none;
            transition:all .2s
        }
        input:focus{border-color:#409eff;background:#fff}
        .form-row{margin-bottom:8px}
        .form-row label{font-size:11px;color:#666;margin-bottom:3px;display:block}

        /* 按钮极简 */
        button{
            border:none;border-radius:6px;padding:6px 10px;
            font-size:12px;cursor:pointer;transition:all .2s;
            display:inline-flex;align-items:center;justify-content:center
        }
        button.primary{background:#409eff;color:#fff}
        button.primary:hover{background:#3388e8}
        button.danger{background:#f56c6c;color:#fff}
        button.danger:hover{background:#e55656}
        button.secondary{background:#909399;color:#fff}
        button.secondary:hover{background:#7a7e84}
        button.text{background:transparent;color:#666;padding:3px 6px}
        button.text:hover{color:#409eff}

        /* 树形结构 极简无杂乱 */
        .tree-item{margin-bottom:8px}
        .item-header{
            display:flex;justify-content:space-between;align-items:center;
            padding:6px 10px;border-radius:6px;background:#fafbfc;
            gap:8px
        }
        .item-info{flex:1;font-weight:500;word-break:break-all;display:flex;align-items:center;gap:6px}
        .item-info span{font-size:11px;color:#999}
        .item-actions{display:flex;gap:4px}
        .item-actions button{padding:3px 6px;font-size:11px}
        .category-item,.subcategory-item{
            border-left:1px solid #e6e8eb;margin-left:10px;padding-left:10px;margin-top:4px;
            overflow:hidden;transition:all 0.2s ease;
        }
        .folded{max-height:0;padding:0;margin:0;border:none}

        /* 自定义模态框 整洁无乱 */
        .modal{
            position:fixed;inset:0;background:rgba(0,0,0,.25);
            display:flex;align-items:center;justify-content:center;
            z-index:99;opacity:0;visibility:hidden;transition:all .2s
        }
        .modal.show{opacity:1;visibility:visible}
        .modal-body{
            background:#fff;border-radius:10px;width:90%;max-width:380px;
            padding:15px;max-height:80vh;overflow-y:auto
        }
        .modal-title{font-size:14px;font-weight:600;margin-bottom:10px;color:#222}
        .modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

        /* 极简Toast 不遮挡·不杂乱 */
        .toast{
            position:fixed;bottom:20px;left:50%;transform:translate(-50%,10px);
            padding:6px 12px;border-radius:6px;font-size:12px;color:#fff;
            background:rgba(0,0,0,.7);z-index:999;opacity:0;
            visibility:hidden;transition:all .2s
        }
        .toast.show{opacity:1;visibility:visible;transform:translate(-50%,0)}
        .toast.success{background:rgba(67,160,71,.9)}
        .toast.error{background:rgba(244,67,54,.9)}

        .loading{text-align:center;padding:15px;color:#999;font-size:12px}
        .hidden{display:none!important}
    </style>
</head>
<body>
<!-- 轻量Toast -->
<div class="toast" id="toast"></div>

<!-- 全局模态框 -->
<div class="modal" id="modal">
    <div class="modal-body">
        <div class="modal-title" id="modalTitle"></div>
        <div id="modalForm"></div>
        <div class="modal-buttons">
            <button class="secondary" onclick="closeModal()">取消</button>
            <button class="primary" id="modalSubmit">确认</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>📋 导航管理</h1>
            <div style="display:flex;gap:6px;align-items:center">
                <input type="password" id="tokenInput" placeholder="管理Token" style="width:120px">
                <button class="primary" id="loginBtn">登录</button>
                <button class="secondary hidden" id="logoutBtn">退出</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="card">
            <div class="header">
                <h2>📁 一级分类</h2>
                <div style="display:flex;gap:6px">
                    <button class="text" id="expandAll">全部展开</button>
                    <button class="text" id="foldAll">全部收起</button>
                    <button class="primary" id="addCategoryBtn">+ 新增分类</button>
                </div>
            </div>
            <div id="categoriesList"></div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'https://api.xldh688.eu.cc';
    let token = localStorage.getItem('admin_token') || '';
    let modalAction = null;

    // 极简Toast
    const toast = document.getElementById('toast');
    function showToast(msg, isError = false){
        toast.textContent = msg;
        toast.className = `toast ${isError ? 'error' : 'success'} show`;
        setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // 模态框控制
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalForm = document.getElementById('modalForm');
    function openModal(title, formHtml, callback){
        modalTitle.textContent = title;
        modalForm.innerHTML = formHtml;
        modalAction = async () => {
            try {
                await callback();
            } catch (e) {
                showToast('操作失败：'+e.message, true);
                console.error(e);
            }
        };
        modal.classList.add('show');
    }
    function closeModal(){
        modal.classList.remove('show');
        modalAction = null;
    }

    // API请求
    async function apiFetch(endpoint, options = {}){
        const headers = {'Content-Type':'application/json',...options.headers};
        if(token) headers.Authorization = `Bearer ${token}`;
        const res = await fetch(API_BASE + endpoint, {...options, headers});
        if(res.status === 401){showToast('Token无效', true);logout();throw new Error('Unauthorized')}
        if(!res.ok){const t=await res.text();throw new Error(t||'请求失败')}
        return res.json();
    }

    // 登录/退出
    function login(){
        const t = document.getElementById('tokenInput').value.trim();
        if(!t){showToast('请输入Token', true);return}
        token = t; localStorage.setItem('admin_token', token);
        document.getElementById('loginBtn').classList.add('hidden');
        document.getElementById('logoutBtn').classList.remove('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        loadAllData(); showToast('登录成功');
    }
    function logout(){
        token = ''; localStorage.removeItem('admin_token');
        document.getElementById('loginBtn').classList.remove('hidden');
        document.getElementById('logoutBtn').classList.add('hidden');
        document.getElementById('mainContent').classList.add('hidden');
        showToast('已退出');
    }

    // 展开/收起控制
    function toggleCat(catId){
        const el = document.querySelector(`.tree-item[data-cat="${catId}"] .category-item`);
        el.classList.toggle('folded');
    }
    function expandAll(){
        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('folded'));
    }
    function foldAll(){
        document.querySelectorAll('.category-item').forEach(el => el.classList.add('folded'));
    }

    // 数据渲染
    let categories=[],subcategories=[],sites=[];
    async function loadAllData(){
        try{
            const [cats,subs,sits] = await Promise.all([
                apiFetch('/admin/categories'),apiFetch('/admin/subcategories'),apiFetch('/admin/sites')
            ]);
            categories=cats;subcategories=subs;sites=sits;renderAll();
        }catch(e){showToast('加载失败：'+e.message, true)}
    }
    function esc(s){return s?s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])):''}

    // 渲染结构
    function renderAll(){
        const el = document.getElementById('categoriesList');
        if(!categories.length){el.innerHTML='<div class="loading">暂无分类</div>';return}
        let html = '';
        for(const c of categories){
            const subs = subcategories.filter(s=>s.category_id===c.id);
            html+=`
            <div class="tree-item" data-cat="${c.id}">
                <div class="item-header">
                    <div class="item-info">
                        <button class="text" onclick="toggleCat(${c.id})">▼</button>
                        ${esc(c.name)} ${c.icon?`<span>(${esc(c.icon)})</span>`:''}
                        ${c.description?`<br><span>${esc(c.description)}</span>`:''}
                    </div>
                    <div class="item-actions">
                        <button class="primary edit-cat" data-id="${c.id}">编辑</button>
                        <button class="danger del-cat" data-id="${c.id}">删除</button>
                        <button class="primary add-sub" data-cid="${c.id}">+子分类</button>
                    </div>
                </div>
                <div class="category-item">${subs.map(s=>renderSub(s)).join('')}</div>
            </div>`;
        }
        el.innerHTML=html;bindEvent();
    }
    function renderSub(sub){
        const sts = sites.filter(s=>s.subcategory_id===sub.id);
        return `
        <div class="tree-item" data-sub="${sub.id}">
            <div class="item-header">
                <div class="item-info">📂 ${esc(sub.name)}</div>
                <div class="item-actions">
                    <button class="primary edit-sub" data-id="${sub.id}">编辑</button>
                    <button class="danger del-sub" data-id="${sub.id}">删除</button>
                    <button class="primary add-site" data-sid="${sub.id}">+网站</button>
                </div>
            </div>
            <div class="subcategory-item">${sts.map(s=>renderSite(s)).join('')}</div>
        </div>`;
    }
    function renderSite(s){
        return `
        <div class="tree-item" data-site="${s.id}">
            <div class="item-header">
                <div class="item-info">
                    🔗 ${esc(s.title)}<br><span>${esc(s.url)}</span>
                </div>
                <div class="item-actions">
                    <button class="primary edit-site" data-id="${s.id}">编辑</button>
                    <button class="danger del-site" data-id="${s.id}">删除</button>
                </div>
            </div>
        </div>`;
    }

    // 事件绑定
    function bindEvent(){
        document.querySelectorAll('.edit-cat').forEach(b=>b.onclick=()=>openEditCat(+b.dataset.id));
        document.querySelectorAll('.del-cat').forEach(b=>b.onclick=()=>delCat(+b.dataset.id));
        document.querySelectorAll('.add-sub').forEach(b=>b.onclick=()=>openAddSub(+b.dataset.cid));
        document.querySelectorAll('.edit-sub').forEach(b=>b.onclick=()=>openEditSub(+b.dataset.id));
        document.querySelectorAll('.del-sub').forEach(b=>b.onclick=()=>delSub(+b.dataset.id));
        document.querySelectorAll('.add-site').forEach(b=>b.onclick=()=>openAddSite(+b.dataset.sid));
        document.querySelectorAll('.edit-site').forEach(b=>b.onclick=()=>openEditSite(+b.dataset.id));
        document.querySelectorAll('.del-site').forEach(b=>b.onclick=()=>delSite(+b.dataset.id));
    }

    // 分类操作（自定义表单）
    function openAddCat(){
        openModal('新增分类',`
            <div class="form-row"><label>名称</label><input id="name" required></div>
            <div class="form-row"><label>图标</label><input id="icon" placeholder="fas fa-folder"></div>
            <div class="form-row"><label>描述</label><input id="desc"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="${categories.length}"></div>
        `,async()=>{
            const name=document.getElementById('name').value.trim();
            if(!name){showToast('请填写名称', true);return}
            await apiFetch('/admin/categories',{method:'POST',body:JSON.stringify({
                name,icon:document.getElementById('icon').value,
                description:document.getElementById('desc').value,
                display_order:+document.getElementById('sort').value||0
            })});
            showToast('添加成功');loadAllData();closeModal();
        })
    }
    function openEditCat(id){
        const c = categories.find(x=>x.id===id);
        openModal('编辑分类',`
            <div class="form-row"><label>名称</label><input id="name" value="${esc(c.name)}"></div>
            <div class="form-row"><label>图标</label><input id="icon" value="${esc(c.icon||'')}"></div>
            <div class="form-row"><label>描述</label><input id="desc" value="${esc(c.description||'')}"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="${c.display_order}"></div>
        `,async()=>{
            await apiFetch(`/admin/categories/${id}`,{method:'PUT',body:JSON.stringify({
                name:document.getElementById('name').value,icon:document.getElementById('icon').value,
                description:document.getElementById('desc').value,display_order:+document.getElementById('sort').value
            })});
            showToast('修改成功');loadAllData();closeModal();
        })
    }
    async function delCat(id){
        if(!confirm('确认删除？将清空子分类与网站'))return;
        await apiFetch(`/admin/categories/${id}`,{method:'DELETE'});
        showToast('删除成功');loadAllData();
    }

    // 子分类
    function openAddSub(cid){
        openModal('新增子分类',`
            <div class="form-row"><label>名称</label><input id="name"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="0"></div>
        `,async()=>{
            const name=document.getElementById('name').value.trim();
            if(!name){showToast('请填写名称', true);return}
            await apiFetch('/admin/subcategories',{method:'POST',body:JSON.stringify({
                category_id:cid,name,display_order:+document.getElementById('sort').value||0
            })});
            showToast('添加成功');loadAllData();closeModal();
        })
    }
    function openEditSub(id){
        const s=subcategories.find(x=>x.id===id);
        openModal('编辑子分类',`
            <div class="form-row"><label>名称</label><input id="name" value="${esc(s.name)}"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="${s.display_order}"></div>
        `,async()=>{
            await apiFetch(`/admin/subcategories/${id}`,{method:'PUT',body:JSON.stringify({
                name:document.getElementById('name').value,display_order:+document.getElementById('sort').value
            })});
            showToast('修改成功');loadAllData();closeModal();
        })
    }
    async function delSub(id){
        if(!confirm('确认删除？将清空该子分类网站'))return;
        await apiFetch(`/admin/subcategories/${id}`,{method:'DELETE'});
        showToast('删除成功');loadAllData();
    }

    // 网站
    function openAddSite(sid){
        openModal('新增网站',`
            <div class="form-row"><label>标题</label><input id="title"></div>
            <div class="form-row"><label>网址</label><input id="url"></div>
            <div class="form-row"><label>描述</label><input id="desc"></div>
            <div class="form-row"><label>图标</label><input id="icon" value="fas fa-link"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="0"></div>
        `,async()=>{
            const t=document.getElementById('title').value,u=document.getElementById('url').value;
            if(!t||!u){showToast('标题/网址必填', true);return}
            await apiFetch('/admin/sites',{method:'POST',body:JSON.stringify({
                subcategory_id:sid,title:t,url:u,description:document.getElementById('desc').value,
                icon:document.getElementById('icon').value,display_order:+document.getElementById('sort').value||0
            })});
            showToast('添加成功');loadAllData();closeModal();
        })
    }
    function openEditSite(id){
        const s=sites.find(x=>x.id===id);
        openModal('编辑网站',`
            <div class="form-row"><label>标题</label><input id="title" value="${esc(s.title)}"></div>
            <div class="form-row"><label>网址</label><input id="url" value="${esc(s.url)}"></div>
            <div class="form-row"><label>描述</label><input id="desc" value="${esc(s.description||'')}"></div>
            <div class="form-row"><label>图标</label><input id="icon" value="${esc(s.icon||'fas fa-link')}"></div>
            <div class="form-row"><label>排序</label><input type="number" id="sort" value="${s.display_order}"></div>
        `,async()=>{
            await apiFetch(`/admin/sites/${id}`,{method:'PUT',body:JSON.stringify({
                title:document.getElementById('title').value,url:document.getElementById('url').value,
                description:document.getElementById('desc').value,icon:document.getElementById('icon').value,
                display_order:+document.getElementById('sort').value
            })});
            showToast('修改成功');loadAllData();closeModal();
        })
    }
    async function delSite(id){
        if(!confirm('确认删除该网站？'))return;
        await apiFetch(`/admin/sites/${id}`,{method:'DELETE'});
        showToast('删除成功');loadAllData();
    }

    // 初始化
    document.getElementById('loginBtn').onclick=login;
    document.getElementById('logoutBtn').onclick=logout;
    document.getElementById('addCategoryBtn').onclick=openAddCat;
    document.getElementById('expandAll').onclick=expandAll;
    document.getElementById('foldAll').onclick=foldAll;
    document.getElementById('modalSubmit').onclick=()=>{if(modalAction) modalAction()};
    if(token){document.getElementById('tokenInput').value=token;login()}
</script>
</body>
</html>
