<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>星聚导航后台管理</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://api.xjdh688.ccwu.cc https://api.pearapi.ai; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.xjdh688.ccwu.cc https://api.pearapi.ai; font-src 'self'; frame-ancestors 'none';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            font-size: 12px;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow: hidden;
        }

        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100%;
            flex: 1;
        }
        .login-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            padding: 28px 24px 32px;
            width: 100%;
            max-width: 320px;
            border: 1px solid #eef2f6;
        }
        .login-header { text-align: center; margin-bottom: 24px; }
        .login-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
        }
        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }
        .login-header h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .login-header p { font-size: 11px; color: #64748b; }
        .login-form .input-group { margin-bottom: 16px; }
        .login-form label { display: block; font-size: 11px; font-weight: 500; color: #475569; margin-bottom: 6px; }
        .login-form input {
            width: 100%;
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            transition: all 0.2s;
            outline: none;
        }
        .login-form input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .remember-checkbox { display: flex; align-items: center; gap: 6px; margin: 12px 0 16px; font-size: 11px; }
        .login-btn {
            width: 100%;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            color: white;
            cursor: pointer;
        }
        .login-btn:hover { background: #2563eb; }
        .lock-message { font-size: 10px; color: #ef4444; text-align: center; margin-top: 12px; }

        .main-card {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #eef2f6;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
        .tab-btn {
            padding: 6px 14px;
            border-radius: 20px;
            background: #f1f5f9;
            color: #475569;
            cursor: pointer;
            font-size: 12px;
        }
        .tab-btn.active { background: #3b82f6; color: #fff; }
        .cat-bar {
            width: 100%;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
        }
        .cat-item {
            padding: 6px 12px;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #eef2f6;
        }
        .cat-item.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .cat-item .rename-text-btn {
            background: #e2e8f0;
            border: none;
            cursor: pointer;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 6px;
            color: #475569;
        }
        .cat-item.active .rename-text-btn { background: rgba(255,255,255,0.2); color: #fff; }

        .content-layout {
            display: flex;
            gap: 12px;
            flex: 1;
            min-height: 0;
            flex-direction: row !important;
            flex-wrap: wrap;
        }
        .sidebar, .main-content {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 200px;
            flex: 1;
        }
        #addSubBtn, #addSiteBtn, #addAnnouncementBtn {
            width: 100%;
            height: 36px;
            margin-bottom: 8px;
            font-size: 12px;
            border-radius: 8px;
            background: #3b82f6;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .sub-list, .site-list, .rank-list, .feedback-list, .submissions-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }
        .sub-item, .link-item, .announcement-item {
            background: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid #eef2f6;
        }
        .link-item { display: flex; justify-content: space-between; align-items: center; gap: 8px; }

        input, textarea, select {
            width: 100%;
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        button {
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        button.primary { background: #3b82f6; color: #fff; }
        button.danger { background: #ef4444; color: #fff; }
        button.secondary { background: #64748b; color: #fff; }
        button.sm { padding: 4px 8px; font-size: 11px; }

        .announcement-editor {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #eef2f6;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 6px; color: #1e293b; }
        .form-group .hint { font-size: 10px; color: #64748b; margin-top: 4px; }
        .updates-list-editor {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
        }
        .update-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .update-item input { flex: 1; }
        .add-update-btn { background: #10b981; color: white; padding: 4px 10px; font-size: 11px; margin-top: 8px; }
        .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .toggle-switch { display: flex; align-items: center; gap: 10px; }
        .toggle-switch input { width: auto; margin: 0; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 99; opacity: 0; visibility: hidden; transition: all 0.2s; padding: 16px; }
        .modal.show { opacity: 1; visibility: visible; }
        .modal-body { background: #fff; border-radius: 8px; width: 100%; max-width: 460px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translate(-50%, 12px); padding: 6px 14px; border-radius: 30px; font-size: 11px; color: #fff; z-index: 999; opacity: 0; visibility: hidden; transition: all 0.2s; white-space: nowrap; }
        .toast.show { opacity: 1; visibility: visible; transform: translate(-50%, 0); }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .hidden { display: none; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .content-layout { flex-direction: row !important; flex-wrap: wrap; }
            .sidebar, .main-content { min-width: 240px; }
        }
        @media (max-width: 640px) {
            .sidebar, .main-content { min-width: 100%; }
        }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="modal-body"><div class="modal-title" id="modalTitle" style="font-size:14px; font-weight:600; margin-bottom:16px;"></div><div id="modalForm"></div><div class="modal-buttons" style="display:flex; justify-content:flex-end; gap:8px; margin-top:20px;" id="modalButtons"></div></div></div>

<div class="container">
    <div id="loginWrapper" class="login-section">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo"><img src="https://tc688.ccwu.cc/file/星聚导航/1781189176148_logo.png" alt="logo"></div>
                <h2>星聚导航</h2>
                <p>管理员登录</p>
            </div>
            <div class="login-form">
                <div class="input-group"><label>管理Token</label><input type="password" id="tokenInput" placeholder="请输入管理Token" autocomplete="off"></div>
                <div class="remember-checkbox"><input type="checkbox" id="rememberToken"><label for="rememberToken">记住密码（1小时有效）</label></div>
                <button class="login-btn" id="loginBtn">登录</button>
                <div id="loginLockMessage" class="lock-message"></div>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden main-card">
        <div class="flex-row" style="margin-bottom:12px; justify-content: space-between;">
            <div class="flex-row">
                <div class="tab-btn active" data-tab="manage">数据管理</div>
                <div class="tab-btn" data-tab="rank">点击排行</div>
                <div class="tab-btn" data-tab="feedback">用户反馈</div>
                <div class="tab-btn" data-tab="submissions">待审核</div>
                <div class="tab-btn" data-tab="announcement">公告管理</div>
            </div>
            <button class="secondary sm" id="logoutBtn">退出</button>
        </div>

        <!-- 数据管理 -->
        <div id="manageTab" class="tab-panel">
            <div class="flex-row" style="margin-bottom:10px;">
                <input type="text" class="search-box" id="searchInput" placeholder="搜索标题..." style="height:30px; width:180px;">
                <button class="secondary sm" id="exportBtn">备份导出</button>
                <button class="secondary sm" id="importBtn">导入数据</button>
                <button class="primary sm" id="refreshNavBtn">刷新缓存</button>
                <button class="primary sm" id="addCategoryBtn">+一级分类</button>
            </div>
            <div class="cat-bar" id="catBar"></div>
            <div class="content-layout">
                <div class="sidebar"><button class="primary" id="addSubBtn">+子分类</button><div class="sub-list" id="subList"></div></div>
                <div class="main-content"><button class="primary" id="addSiteBtn">+添加链接</button><div class="site-list" id="siteList"></div></div>
            </div>
        </div>

        <!-- 点击排行 -->
        <div id="rankTab" class="tab-panel hidden"><div class="flex-row" style="margin-bottom:10px;"><button class="primary sm" id="sortRankBtn">按点击数降序</button></div><div class="rank-list" id="rankList"></div></div>

        <!-- 用户反馈 -->
        <div id="feedbackTab" class="tab-panel hidden"><div class="flex-row" style="margin-bottom:10px;"><button class="primary sm" id="refreshFeedbackBtn">刷新列表</button></div><div class="feedback-list" id="feedbackList"></div></div>

        <!-- 待审核 -->
        <div id="submissionsTab" class="tab-panel hidden"><div class="flex-row" style="margin-bottom:10px;"><button class="primary sm" id="refreshSubmissionsBtn">刷新列表</button></div><div class="submissions-list" id="submissionsList"></div></div>

        <!-- 公告管理：单条编辑 -->
        <div id="announcementTab" class="tab-panel hidden">
            <div class="announcement-editor" id="announcementEditor">
                <div class="form-group"><label>公告标题</label><input type="text" id="annTitle" placeholder="公告标题"></div>
                <div class="form-group"><label>重要内容（重点突出）</label><textarea id="annFocus" rows="3" placeholder="填写最重要的公告信息，将高亮显示"></textarea></div>
                <div class="form-group"><label>更新内容列表</label><div id="updatesContainer" class="updates-list-editor"><div class="update-item"><input type="text" class="update-input" placeholder="更新项 1"></div></div><button type="button" id="addUpdateBtn" class="add-update-btn">+ 添加更新项</button></div>
                <div class="form-group"><label>发布时间</label><input type="text" id="annPublishTime" readonly style="background:#f8fafc;"></div>
                <div class="form-group toggle-switch"><label>启用公告（前端显示）</label><input type="checkbox" id="annActive" checked></div>
                <div class="form-actions">
                    <button type="button" id="annClearBtn" class="secondary">清除</button>
                    <button type="button" id="annCancelBtn" class="secondary">取消</button>
                    <button type="button" id="annPublishBtn" class="primary">发布/更新</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 投稿详情模态框 -->
<div class="modal" id="submissionDetailModal"><div class="modal-body"><div style="display:flex; justify-content:space-between; margin-bottom:12px;"><h3 style="font-size:14px;">📝 投稿详情</h3><button id="closeDetailModalBtn" style="background:none; border:none; font-size:18px;">&times;</button></div><div id="submissionDetailContent"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js"></script>
<script src="./js/admin.js"></script>
</body>
</html>
