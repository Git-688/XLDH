<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>极简时间屏幕 | 修复完整版</title>
    <style>
        /* 全局主题变量 */
        :root {
            --bg-gradient: linear-gradient(135deg, #6e8efb, #a777e3);
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-disabled: rgba(255, 255, 255, 0.5);
            --shadow-color: rgba(0, 0, 0, 0.2);
            --accent-color: #a777e3;
            --progress-bg: rgba(255, 255, 255, 0.2);
            --card-blur: 12px;
            --global-blur: 0px;
            --time-font-weight: 600;
            --touch-size: 48px;
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --slider-bg: rgba(255, 255, 255, 0.2);
            --switch-bg: rgba(255, 255, 255, 0.2);
            --select-bg: rgba(255, 255, 255, 0.1);
            --select-border: rgba(255, 255, 255, 0.2);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        html {
            font-size: 14px;
            -webkit-text-size-adjust: 100%;
            transform: translate3d(0,0,0);
        }
        body {
            width: 100vw;
            height: 100vh;
            @supports (width: 100dvw) and (height: 100dvh) {
                width: 100dvw;
                height: 100dvh;
            }
            background: var(--bg-gradient);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            transition: background 0.5s ease;
            -webkit-font-smoothing: antialiased;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            backdrop-filter: blur(var(--global-blur));
            -webkit-backdrop-filter: blur(var(--global-blur));
            pointer-events: none;
            z-index: 0;
        }
        .main-card {
            text-align: center;
            background: var(--card-bg);
            padding: clamp(16px, 4vw, 40px) clamp(20px, 5vw, 60px);
            border-radius: var(--border-radius-lg);
            backdrop-filter: blur(var(--card-blur));
            -webkit-backdrop-filter: blur(var(--card-blur));
            box-shadow: 0 8px 32px var(--shadow-color);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            width: clamp(92%, 85vw, 700px);
            max-width: 700px;
            overflow: visible;
        }
        .tab-container {
            display: inline-flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-md);
            padding: 4px;
            margin-bottom: 24px;
            gap: 4px;
            backdrop-filter: blur(var(--card-blur));
        }
        .tab-item {
            padding: 8px 18px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            font-size: clamp(12px, 1.3vw, 14px);
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            min-height: 36px;
            display: flex;
            align-items: center;
            touch-action: manipulation;
        }
        .tab-item.active {
            background: var(--accent-color);
            color: var(--text-color);
        }
        .tab-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
            width: 100%;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .time-wrapper {
            position: relative;
            display: inline-flex;
            align-items: flex-end;
            gap: clamp(2px, 0.8vw, 6px);
            width: 100%;
            justify-content: center;
        }
        .time {
            font-size: clamp(5vw, 10vw, 12vw);
            font-weight: var(--time-font-weight);
            letter-spacing: 0.05em;
            line-height: 1.1;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ampm {
            font-size: clamp(1.5vw, 2.5vw, 3vw);
            font-weight: 500;
            opacity: 0.8;
            margin-bottom: clamp(0.8vw, 1.2vw, 1.5vw);
            display: none;
            flex-shrink: 0;
        }
        .date {
            font-size: clamp(12px, 1.5vw, 14px);
            margin-top: 16px;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            transition: opacity 0.2s ease;
        }
        .lunar {
            font-size: clamp(11px, 1.2vw, 13px);
            margin-top: 8px;
            color: var(--text-secondary);
            opacity: 0.8;
            letter-spacing: 0.08em;
            transition: opacity 0.2s ease;
        }
        .festival {
            color: var(--accent-color);
            font-weight: 600;
            margin-left: 6px;
        }
        .progress-container {
            width: 100%;
            height: 3px;
            background: var(--progress-bg);
            border-radius: 2px;
            margin-top: 24px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent-color);
            border-radius: 2px;
            transition: width 0.5s ease;
            width: 0%;
        }
        .progress-text {
            font-size: clamp(10px, 1vw, 12px);
            margin-top: 6px;
            color: var(--text-secondary);
            opacity: 0.7;
        }
        .stopwatch-display {
            font-size: clamp(2rem, 10vw, 4.5rem);
            font-weight: var(--time-font-weight);
            letter-spacing: 0.05em;
            line-height: 1.1;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stopwatch-btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border-radius: var(--border-radius-sm);
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-color);
            font-size: clamp(12px, 1.3vw, 14px);
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(var(--card-blur));
            transition: all 0.2s ease;
            min-width: 76px;
            min-height: var(--touch-size);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 50;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }
        .btn.primary {
            background: var(--accent-color);
        }
        .btn.primary:hover {
            filter: brightness(1.1);
        }
        .btn.danger {
            background: rgba(239, 68, 68, 0.8);
        }
        .btn.danger:hover {
            background: rgba(239, 68, 68, 1);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .lap-list {
            max-height: calc(3 * 33px);
            overflow-y: auto;
            margin-top: 16px;
            text-align: left;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: clamp(11px, 1.2vw, 13px);
            color: var(--text-secondary);
            min-height: 33px;
            align-items: center;
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .lap-list {
                max-height: calc(6 * 33px);
            }
        }
        @media (min-width: 1025px) {
            .lap-list {
                max-height: calc(9 * 33px);
            }
        }
        @media (max-width: 1024px) and (orientation: landscape) {
            .lap-list {
                max-height: calc(2 * 33px);
            }
        }
        .countdown-setting {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(8px, 2vw, 12px);
            margin-bottom: 24px;
            flex-wrap: nowrap;
            width: 100%;
            flex-shrink: 0;
            max-width: 100%;
            overflow: visible;
        }
        .time-input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            min-width: 56px;
            width: clamp(56px, 18vw, 70px);
        }
        .time-input {
            width: 100%;
            height: clamp(44px, 8dvh, 52px);
            background: var(--select-bg);
            border: 1px solid var(--select-border);
            border-radius: var(--border-radius-sm);
            color: var(--text-color);
            font-size: max(16px, clamp(16px, 3vw, 22px));
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: all 0.2s ease;
            -webkit-user-select: text !important;
            user-select: text !important;
            touch-action: manipulation;
            position: relative;
            z-index: 100;
            cursor: text;
            -webkit-tap-highlight-color: transparent;
        }
        .time-input:focus {
            border-color: var(--accent-color);
            filter: brightness(1.1);
            box-shadow: 0 0 0 2px var(--accent-color);
        }
        .time-input::-webkit-outer-spin-button,
        .time-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .time-input[type=number] {
            -moz-appearance: textfield;
        }
        .time-label {
            font-size: clamp(10px, 1vw, 12px);
            color: var(--text-secondary);
        }
        .time-split {
            font-size: clamp(16px, 3vw, 22px);
            font-weight: 600;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .countdown-display {
            font-size: clamp(2rem, 10vw, 4.5rem);
            font-weight: var(--time-font-weight);
            letter-spacing: 0.05em;
            line-height: 1.1;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .countdown-btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .settings-btn {
            position: fixed;
            top: clamp(12px, 2vw, 20px);
            right: clamp(12px, 2vw, 20px);
            height: var(--touch-size);
            padding: 0 18px;
            border-radius: var(--border-radius-md);
            background: var(--card-bg);
            backdrop-filter: blur(var(--card-blur));
            -webkit-backdrop-filter: blur(var(--card-blur));
            border: none;
            color: var(--text-color);
            font-size: clamp(13px, 1.4vw, 15px);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px var(--shadow-color);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .settings-btn:hover {
            background: var(--accent-color);
            transform: translateY(-1px);
        }
        .settings-panel {
            position: fixed;
            top: clamp(65px, 8dvh, 75px);
            right: clamp(12px, 2vw, 20px);
            width: clamp(90%, 300px, 320px);
            background: var(--card-bg);
            backdrop-filter: blur(calc(var(--card-blur) + 4px));
            -webkit-backdrop-filter: blur(calc(var(--card-blur) + 4px));
            border-radius: var(--border-radius-lg);
            box-shadow: 0 8px 32px var(--shadow-color);
            padding: clamp(14px, 2vw, 18px);
            z-index: 9998;
            transform: translateX(120vw);
            opacity: 0;
            visibility: hidden;
            display: none;
            transition: all 0.3s ease;
            max-height: clamp(60dvh, 75dvh, 85vh);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .settings-panel.active {
            transform: translateX(0);
            opacity: 1;
            visibility: visible;
            display: block;
        }
        .settings-title {
            font-size: clamp(15px, 1.6vw, 16px);
            font-weight: 600;
            margin-bottom: clamp(10px, 1.2vw, 14px);
            padding-bottom: clamp(8px, 1vw, 10px);
            border-bottom: 1px solid var(--select-border);
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(10px, 1.2vw, 14px);
            min-height: 36px;
        }
        .setting-label {
            font-size: clamp(13px, 1.4vw, 14px);
            color: var(--text-secondary);
        }
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--switch-bg);
            border-radius: 24px;
            transition: 0.3s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .slider {
            background-color: var(--accent-color);
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        .custom-select {
            position: relative;
            width: clamp(120px, 150px, 160px);
            z-index: 9999;
            flex-shrink: 0;
        }
        .select-trigger {
            width: 100%;
            padding: 6px 10px;
            background: var(--select-bg);
            border: 1px solid var(--select-border);
            border-radius: var(--border-radius-sm);
            color: var(--text-color);
            font-size: clamp(12px, 1.3vw, 13px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            min-height: 36px;
        }
        .select-trigger:hover {
            border-color: var(--accent-color);
            filter: brightness(1.1);
        }
        .select-trigger::after {
            content: "▼";
            font-size: 10px;
            transition: transform 0.2s ease;
            color: var(--text-secondary);
        }
        .select-trigger.open::after {
            transform: rotate(180deg);
        }
        .select-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(calc(var(--card-blur) + 4px));
            -webkit-backdrop-filter: blur(calc(var(--card-blur) + 4px));
            border-radius: var(--border-radius-sm);
            box-shadow: 0 4px 16px var(--shadow-color);
            overflow: hidden;
            transform: translateY(-4px);
            opacity: 0;
            visibility: hidden;
            display: none;
            transition: all 0.2s ease;
            max-height: 160px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            z-index: 9999;
        }
        .select-dropdown.open {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
            display: block;
        }
        .select-option {
            padding: 8px 10px;
            font-size: clamp(12px, 1.3vw, 13px);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            min-height: 36px;
            display: flex;
            align-items: center;
        }
        .select-option:hover, .select-option.selected {
            background: var(--accent-color);
            color: var(--text-color);
        }
        .slider-control {
            width: clamp(120px, 140px, 150px);
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--slider-bg);
            border-radius: 2px;
            outline: none;
            flex-shrink: 0;
        }
        .slider-control::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .slider-control::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            border: none;
        }
        .slider-control::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
            margin-bottom: clamp(10px, 1.2vw, 14px);
        }
        .theme-item {
            height: 36px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        .theme-item.active {
            border-color: var(--text-color);
            transform: scale(1.05);
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 8px 32px var(--shadow-color); }
            50% { box-shadow: 0 8px 40px var(--accent-color), 0 0 20px rgba(255, 255, 255, 0.3); }
        }
        .breathe-effect .main-card {
            animation: breathe 4s infinite ease-in-out;
        }
        .low-power * {
            animation: none !important;
            transition: none !important;
        }
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 10px 20px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--border-radius-md);
            color: var(--text-color);
            font-size: 14px;
            box-shadow: 0 4px 16px var(--shadow-color);
            z-index: 99999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            max-width: 80%;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }
        *::-webkit-scrollbar {
            display: none;
        }
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) {
                --bg-gradient: linear-gradient(135deg, #141e30, #243b55);
                --card-bg: rgba(255, 255, 255, 0.08);
                --text-secondary: rgba(255, 255, 255, 0.7);
                --shadow-color: rgba(0, 0, 0, 0.3);
                --accent-color: #3a7bd5;
                --progress-bg: rgba(255, 255, 255, 0.15);
                --slider-bg: rgba(255, 255, 255, 0.2);
                --switch-bg: rgba(255, 255, 255, 0.2);
                --select-bg: rgba(255, 255, 255, 0.1);
                --select-border: rgba(255, 255, 255, 0.2);
            }
        }
        :fullscreen,
        :-webkit-full-screen,
        :-moz-full-screen,
        :-ms-fullscreen {
            background: var(--bg-gradient) !important;
            width: 100% !important;
            height: 100% !important;
        }
        :fullscreen .main-card,
        :-webkit-full-screen .main-card,
        :-moz-full-screen .main-card,
        :-ms-fullscreen .main-card {
            width: min(95%, 85%);
            max-width: 900px;
            padding: clamp(12px, 3vw, 30px) clamp(16px, 4vw, 50px);
        }
        @media (orientation: landscape) and (max-width: 1024px) {
            .main-card {
                width: min(95%, 85%);
                padding: 12px 20px;
            }
            .tab-container {
                margin-bottom: 16px;
            }
            .stopwatch-display, .countdown-display {
                margin-bottom: 12px;
            }
            .countdown-setting {
                margin-bottom: 16px;
            }
            .time-input {
                height: 44px;
            }
            .settings-panel {
                max-height: 70dvh;
            }
        }
    </style>
</head>
<body>
    <button class="settings-btn" id="settingsBtn" aria-label="打开设置">设置</button>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">基础显示</div>
        <div class="setting-item">
            <span class="setting-label">12小时制</span>
            <label class="switch">
                <input type="checkbox" id="12hourSwitch">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <span class="setting-label">显示秒数</span>
            <label class="switch">
                <input type="checkbox" id="secondSwitch" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <span class="setting-label">显示农历/节日</span>
            <label class="switch">
                <input type="checkbox" id="lunarSwitch" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <span class="setting-label">日期格式</span>
            <div class="custom-select" id="dateFormatSelect">
                <div class="select-trigger" data-value="ymd">年-月-日</div>
                <div class="select-dropdown">
                    <div class="select-option" data-value="ymd">年-月-日</div>
                    <div class="select-option" data-value="mdy">月/日/年</div>
                    <div class="select-option" data-value="dmy">日/月/年</div>
                </div>
            </div>
        </div>
        <div class="settings-title">视觉定制</div>
        <div class="setting-item">
            <span class="setting-label">卡片模糊度</span>
            <input type="range" min="0" max="30" value="12" class="slider-control" id="cardBlurSlider">
        </div>
        <div class="setting-item">
            <span class="setting-label">全局模糊度</span>
            <input type="range" min="0" max="20" value="0" class="slider-control" id="globalBlurSlider">
        </div>
        <div class="setting-item">
            <span class="setting-label">时间字体粗细</span>
            <input type="range" min="400" max="900" step="100" value="600" class="slider-control" id="fontWeightSlider">
        </div>
        <div class="setting-item">

        function solarToLunar(y, m, d) {
            let i, leap = 0, temp = 0;
            if ((y < 1900) || (y > 2100)) {
                console.warn('农历转换仅支持1900-2100年');
                return { month: 0, day: 0, year: y, ganzhi: '', animal: '', monthStr: '', dayStr: '', term: '', isLeap: false };
            }
            if (y == 1900 && m == 1 && d < 31) {
                return { month: 11, day: d, year: 1899, ganzhi: '己亥', animal: '猪', monthStr: '冬月', dayStr: getLunarDayStr(d), term: '', isLeap: false };
            }
            if (y % 4 == 0) solarMonth[1] = 29;
            let offset = (Date.UTC(y, m - 1, d) - Date.UTC(1900, 0, 31)) / 86400000;
            for (i = 1900; i < 2101 && offset > 0; i++) { temp = lYearDays(i); offset -= temp; }
            if (offset < 0) { offset += temp; i--; }
            let lunarYear = i;
            leap = leapMonth(i);
            let isLeap = false;
            for (i = 1; i < 13 && offset > 0; i++) {
                if (leap > 0 && i == (leap + 1) && isLeap == false) { --i; isLeap = true; temp = leapDays(lunarYear); }
                else { temp = monthDays(lunarYear, i); }
                if (isLeap == true && i == (leap + 1)) isLeap = false;
                offset -= temp;
            }
            if (offset == 0 && leap > 0 && i == leap + 1) { if (isLeap) { isLeap = false; } else { isLeap = true; --i; } }
            if (offset < 0) { offset += temp; --i; }
            let lunarM = i, lunarD = offset + 1;
            let ganzhiYear = Gan[(lunarYear - 4) % 10] + Zhi[(lunarYear - 4) % 12];
            let animal = Animals[(lunarYear - 4) % 12];
            let monthStr = (isLeap ? "闰" : "") + lunarMonth[lunarM - 1] + "月";
            let dayStr = getLunarDayStr(lunarD);
            let term = getSolarTerm(y, m, d);
            return { year: lunarYear, month: lunarM, day: lunarD, isLeap, ganzhi: ganzhiYear, animal, monthStr, dayStr, term };
        }
        function lYearDays(y) { let i, sum = 348; for (i = 0x8000; i > 0x8; i >>= 1) sum += (lunarInfo[y - 1900] & i) ? 1 : 0; return (sum + leapDays(y)); }
        function leapMonth(y) { return (lunarInfo[y - 1900] & 0xf); }
        function leapDays(y) { return (leapMonth(y)) ? ((lunarInfo[y - 1900] & 0x10000) ? 30 : 29) : 0; }
        function monthDays(y, m) { return ((lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29); }
        function getLunarDayStr(d) { let n = d % 10 == 0 ? 9 : d % 10 - 1; if (d <= 10) return lunarDay[0] + (d == 10 ? "十" : n + 1); else if (d < 20) return lunarDay[1] + (n + 1); else if (d == 20) return "二十"; else if (d < 30) return lunarDay[2] + (n + 1); else return lunarDay[3] + (d == 30 ? "十" : ""); }
        function getSolarTerm(y, m, d) { 
            let baseDate = new Date(1900, 0, 6, 2, 5, 0); 
            for (let i = 0; i < 24; i++) { 
                let temp = new Date(baseDate.getTime() + sTermInfo[i] * 60000); 
                let tempY = temp.getUTCFullYear(), tempM = temp.getUTCMonth() + 1, tempD = temp.getUTCDate(); 
                if (tempY == y && tempM == m && tempD == d) return solarTerm[i]; 
            } 
            return ""; 
        }

        function playBeep(frequency = 880, duration = 500) {

                }

            if (audioContext.state === 'suspended') {

            }
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                gainNode.gain.value = 0.3;
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration / 1000);
                oscillator.stop(audioContext.currentTime + duration / 1000);
            } catch (e) {
                console.error('音频播放失败:', e);
            }
        }

        function getFestival(solarY, solarM, solarD, lunarM, lunarD, lunarYear) {
            const solarKey = `${String(solarM).padStart(2, '0')}-${String(solarD).padStart(2, '0')}`;
            const lunarKey = `${String(lunarM).padStart(2, '0')}-${String(lunarD).padStart(2, '0')}`;
            let festival = festivalData.solar[solarKey] || festivalData.lunar[lunarKey] || '';
            if (lunarM === 12) {
                const lastDayOfLunarMonth = monthDays(lunarYear, 12);
                if (lunarD === lastDayOfLunarMonth) {
                    festival = '除夕';
                }
            }
            return festival;
        }
        function formatDate(y, m, d, week) {
            const mStr = String(m).padStart(2, '0');
            const dStr = String(d).padStart(2, '0');
            switch (settings.dateFormat) {
                case 'mdy': return `${mStr}/${dStr}/${y} ${week}`;
                case 'dmy': return `${dStr}/${mStr}/${y} ${week}`;
                default: return `${y}-${mStr}-${dStr} ${week}`;

        function toggleFullScreen() {
            const doc = document.documentElement;
            if (!document.fullscreenElement) {
                (doc.requestFullscreen || doc.webkitRequestFullScreen || doc.mozRequestFullScreen || doc.msRequestFullscreen).call(doc)
                .then(() => {
                    showToast('已进入全屏模式');
                    if (isMobile()) {
                        showToast('建议横屏使用，获得更佳体验', 4000);
                    }
                })
                .catch(err => {
                    console.error('全屏开启失败:', err);
                    showToast('全屏开启失败，请检查浏览器权限');
                });
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document)
                .then(() => showToast('已退出全屏模式'));
            }

        function initAutoFullscreen() {
            if (!settings.autoFullscreen) return;
            let lastClickTime = 0;
            if (fullscreenHandler) {
                document.removeEventListener('click', fullscreenHandler);
            }
            fullscreenHandler = (e) => {
                const target = e.target;
                const isInteractiveElement = 
                    target.tagName === 'INPUT' || 
                    target.tagName === 'BUTTON' || 
                    target.tagName === 'SELECT' || 
                    target.tagName === 'TEXTAREA' || 
                    target.tagName === 'A' || 
                    target.closest('button, input, select, textarea, a, .custom-select, .switch, .tab-item, .theme-item, .select-option');
                if (isInteractiveElement) {
                    return;
                }
                const currentTime = Date.now();
                if (isMobile()) {
                    if (currentTime - lastClickTime < 300) {
                        if (!document.fullscreenElement) {
                            toggleFullScreen();
                        }
                    }
                    lastClickTime = currentTime;
                } 
                else {
                    if (!document.fullscreenElement) {
                        toggleFullScreen();
                        document.removeEventListener('click', fullscreenHandler);
                    }
                }
            };
            document.addEventListener('click', fullscreenHandler);
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement && settings.autoFullscreen) {
                    document.getElementById('autoFullscreenSwitch').checked = false;
                    settings.autoFullscreen = false;
                    saveSettings();
                }
            });
        }
        async function toggleWakeLock(enable) {
            if (!('wakeLock' in navigator)) {
                showToast('当前浏览器不支持屏幕常亮功能');
                document.getElementById('wakeLockSwitch').checked = false;
                settings.wakeLock = false;
                saveSettings();
                return;
            }
            if (enable) {
                try { 
                    wakeLock = await navigator.wakeLock.request('screen');
                    showToast('屏幕常亮已开启');
                } catch (err) {
                    console.error('屏幕常亮开启失败:', err);
                    showToast('屏幕常亮开启失败，请检查浏览器权限');
                    document.getElementById('wakeLockSwitch').checked = false;
                    settings.wakeLock = false;
                    saveSettings();
                }
            } else {
                if (wakeLock !== null) { 
                    await wakeLock.release(); 
                    wakeLock = null;
                    showToast('屏幕常亮已关闭');
                }
            }
        }

                const options = select.querySelectorAll('.select-option');
                trigger.addEventListener('click', (e) => {

                    document.querySelectorAll('.select-trigger.open').forEach(item => {

                });

                    option.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const value = option.dataset.value;
                        const text = option.textContent;
                        trigger.dataset.value = value;
                        trigger.textContent = text;
                        options.forEach(opt => opt.classList.remove('selected'));
                        option.classList.add('selected');
                        trigger.classList.remove('open');
                        dropdown.classList.remove('open');
                        select.dispatchEvent(new CustomEvent('change', { detail: { value, text } }));

        const stopwatch = {

        function formatStopwatchTime(ms) {
            const hours = String(Math.floor(ms / 3600000)).padStart(2, '0');
            const minutes = String(Math.floor((ms % 3600000) / 60000)).padStart(2, '0');
            const seconds = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
            const centiseconds = String(Math.floor((ms % 1000) / 10)).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}.${centiseconds}`;
        }
        function updateStopwatch() {
            const currentTime = Date.now();
            stopwatch.elapsedTime = currentTime - stopwatch.startTime;
            document.getElementById('stopwatchDisplay').textContent = formatStopwatchTime(stopwatch.elapsedTime);
            stopwatch.timer = requestAnimationFrame(updateStopwatch);
        }
        function toggleStopwatch() {
            const startBtn = document.getElementById('stopwatchStartBtn');
            const lapBtn = document.getElementById('lapBtn');
            const resetBtn = document.getElementById('stopwatchResetBtn');
            if (!stopwatch.isRunning) {
                stopwatch.startTime = Date.now() - stopwatch.elapsedTime;
                updateStopwatch();
                stopwatch.isRunning = true;
                startBtn.textContent = '暂停';
                startBtn.classList.remove('primary');
                startBtn.classList.add('danger');
                lapBtn.disabled = false;

                startBtn.classList.remove('danger');
                startBtn.classList.add('primary');
                lapBtn.disabled = true;
                showToast('秒表已暂停');

        function addStopwatchLap() {

            lapList.prepend(lapItem);

            vibrate(100);

        function resetStopwatch() {

        const countdown = {
            totalSeconds: 0,
            remainingSeconds: 0,
            timer: null,
            isRunning: false
        };
        function formatCountdownTime(seconds) {
            const hours = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            return `${hours}:${minutes}:${secs}`;
        }

        // 修复后的倒计时更新函数（含音频触发）
        function updateCountdown() {
            if (countdown.remainingSeconds <= 0) {
                clearInterval(countdown.timer);
                countdown.isRunning = false;
                document.getElementById('countdownDisplay').textContent = '00:00:00';
                document.getElementById('countdownStartBtn').textContent = '开始';
                document.getElementById('countdownSetting').style.display = 'flex';
                document.getElementById('countdownDisplay').style.display = 'none';
                // 倒计时结束触发提示音+震动
                playBeep(1000, 1000);
                vibrate([200, 100, 200, 100, 200]);
                showToast('倒计时结束！', 5000);
                document.querySelectorAll('.time-input').forEach(input => {
                    input.disabled = false;
                });
                return;
            }
            document.getElementById('countdownDisplay').textContent = formatCountdownTime(countdown.remainingSeconds);
            countdown.remainingSeconds--;
        }

        function toggleCountdown() {
            const startBtn = document.getElementById('countdownStartBtn');
            const hourInput = document.getElementById('countdownHour');
            const minuteInput = document.getElementById('countdownMinute');
            const secondInput = document.getElementById('countdownSecond');
            const settingPanel = document.getElementById('countdownSetting');
            const displayPanel = document.getElementById('countdownDisplay');
            const inputs = [hourInput, minuteInput, secondInput];
            if (!countdown.isRunning) {
                if (countdown.remainingSeconds === 0) {
                    const hours = Math.max(0, parseInt(hourInput.value) || 0);
                    const minutes = Math.max(0, parseInt(minuteInput.value) || 0);
                    const seconds = Math.max(0, parseInt(secondInput.value) || 0);
                    countdown.totalSeconds = hours * 3600 + minutes * 60 + seconds;
                    if (countdown.totalSeconds <= 0) {
                        showToast('请设置有效的倒计时时间');
                        vibrate();
                        return;
                    }
                    countdown.remainingSeconds = countdown.totalSeconds;
                    settingPanel.style.display = 'none';
                    displayPanel.style.display = 'block';
                    displayPanel.textContent = formatCountdownTime(countdown.remainingSeconds);
                }
                countdown.timer = setInterval(updateCountdown, 1000);
                countdown.isRunning = true;
                startBtn.textContent = '暂停';
                startBtn.classList.remove('primary');
                startBtn.classList.add('danger');
                inputs.forEach(input => input.disabled = true);
                showToast('倒计时已开始');
            } else {
                clearInterval(countdown.timer);
                countdown.isRunning = false;
                startBtn.textContent = '继续';
                startBtn.classList.remove('danger');
                startBtn.classList.add('primary');
                showToast('倒计时已暂停');
            }
            vibrate();
        }

        function applyTheme(themeName) {
            const theme = themeConfig[themeName];
            if (!theme) return;
            Object.keys(theme).forEach(key => { document.documentElement.style.setProperty(key, theme[key]); });
            document.querySelectorAll('.theme-item').forEach(item => { item.classList.toggle('active', item.dataset.theme === themeName); });
            document.documentElement.setAttribute('data-theme', themeName);
            settings.theme = themeName;
            saveSettings();
        }
        function updateProgress() {
            const now = new Date();
            let total, passed, progress, text;
            switch (settings.progressType) {
                case 'day':
                    total = 24 * 60 * 60 * 1000;
                    passed = now.getHours() * 60 * 60 * 1000 + now.getMinutes() * 60 * 1000 + now.getSeconds() * 1000;
                    progress = (passed / total) * 100;
                    text = `今日已过 ${progress.toFixed(2)}%`;
                    break;
                case 'week':
                    total = 7 * 24 * 60 * 60 * 1000;
                    const dayOfWeek = now.getDay() || 7;
                    passed = (dayOfWeek - 1) * 24 * 60 * 60 * 1000 + now.getHours() * 60 * 60 * 1000 + now.getMinutes() * 60 * 1000 + now.getSeconds() * 1000;
                    progress = (passed / total) * 100;
                    text = `本周已过 ${progress.toFixed(2)}%`;
                    break;
                default:
                    const yearStart = new Date(now.getFullYear(), 0, 1);
                    const yearEnd = new Date(now.getFullYear() + 1, 0, 1);
                    total = yearEnd - yearStart;
                    passed = now - yearStart;
                    progress = (passed / total) * 100;
                    text = `本年度已过 ${progress.toFixed(2)}%`;
            }
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = text;
        }

        // 修复后的整点报时函数（解决漏检问题）
        function clockAlert() {
            if (!settings.clockAlert) return;
            const now = new Date();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const currentHourKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}-${now.getHours()}`;
            
            // 放宽触发窗口，整点0-2秒内均可触发，避免定时器延迟漏检
            if (minutes === 0 && seconds <= 2 && currentHourKey !== lastAlertTime) {
                lastAlertTime = currentHourKey;
                playBeep(880, 500);
                vibrate(200);
                showToast(`现在是${now.getHours()}点整`, 4000);
            }
        }

        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            let ampm = 'AM';
            if (settings.is12Hour) {
                ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours === 0 ? 12 : hours;
            }
            hours = String(hours).padStart(2, '0');
            document.getElementById('ampm').textContent = ampm;
            document.getElementById('time').textContent = settings.showSecond ? `${hours}:${minutes}:${seconds}` : `${hours}:${minutes}`;
            const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
            const week = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'][now.getDay()];
            document.getElementById('date').innerHTML = formatDate(y, m, d, week) + `<span class="festival" id="festival"></span>`;
            const festivalElement = document.getElementById('festival');
            festivalElement.textContent = '';
            if (settings.showLunar) {
                const lunar = solarToLunar(y, m, d);
                if (lunar && Object.keys(lunar).length > 0) {
                    const festival = getFestival(y, m, d, lunar.month, lunar.day, lunar.year);
                    festivalElement.textContent = festival ? ` ${festival}` : '';
                    let lunarStr = `${lunar.ganzhi}${lunar.animal}年 ${lunar.monthStr}${lunar.dayStr}`;
                    if (lunar.term) lunarStr += ` | ${lunar.term}`;
                    document.getElementById('lunar').textContent = lunarStr;
                }
            }
            clockAlert();
            updateProgress();
        }

            document.querySelectorAll('.time-input').forEach(input => {
                input.addEventListener('click', (e) => e.stopPropagation());
                input.addEventListener('touchstart', (e) => e.stopPropagation());
            });

            // 页面可见性变化时立即同步时间，避免后台降频导致漏检
            document.addEventListener('visibilitychange', async () => {
                if (document.visibilityState === 'visible') {
                    updateTime();
                    if (settings.wakeLock && wakeLock === null) {
                        try { 
                            wakeLock = await navigator.wakeLock.request('screen'); 
                        }
                        catch (err) { 
                            console.error('屏幕常亮重新申请失败:', err);
                            document.getElementById('wakeLockSwitch').checked = false;
                            settings.wakeLock = false;
                            saveSettings();
                        }
                    }
                    if (stopwatch.isRunning) updateStopwatch();
                    if (countdown.isRunning) {
                        clearInterval(countdown.timer);
                        countdown.timer = setInterval(updateCountdown, 1000);
                    }
                } else {
                    if (stopwatch.isRunning) cancelAnimationFrame(stopwatch.timer);
                    if (countdown.isRunning) clearInterval(countdown.timer);
                    if (wakeLock !== null) {
                        try {
                            await wakeLock.release();
                            wakeLock = null;
                        } catch (e) {
                            console.error('屏幕常亮释放失败:', e);
                        }
                    }
                }
            });

            window.addEventListener('resize', () => {
                updateTime();
                document.getElementById('settingsPanel').classList.remove('active');
            });
            document.addEventListener('fullscreenchange', () => {
                updateTime();
                document.getElementById('settingsPanel').classList.remove('active');
            });
        });
    </script>
</body>
</html>
