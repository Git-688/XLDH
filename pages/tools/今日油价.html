<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日全国油价查询</title>
  <style>
    /* 全局样式与变量定义 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    :root {
      --primary-color: #2563eb;
      --up-color: #dc2626;
      --down-color: #059669;
      --flat-color: #6b7280;
      --card-bg: #ffffff;
      --body-bg: #f3f4f6;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --border-radius: 12px;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    body {
      background-color: var(--body-bg);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      padding: 20px 16px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 头部区域样式 */
    .header {
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 8px;
    }

    .header .sub-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
    }

    .update-time {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .region-select {
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .region-select:focus {
      border-color: var(--primary-color);
    }

    /* 加载与错误提示 */
    .loading, .error {
      text-align: center;
      padding: 40px 20px;
      font-size: 16px;
      color: var(--text-secondary);
    }

    .error {
      color: var(--up-color);
    }

    /* 油价列表响应式网格 */
    .oil-list {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    /* 平板适配 */
    @media (min-width: 768px) {
      .oil-list {
        grid-template-columns: repeat(2, 1fr);
      }
      .header h1 {
        font-size: 32px;
      }
    }

    /* 电脑端适配 */
    @media (min-width: 1200px) {
      .oil-list {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* 油价卡片样式 */
    .oil-card {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 20px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .oil-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .oil-card .region-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }

    .oil-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 4px 0;
    }

    .oil-item:last-child {
      margin-bottom: 0;
    }

    .oil-name {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .oil-price {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-right: 8px;
    }

    .oil-change {
      font-size: 12px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 50px;
      text-align: right;
    }

    .oil-change.up {
      color: var(--up-color);
      background-color: rgba(220, 38, 38, 0.1);
    }

    .oil-change.down {
      color: var(--down-color);
      background-color: rgba(5, 150, 105, 0.1);
    }

    .oil-change.flat {
      color: var(--flat-color);
      background-color: rgba(107, 114, 128, 0.1);
    }

    .oil-price-none {
      color: var(--text-secondary);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面头部 -->
    <div class="header">
      <h1>今日全国油价查询</h1>
      <div class="sub-info">
        <div class="update-time" id="updateTime">数据更新中...</div>
        <select class="region-select" id="regionSelect">
          <option value="all">全部省份</option>
        </select>
      </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading" id="loading">正在加载油价数据...</div>

    <!-- 错误提示 -->
    <div class="error" id="error" style="display: none;">数据加载失败，请稍后刷新重试</div>

    <!-- 油价列表容器 -->
    <div class="oil-list" id="oilList" style="display: none;"></div>
  </div>

  <script>
    // 接口配置
    const API_URL = 'https://v2.xxapi.cn/api/oilPrice';
    // 油品配置项，可按需调整顺序
    const OIL_CONFIG = [
      { key: 'n89', name: '89#汽油', changeKey: 'n89Change' },
      { key: 'n92', name: '92#汽油', changeKey: 'n92Change' },
      { key: 'n95', name: '95#汽油', changeKey: 'n95Change' },
      { key: 'n98', name: '98#汽油', changeKey: 'n98Change' },
      { key: 'n0', name: '0#柴油', changeKey: 'n0Change' }
    ];

    // 全局存储原始数据
    let oilData = [];

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', () => {
      fetchOilData();
      // 绑定省份筛选事件
      document.getElementById('regionSelect').addEventListener('change', (e) => {
        renderOilList(e.target.value);
      });
    });

    /**
     * 请求油价接口数据
     */
    async function fetchOilData() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const listEl = document.getElementById('oilList');
      const timeEl = document.getElementById('updateTime');

      try {
        const response = await fetch(API_URL);
        // 处理HTTP请求错误
        if (!response.ok) {
          throw new Error(`接口请求失败：${response.status}`);
        }
        const res = await response.json();
        // 处理业务逻辑错误
        if (res.code !== 200) {
          throw new Error(res.msg || '数据获取失败');
        }

        // 保存原始数据
        oilData = res.data || [];
        if (oilData.length === 0) {
          throw new Error('暂无可用的油价数据');
        }

        // 更新数据时间
        const updateDate = oilData[0]?.date || '';
        timeEl.textContent = `数据更新时间：${updateDate}`;

        // 生成省份下拉选项
        renderRegionSelect();
        // 渲染油价列表
        renderOilList('all');

        // 切换显示状态
        loadingEl.style.display = 'none';
        errorEl.style.display = 'none';
        listEl.style.display = 'grid';

      } catch (err) {
        console.error('获取油价数据失败：', err);
        // 显示错误提示
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.textContent = err.message || '数据加载失败，请稍后刷新重试';
      }
    }

    /**
     * 生成省份筛选下拉框
     */
    function renderRegionSelect() {
      const selectEl = document.getElementById('regionSelect');
      // 清空原有选项，保留「全部」
      selectEl.innerHTML = '<option value="all">全部省份</option>';
      // 按省份拼音排序
      const sortedData = [...oilData].sort((a, b) => a.regionName.localeCompare(b.regionName, 'zh-CN'));
      // 生成选项
      sortedData.forEach(item => {
        const option = document.createElement('option');
        option.value = item.regionName;
        option.textContent = item.regionName;
        selectEl.appendChild(option);
      });
    }

    /**
     * 渲染油价列表
     * @param {string} selectedRegion - 选中的省份名称，all为全部
     */
    function renderOilList(selectedRegion) {
      const listEl = document.getElementById('oilList');
      // 过滤数据
      let filterData = [...oilData];
      if (selectedRegion !== 'all') {
        filterData = filterData.filter(item => item.regionName === selectedRegion);
      }
      // 按省份拼音排序
      filterData.sort((a, b) => a.regionName.localeCompare(b.regionName, 'zh-CN'));

      // 生成列表HTML
      let html = '';
      filterData.forEach(region => {
        html += `<div class="oil-card">
          <div class="region-name">${region.regionName}</div>
          ${generateOilItemHtml(region)}
        </div>`;
      });

      listEl.innerHTML = html;
    }

    /**
     * 生成单个省份的油品项HTML
     * @param {object} region - 省份油价数据
     * @returns {string} 油品项HTML
     */
    function generateOilItemHtml(region) {
      let html = '';
      OIL_CONFIG.forEach(oil => {
        const price = region[oil.key];
        const change = region[oil.changeKey];

        // 处理无数据的情况
        if (price === 0) {
          html += `<div class="oil-item">
            <span class="oil-name">${oil.name}</span>
            <span class="oil-price-none">暂无</span>
          </div>`;
          return;
        }

        // 处理涨跌状态
        let changeClass = 'flat';
        let changeText = '0.00 -';
        if (change > 0) {
          changeClass = 'up';
          changeText = `+${change.toFixed(2)} ↑`;
        } else if (change < 0) {
          changeClass = 'down';
          changeText = `${change.toFixed(2)} ↓`;
        }

        // 生成油品项
        html += `<div class="oil-item">
          <span class="oil-name">${oil.name}</span>
          <div>
            <span class="oil-price">${price.toFixed(2)}</span>
            <span class="oil-change ${changeClass}">${changeText}</span>
          </div>
        </div>`;
      });
      return html;
    }
  </script>
</body>
</html>
