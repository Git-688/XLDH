<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子女血型查询</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center py-10 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-6">
    <h1 class="text-[#2563eb] text-center text-2xl font-bold mb-6">
      <i class="fa-solid fa-droplet mr-2"></i>子女血型预测
    </h1>

    <!-- 表单 -->
    <div class="space-y-5">
      <div>
        <label class="block text-gray-700 font-medium mb-2">父亲血型</label>
        <select id="father" class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">请选择血型</option>
          <option value="A">A型</option>
          <option value="B">B型</option>
          <option value="O">O型</option>
          <option value="AB">AB型</option>
        </select>
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">母亲血型</label>
        <select id="mother" class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">请选择血型</option>
          <option value="A">A型</option>
          <option value="B">B型</option>
          <option value="O">O型</option>
          <option value="AB">AB型</option>
        </select>
      </div>

      <button id="queryBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        立即查询
      </button>
    </div>

    <!-- 加载 -->
    <div id="loading" class="hidden text-center text-blue-600 mt-6">
      <i class="fa-solid fa-spinner fa-spin mr-2"></i>查询中...
    </div>

    <!-- 结果 -->
    <div id="result" class="hidden mt-6 space-y-4">
      <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
        <h3 class="font-semibold text-green-700 mb-2">
          <i class="fa-solid fa-check-circle mr-1"></i>子女可能血型
        </h3>
        <p id="possible" class="text-gray-800"></p>
      </div>

      <div class="p-4 bg-red-50 border border-red-200 rounded-lg">
        <h3 class="font-semibold text-red-700 mb-2">
          <i class="fa-solid fa-times-circle mr-1"></i>子女不可能血型
        </h3>
        <p id="impossible" class="text-gray-800"></p>
      </div>
    </div>

    <!-- 错误 -->
    <div id="error" class="hidden text-red-500 text-center mt-6"></div>
  </div>

  <script>
    const btn = document.getElementById('queryBtn')
    const father = document.getElementById('father')
    const mother = document.getElementById('mother')
    const loading = document.getElementById('loading')
    const result = document.getElementById('result')
    const error = document.getElementById('error')
    const possible = document.getElementById('possible')
    const impossible = document.getElementById('impossible')

    btn.addEventListener('click', async () => {
      const f = father.value.trim()
      const m = mother.value.trim()

      if (!f || !m) {
        error.textContent = '请选择父母双方血型！'
        error.classList.remove('hidden')
        result.classList.add('hidden')
        return
      }

      // 隐藏状态
      error.classList.add('hidden')
      result.classList.add('hidden')
      loading.classList.remove('hidden')

      try {
        const res = await fetch(`https://api.lolimi.cn/API/xxjc/api?father=${f}&mother=${m}`)
        const data = await res.json()

        if (data.code === 1) {
          // 可能血型
          const pList = data.data.possible || []
          possible.textContent = pList.join('、') || '无'

          // 不可能血型
          const imList = Object.values(data.data.impossible || {})
          impossible.textContent = imList.join('、') || '无'

          result.classList.remove('hidden')
        } else {
          error.textContent = data.text || '查询失败'
          error.classList.remove('hidden')
        }
      } catch (err) {
        error.textContent = '网络异常，请重试'
        error.classList.remove('hidden')
      } finally {
        loading.classList.add('hidden')
      }
    })
  </script>
</body>
</html>
