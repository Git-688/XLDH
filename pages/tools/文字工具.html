<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多功能文字工具</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 隐藏滚动条 */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 全局默认字体大小 + 统一无衬线字体，消除渲染差异 */
    body {
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    /* 字典区域核心对齐样式：Flex布局彻底解决对齐问题 */
    .ciyu-item {
      display: flex;
      align-items: flex-start; /* 顶部对齐，适配内容换行 */
      line-height: 1.6; /* 统一行高，纵向整齐 */
      gap: 4px; /* 标题和内容固定间距，避免偏移 */
    }
    .ciyu-item-title {
      flex-shrink: 0; /* 固定宽度，不被内容挤压 */
      width: 60px; /* 精准固定宽度，所有标题对齐 */
      color: #4b5563;
      font-weight: 500;
    }
    .ciyu-item-content {
      flex: 1; /* 占满剩余空间，内容自适应 */
      word-break: break-all; /* 超长文本换行，不溢出 */
      text-wrap: balance; /* 换行后字符均匀，视觉更整齐 */
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-3 md:p-6 text-gray-700">
  <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm p-5 md:p-6">
    <h1 class="text-[clamp(1.2rem,3vw,1.4rem)] font-bold text-center text-gray-800 mb-4">多功能文字工具</h1>
    
    <!-- 可滚动的功能选择Tab - 新增：简繁互转 -->
    <div class="flex flex-nowrap gap-1 overflow-x-auto scrollbar-hide rounded-lg bg-gray-50 p-1 mb-4">
      <button id="tabPinyin" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-white bg-blue-600 transition">文字转拼音</button>
      <button id="tabJinfan" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">近反义词</button>
      <button id="tabHanzi" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">汉字查询</button>
      <button id="tabFenci" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">中文分词</button>
      <button id="tabMeansearch" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">据意查句</button>
      <button id="tabSzsy" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">三字俗语</button>
      <button id="tabCiyu" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">词语字典</button>
      <button id="tabCyjl" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">成语接龙</button>
      <button id="tabChacy" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">成语字典</button>
      <button id="tabJfzh" class="flex-shrink-0 min-w-[75px] py-1.5 px-3 rounded-md font-medium text-sm text-gray-600 hover:bg-gray-100 transition">简繁互转</button>
    </div>

    <!-- 据意查句模式选择器 -->
    <div id="meansearchMode" class="hidden flex justify-center mb-3 gap-2">
      <button class="meanModeBtn active py-1 px-3 rounded-md bg-blue-600 text-white text-xs" data-type="现代文">现代文</button>
      <button class="meanModeBtn py-1 px-3 rounded-md bg-gray-100 text-gray-600 text-xs" data-type="古诗文">古诗文</button>
    </div>

    <!-- 新增：简繁互转模式选择器 -->

      <button class="jfzhModeBtn py-1 px-3 rounded-md bg-gray-100 text-gray-600 text-xs" data-type="2">繁体转简体</button>

        <div class="ciyu-item">
          <span class="ciyu-item-title">成语：</span>

        </div>
        <div class="ciyu-item">
          <span class="ciyu-item-title">首字：</span>
          <span class="ciyu-item-content" id="chacyShouzi">暂无</span>
        </div>
        <div class="ciyu-item">
          <span class="ciyu-item-title">部首：</span>

        <div class="ciyu-item">

        <div class="ciyu-item">

        </div>
        <div class="ciyu-item">

          <span class="ciyu-item-content" id="chacyChuchu">暂无</span>
        </div>
        <div class="ciyu-item">

        <div class="grid grid-cols-3 gap-2">

        <div>

          <div id="hanziWords" class="flex flex-wrap gap-1.5"></div>
        </div>

      <!-- 中文分词结果 -->
      <div id="fenciResult" class="p-3 bg-gray-50 rounded-lg text-center hidden">
        <div id="fenciTags" class="flex flex-wrap justify-center gap-1.5 mt-1"></div>
      </div>
      
      <!-- 据意查句结果 -->

        <p class="text-center text-gray-600 mb-2 text-xs" id="meansearchType"></p>
        <div id="meansearchList" class="space-y-2.5"></div>

      <!-- 三字俗语结果 -->

        <h3 class="text-xl font-bold text-center" id="szsyWord"></h3>

          <p class="font-medium text-gray-700 mb-1 text-xs">释义</p>
          <p id="szsyDefinition" class="text-gray-800"></p>

        <div class="bg-blue-50 p-3 rounded-lg">

          <p class="text-gray-800 w-full" id="jfzhContent">暂无转换结果</p>
        </div>

    <!-- 提示文字 -->

  <script>
    // DOM元素获取 - 新增：简繁互转DOM
    const textInput = document.getElementById('textInput')
    const convertBtn = document.getElementById('convertBtn')
    const result = document.getElementById('result')
    const tip = document.getElementById('tip')
    // Tab按钮 - 新增：tabJfzh
    const tabPinyin = document.getElementById('tabPinyin')
    const tabJinfan = document.getElementById('tabJinfan')
    const tabHanzi = document.getElementById('tabHanzi')
    const tabFenci = document.getElementById('tabFenci')
    const tabMeansearch = document.getElementById('tabMeansearch')
    const tabSzsy = document.getElementById('tabSzsy')
    const tabCiyu = document.getElementById('tabCiyu')
    const tabCyjl = document.getElementById('tabCyjl')
    const tabChacy = document.getElementById('tabChacy')
    const tabJfzh = document.getElementById('tabJfzh')
    // 模式选择器
    const meansearchMode = document.getElementById('meansearchMode')
    const jfzhMode = document.getElementById('jfzhMode')
    const meanModeBtns = document.querySelectorAll('.meanModeBtn')
    const jfzhModeBtns = document.querySelectorAll('.jfzhModeBtn')
    // 结果容器 - 新增：jfzhResult
    const pinyinResult = document.getElementById('pinyinResult')
    const jinfanResult = document.getElementById('jinfanResult')
    const ciyuResult = document.getElementById('ciyuResult')
    const cyjlResult = document.getElementById('cyjlResult')
    const chacyResult = document.getElementById('chacyResult')
    const hanziResult = document.getElementById('hanziResult')
    const fenciResult = document.getElementById('fenciResult')
    const meansearchResult = document.getElementById('meansearchResult')
    const szsyResult = document.getElementById('szsyResult')
    const jfzhResult = document.getElementById('jfzhResult')
    // 简繁互转子元素
    const jfzhContent = document.getElementById('jfzhContent')
    // 词语字典子元素
    const ciyuPinyin = document.getElementById('ciyuPinyin')
    const ciyuCx = document.getElementById('ciyuCx')
    const ciyuZhuyin = document.getElementById('ciyuZhuyin')
    const ciyuFirstLetter = document.getElementById('ciyuFirstLetter')
    const ciyuContent = document.getElementById('ciyuContent')
    const ciyuWljs = document.getElementById('ciyuWljs')
    // 成语接龙子元素
    const cyjlWords = document.getElementById('cyjlWords')
    const cyjlShouzi = document.getElementById('cyjlShouzi')
    const cyjlBushou = document.getElementById('cyjlBushou')
    const cyjlPingyin = document.getElementById('cyjlPingyin')
    const cyjlJieshi = document.getElementById('cyjlJieshi')
    const cyjlChuchu = document.getElementById('cyjlChuchu')
    const cyjlTongyi = document.getElementById('cyjlTongyi')
    const cyjlFanyi = document.getElementById('cyjlFanyi')
    const cyjlLiju = document.getElementById('cyjlLiju')
    const cyjlYinzheng = document.getElementById('cyjlYinzheng')
    const cyjlYufa = document.getElementById('cyjlYufa')
    const cyjlEn = document.getElementById('cyjlEn')
    // 成语字典子元素
    const chacyWords = document.getElementById('chacyWords')
    const chacyShouzi = document.getElementById('chacyShouzi')
    const chacyBushou = document.getElementById('chacyBushou')
    const chacyPingyin = document.getElementById('chacyPingyin')
    const chacyJieshi = document.getElementById('chacyJieshi')
    const chacyChuchu = document.getElementById('chacyChuchu')
    const chacyTongyi = document.getElementById('chacyTongyi')
    const chacyFanyi = document.getElementById('chacyFanyi')
    const chacyLiju = document.getElementById('chacyLiju')
    const chacyYinzheng = document.getElementById('chacyYinzheng')
    const chacyYufa = document.getElementById('chacyYufa')
    const chacyEn = document.getElementById('chacyEn')
    // 近反义词元素
    const cjResult = document.getElementById('cjResult')
    const jycResult = document.getElementById('jycResult')
    const fycResult = document.getElementById('fycResult')
    // 汉字查询元素
    const hanziTitle = document.getElementById('hanziTitle')
    const hanziPinyinText = document.getElementById('hanziPinyinText')
    const hanziAudioBtn = document.getElementById('hanziAudioBtn')
    const hanziRadical = document.getElementById('hanziRadical')
    const hanziStrokes = document.getElementById('hanziStrokes')
    const hanziStructure = document.getElementById('hanziStructure')
    const hanziGif = document.getElementById('hanziGif')
    const hanziMeaning = document.getElementById('hanziMeaning')
    const hanziWords = document.getElementById('hanziWords')
    // 分词元素
    const fenciTags = document.getElementById('fenciTags')
    // 据意查句元素
    const meansearchType = document.getElementById('meansearchType')
    const meansearchList = document.getElementById('meansearchList')
    // 三字俗语元素
    const szsyWord = document.getElementById('szsyWord')
    const szsyDefinition = document.getElementById('szsyDefinition')
    const szsyExample = document.getElementById('szsyExample')
    
    // 全局变量 - 新增：currentJfzhType(简繁互转模式，1=简转繁 2=繁转简)
    let currentTab = 'pinyin'
    let currentMeanType = '现代文'
    let currentJfzhType = '1'
    let currentAudio = null
    // 优化版：移除HTML标签+清理空白+规整换行，保证文字整洁
    function formatText(str) {
      if (!str || str === 'null' || str === 'undefined') return '暂无'
      // 移除所有HTML标签 + 清理多余空白
      let pureText = str.replace(/<[^>]+>/g, '').trim().replace(/\s+/g, ' ')
      return pureText
    }
    
    // Tab切换逻辑 - 新增：tabJfzh加入tabList
    const tabList = [tabPinyin, tabJinfan, tabHanzi, tabFenci, tabMeansearch, tabSzsy, tabCiyu, tabCyjl, tabChacy, tabJfzh]
    tabList.forEach(tab => {
      tab.addEventListener('click', () => {
        const tabType = tab.id.replace('tab', '').toLowerCase()
        if (currentTab === tabType) return
        currentTab = tabType
        // 更新Tab样式
        tabList.forEach(t => {
          if (t === tab) {
            t.classList.add('bg-blue-600', 'text-white')
            t.classList.remove('text-gray-600', 'hover:bg-gray-100')
          } else {
            t.classList.remove('bg-blue-600', 'text-white')
            t.classList.add('text-gray-600', 'hover:bg-gray-100')
          }
        })
        // 更新页面状态
        updatePageByTab()
        resetContent()
      })
    })

    // 据意查句模式切换
    meanModeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        meanModeBtns.forEach(b => {
          b.classList.remove('active', 'bg-blue-600', 'text-white')
          b.classList.add('bg-gray-100', 'text-gray-600')
        })
        btn.classList.add('active', 'bg-blue-600', 'text-white')
        btn.classList.remove('bg-gray-100', 'text-gray-600')
        currentMeanType = btn.dataset.type
      })
    })

    // 新增：简繁互转模式切换
    jfzhModeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        jfzhModeBtns.forEach(b => {
          b.classList.remove('active', 'bg-blue-600', 'text-white')
          b.classList.add('bg-gray-100', 'text-gray-600')
        })
        btn.classList.add('active', 'bg-blue-600', 'text-white')
        btn.classList.remove('bg-gray-100', 'text-gray-600')
        currentJfzhType = btn.dataset.type
      })
    })

    // 根据Tab更新页面 - 新增：jfzh分支配置
    function updatePageByTab() {
      switch(currentTab) {
        case 'pinyin':
          convertBtn.textContent = '转换为拼音'
          textInput.placeholder = '例如：你知道我讨厌你吗'
          textInput.disabled = false
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'jinfan':
          convertBtn.textContent = '查询近反义词'
          textInput.placeholder = '例如：害怕'
          textInput.disabled = false
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'hanzi':
          convertBtn.textContent = '查询汉字'
          textInput.placeholder = '例如：慕'
          textInput.disabled = false
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'fenci':
          convertBtn.textContent = '开始分词'
          textInput.placeholder = '例如：今天天气真不错'
          textInput.disabled = false
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'meansearch':
          convertBtn.textContent = '查询句子'
          textInput.placeholder = '例如：树立远大志向'
          textInput.disabled = false
          meansearchMode.classList.remove('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'szsy':
          convertBtn.textContent = '随机获取三字俗语'
          textInput.placeholder = '无需输入内容，直接点击查询即可'
          textInput.disabled = true
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'ciyu':
          convertBtn.textContent = '查询词语释义'
          textInput.placeholder = '例如：宇宙'
          textInput.disabled = false
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'cyjl':
          convertBtn.textContent = '开始成语接龙'
          textInput.placeholder = '例如：天'
          textInput.disabled = false
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'chacy':
          convertBtn.textContent = '查询成语详情'
          textInput.placeholder = '例如：天马行空'
          textInput.disabled = false
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.add('hidden')
          break
        case 'jfzh':
          convertBtn.textContent = '开始简繁互转'
          textInput.placeholder = '例如：两个黄鹂鸣翠柳'
          textInput.disabled = false
          meansearchMode.classList.add('hidden')
          jfzhMode.classList.remove('hidden')
          break
      }
    }

    // 核心查询逻辑 - 新增：jfzh接口请求
    convertBtn.addEventListener('click', async () => {
      const text = textInput.value.trim()
      // 非三字俗语需要校验输入
      if (currentTab !== 'szsy' && !text) {
        showTip('请输入需要处理的内容')
        return
      }
      // 加载状态
      convertBtn.disabled = true
      convertBtn.textContent = currentTab === 'szsy' ? '获取中...' : '查询中...'
      showTip('')
      result.classList.add('hidden')
      // 隐藏所有结果容器 - 新增：jfzhResult加入allResult
      const allResult = [pinyinResult, jinfanResult, ciyuResult, cyjlResult, chacyResult, hanziResult, fenciResult, meansearchResult, szsyResult, jfzhResult]
      allResult.forEach(item => item.classList.add('hidden'))
      try {
        switch(currentTab) {
          // 拼音转换
          case 'pinyin':
            const pinyinRes = await fetch(`https://api.pearktrue.cn/api/pinyin/?text=${encodeURIComponent(text)}`)
            const pinyinData = await pinyinRes.json()
            if (pinyinData.code === 200 && pinyinData.data?.pinyin) {
              renderPinyinResult(pinyinData.data.pinyin)
              result.classList.remove('hidden')
              pinyinResult.classList.remove('hidden')
            } else {
              showTip('转换失败：' + pinyinData.msg)
            }
            break
          // 近反义词查询
          case 'jinfan':
            const jinfanRes = await fetch(`https://cn.apihz.cn/api/zici/jfc.php?id=10014221&key=4a7768de1cf2e0f41fc0a4005240c837&words=${encodeURIComponent(text)}`)
            const jinfanData = await jinfanRes.json()
            if (jinfanData.code === 200) {
              renderJinfanResult(jinfanData)
              result.classList.remove('hidden')
              jinfanResult.classList.remove('hidden')
            } else {
              showTip('查询失败：' + jinfanData.msg)
            }
            break
          // 词语字典查询逻辑
          case 'ciyu':
            const ciyuRes = await fetch(`https://cn.apihz.cn/api/zici/chaciyu.php?id=10014221&key=4a7768de1cf2e0f41fc0a4005240c837&words=${encodeURIComponent(text)}`)
            const ciyuData = await ciyuRes.json()
            if (ciyuData.code === 200) {
              renderCiyuResult(ciyuData)
              result.classList.remove('hidden')
              ciyuResult.classList.remove('hidden')
            } else {
              showTip('查询失败：' + ciyuData.msg)
            }
            break
          // 成语接龙接口请求
          case 'cyjl':
            const cyjlRes = await fetch(`https://cn.apihz.cn/api/zici/cyjl.php?id=10014221&key=4a7768de1cf2e0f41fc0a4005240c837&word=${encodeURIComponent(text)}`)
            const cyjlData = await cyjlRes.json()
            if (cyjlData.code === 200) {
              renderCyjlResult(cyjlData)
              result.classList.remove('hidden')
              cyjlResult.classList.remove('hidden')
            } else {
              showTip('接龙失败：' + cyjlData.msg)
            }
            break
          // 成语字典接口请求
          case 'chacy':
            const chacyRes = await fetch(`https://cn.apihz.cn/api/zici/chacy.php?id=10014221&key=4a7768de1cf2e0f41fc0a4005240c837&words=${encodeURIComponent(text)}`)
            const chacyData = await chacyRes.json()
            if (chacyData.code === 200) {
              renderChacyResult(chacyData)
              result.classList.remove('hidden')
              chacyResult.classList.remove('hidden')
            } else {
              showTip('查询失败：' + chacyData.msg)
            }
            break
          // 汉字查询
          case 'hanzi':
            const hanziRes = await fetch(`https://api.suol.cc/v1/hanzi.php?msg=${encodeURIComponent(text)}`)
            const hanziData = await hanziRes.json()
            if (hanziData.code === 200) {
              renderHanziResult(hanziData.data, text)
              result.classList.remove('hidden')
              hanziResult.classList.remove('hidden')
            } else {
              showTip('查询失败：' + hanziData.msg)
            }
            break
          // 中文分词
          case 'fenci':
            const fenciRes = await fetch(`https://api.pearktrue.cn/api/fenci/?word=${encodeURIComponent(text)}`)
            const fenciData = await fenciRes.json()
            if (fenciData.code === 200) {
              renderFenciResult(fenciData)
              result.classList.remove('hidden')
              fenciResult.classList.remove('hidden')
            } else {
              showTip('分词失败：' + fenciData.msg)
            }
            break
          // 据意查句
          case 'meansearch':
            const meanRes = await fetch(`https://api.pearktrue.cn/api/meansearch/?mean=${encodeURIComponent(text)}&type=${encodeURIComponent(currentMeanType)}`)
            const meanData = await meanRes.json()
            if (meanData.code === 200) {
              renderMeansearchResult(meanData)
              result.classList.remove('hidden')
              meansearchResult.classList.remove('hidden')
            } else {
              showTip('查询失败：' + meanData.msg)
            }
            break
          // 三字俗语
          case 'szsy':
            const szsyRes = await fetch(`https://api.kuleu.com/api/szsy`)
            const szsyData = await szsyRes.json()
            if (szsyData.code === 200) {
              renderSzsyResult(szsyData)
              result.classList.remove('hidden')
              szsyResult.classList.remove('hidden')
            } else {
              showTip('获取失败：' + szsyData.msg)
            }
            break
          // 新增：简繁互转接口请求
          case 'jfzh':
            const jfzhRes = await fetch(`https://cn.apihz.cn/api/zici/jfzh.php?id=10014221&key=4a7768de1cf2e0f41fc0a4005240c837&type=${currentJfzhType}&words=${encodeURIComponent(text)}`)
            const jfzhData = await jfzhRes.json()
            if (jfzhData.code === 200) {
              renderJfzhResult(jfzhData)
              result.classList.remove('hidden')
              jfzhResult.classList.remove('hidden')
            } else {
              showTip('转换失败：' + jfzhData.msg)
            }
            break
        }
      } catch (err) {
        showTip('请求出错，请重试')
        console.error(err)
      } finally {
        convertBtn.disabled = false
        updatePageByTab()
      }
    })

    // 渲染拼音结果
    function renderPinyinResult(pinyinObj) {
      pinyinResult.innerHTML = ''
      for (const char in pinyinObj) {
        const div = document.createElement('div')
        div.className = 'flex items-center gap-3'
        div.innerHTML = `
          <span class="font-bold text-base w-5 text-center">${char}</span>
          <span class="text-blue-600">${pinyinObj[char]}</span>
        `
        pinyinResult.appendChild(div)
      }
    }

    // 渲染近反义词结果
    function renderJinfanResult(data) {
      cjResult.textContent = formatText(data.cj)
      jycResult.textContent = formatText(data.jyc)
      fycResult.textContent = formatText(data.fyc)
    }

    // 渲染词语字典结果 - 规整赋值
    function renderCiyuResult(data) {
      ciyuPinyin.textContent = formatText(data.zcpy)
      ciyuCx.textContent = formatText(data.cx)
      ciyuZhuyin.textContent = formatText(data.zczy)
      ciyuFirstLetter.textContent = formatText(data.zcszm)
      ciyuContent.textContent = formatText(data.content)
      ciyuWljs.textContent = formatText(data.wljs)
    }

    // 渲染成语接龙结果
    function renderCyjlResult(data) {
      cyjlWords.textContent = formatText(data.words)
      cyjlShouzi.textContent = formatText(data.shouzi)
      cyjlBushou.textContent = formatText(data.bushou)
      cyjlPingyin.textContent = formatText(data.pingyin)
      cyjlJieshi.textContent = formatText(data.jieshi)
      cyjlChuchu.textContent = formatText(data.chuchu)
      cyjlTongyi.textContent = formatText(data.tongyi)
      cyjlFanyi.textContent = formatText(data.fanyi)
      cyjlLiju.textContent = formatText(data.liju)
      cyjlYinzheng.textContent = formatText(data.yinzheng)
      cyjlYufa.textContent = formatText(data.yufa)
      cyjlEn.textContent = formatText(data.en)
    }

    // 渲染成语字典结果
    function renderChacyResult(data) {
      chacyWords.textContent = formatText(data.words)
      chacyShouzi.textContent = formatText(data.shouzi)
      chacyBushou.textContent = formatText(data.bushou)
      chacyPingyin.textContent = formatText(data.pingyin)
      chacyJieshi.textContent = formatText(data.jieshi)
      chacyChuchu.textContent = formatText(data.chuchu)
      chacyTongyi.textContent = formatText(data.tongyi)
      chacyFanyi.textContent = formatText(data.fanyi)
      chacyLiju.textContent = formatText(data.liju)
      chacyYinzheng.textContent = formatText(data.yinzheng)
      chacyYufa.textContent = formatText(data.yufa)
      chacyEn.textContent = formatText(data.en)
    }

    // 渲染汉字查询结果
    function renderHanziResult(data, word) {
      hanziTitle.textContent = word
      hanziPinyinText.textContent = data.拼音 ? data.拼音.join(' ') : ''
      hanziRadical.textContent = data.部首 ? data.部首.join('、') : '暂无'
      hanziStrokes.textContent = data.笔画 || '暂无'
      hanziStructure.textContent = data.结构 || '暂无'
      
      // 音频处理
      if (data.读音 && data.读音.length > 0) {
        hanziAudioBtn.classList.remove('hidden')
        hanziAudioBtn.onclick = () => {
          if (currentAudio) currentAudio.pause()
          currentAudio = new Audio(data.读音[0])
          currentAudio.play()
        }
      } else {
        hanziAudioBtn.classList.add('hidden')
      }
      // 笔顺GIF
      hanziGif.innerHTML = ''
      if (data.GIF) {
        const img = document.createElement('img')
        img.src = data.GIF
        img.alt = `${word}书写笔顺`
        img.className = 'mx-auto max-h-32'
        hanziGif.appendChild(img)
      }
      // 释义
      hanziMeaning.innerHTML = ''
      if (data.释义 && Array.isArray(data.释义)) {
        data.释义.forEach(group => {
          if (Array.isArray(group)) {
            group.forEach(item => {
              const p = document.createElement('p')
              p.textContent = formatText(item)
              hanziMeaning.appendChild(p)
            })
          }
        })
      }
      // 组词
      hanziWords.innerHTML = ''
      if (data.组词 && Array.isArray(data.组词)) {
        data.组词.forEach(group => {
          if (Array.isArray(group)) {
            group.forEach(word => {
              const span = document.createElement('span')
              span.className = 'bg-white px-2.5 py-0.5 rounded-full text-xs text-blue-600 border border-blue-50'
              span.textContent = word
              hanziWords.appendChild(span)
            })
          }
        })
      }
    }

    // 渲染分词结果
    function renderFenciResult(data) {
      fenciTags.innerHTML = ''
      if (data.data && Array.isArray(data.data)) {
        data.data.forEach(word => {
          const span = document.createElement('span')
          span.className = 'bg-blue-600 text-white px-2.5 py-1 rounded-full text-xs'
          span.textContent = word
          fenciTags.appendChild(span)
        })
      }
    }

    // 渲染据意查句结果
    function renderMeansearchResult(data) {
      meansearchType.textContent = `「${data.mean}」 - ${data.type}结果（共${data.count}条）`
      meansearchList.innerHTML = ''
      if (data.data && Array.isArray(data.data)) {
        data.data.forEach(item => {
          const div = document.createElement('div')
          div.className = 'border-l-2 border-blue-600 bg-white p-2.5 rounded-r-lg'
          div.innerHTML = `
            <p class="text-gray-800 mb-1.5">${formatText(item.quote)}</p>
            <p class="text-right text-xs text-gray-500">—— ${formatText(item.source)}</p>
          `
          meansearchList.appendChild(div)
        })
      }
    }

    // 渲染三字俗语结果
    function renderSzsyResult(data) {
      szsyWord.textContent = data.data.word
      szsyDefinition.textContent = formatText(data.data.definition)
      // 生成示例
      let example = ''
      switch(data.data.word) {
        case '落汤鸡': example = '他被大雨淋成了落汤鸡，浑身都湿透了。'; break
        case '马后炮': example = '事情都结束了才说这些，你这不是马后炮吗？'; break
        case '墙头草': example = '他这个人就是墙头草，哪边势力大就往哪边倒。'; break
        default: example = `大家都叫他${data.data.word}，因为${data.data.definition}。`
      }
      szsyExample.textContent = example
    }

    // 新增：渲染简繁互转结果
    function renderJfzhResult(data) {
      jfzhContent.textContent = formatText(data.words)
    }

    // 清空内容
    function resetContent() {
      textInput.value = ''
      result.classList.add('hidden')
      showTip('')
      if (currentAudio) {
        currentAudio.pause()
        currentAudio = null
      }
    }

    // 提示信息
    function showTip(text) {
      tip.textContent = text
      tip.classList.toggle('hidden', !text)
    }
  </script>
</body>
</html>
