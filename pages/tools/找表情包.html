<!DOCTYPE html>
<html lang="zh-CN"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <title>表情搜索</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #07c160;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #333333;
            --text-secondary: #999999;
            --border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.05);
            --btn-default: var(--bg);
            --btn-active-text: #ffffff;
            --dropdown-z: 200; /* 下拉层叠等级 */
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --card: #2c2c2c;
                --text: #ffffff;
                --text-secondary: #aaaaaa;
                --border: #444444;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }
        header {
            background: var(--card);
            box-shadow: 0 1px 3px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 10px 0;
        }
        /* 核心布局：搜索/按钮组容器，flex自适应，适配聚合分类按钮替换 */
        .search-box {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            position: relative; /* 作为自定义下拉的定位父级 */
        }
        /* 聚合分类按钮组：替换原搜索位置，与下拉框同排，样式适配 */
        .juhe-btn-group {
            display: flex;
            gap: 8px;
            flex: 1;
            flex-wrap: wrap;
        }
        .juhe-btn {
            padding: 8px 12px;
            background: var(--btn-default);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .juhe-btn.active {
            background: var(--primary);
            color: var(--btn-active-text);
            border-color: var(--primary);
        }
        .juhe-btn:hover:not(.active) {
            border-color: var(--primary);
        }
        input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        input:disabled {
            background: var(--border);
            cursor: not-allowed;
            color: var(--text-secondary);
        }
        .search-btn {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .search-btn:hover {
            opacity: 0.9;
        }
        .search-btn:active {
            transform: scale(0.98);
        }
        .search-btn:disabled {
            background: var(--border);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            opacity: 1;
        }
        /* 新增：自定义下拉选择器样式 - 核心 */
        .custom-select {
            position: relative;
            min-width: 120px;
            white-space: nowrap;
        }
        .custom-select__trigger {
            width: 100%;
            padding: 8px 12px;
            padding-right: 28px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.2s;
            display: flex;
            justify-content: center; /* 核心修改：触发按钮内容水平居中（文字+箭头整体） */
            align-items: center;
            position: relative; /* 箭头绝对定位用 */
        }
        /* 核心修改：下拉箭头绝对定位，避免影响文字居中 */
        .custom-select__arrow {
            font-size: 10px;
            color: var(--text-secondary);
            transition: transform 0.2s;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }
        /* 修正箭头旋转样式，适配绝对定位 */
        .custom-select__trigger.open .custom-select__arrow {
            transform: translateY(-50%) rotate(180deg);
        }
        .custom-select__trigger:hover,
        .custom-select__trigger.open {
            border-color: var(--primary);
        }
        .custom-select__options {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 2px 8px var(--shadow);
            z-index: var(--dropdown-z);
            display: none;
            /* 隐藏滚动条 兼容Firefox/IE/Edge */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .custom-select__options.show {
            display: block;
        }
        .custom-select__option {
            padding: 8px 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
            text-align: center; /* 核心修改：下拉选项文字水平居中 */
        }
        .custom-select__option:hover,
        .custom-select__option.active {
            background: var(--bg);
            color: var(--primary);
        }
        /* 移动端适配自定义下拉 */
        @media (max-width: 600px) {
            body {
                font-size: 12px;
            }
            input, .search-btn, .juhe-btn, .custom-select__trigger {
                font-size: 12px;
                padding: 6px 8px;
                padding-right: 24px;
            }
            .custom-select__option {
                padding: 6px 8px;
            }
            .custom-select__arrow {
                right: 8px; /* 移动端箭头位置适配 */
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 6px;
            }
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        .emoji-card {
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 3px var(--shadow);
            cursor: pointer;
            transition: transform 0.2s;
            aspect-ratio: 1;
        }
        .emoji-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px var(--shadow);
        }
        .emoji-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
        .error {
            text-align: center;
            padding: 20px;
            color: #ff3b30;
            grid-column: 1 / -1;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .load-more {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
        }
        .load-more button {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .load-more button:hover {
            background: var(--card);
        }
        .load-more button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .hidden {
            display: none !important;
        }
        /* 隐藏滚动条（兼容Chrome/Safari） */
        .custom-select__options::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <!-- 核心容器：自定义下拉 + 原搜索区/聚合按钮组 -->
            <div class="search-box" id="searchBox">
                <!-- 替换原生select：自定义下拉选择器 -->
                <div class="custom-select" id="customSelect">
                    <div class="custom-select__trigger" id="selectTrigger">
                        <span class="select-text">水豚噜噜</span>
                        <span class="custom-select__arrow">▼</span>
                    </div>
                    <div class="custom-select__options" id="selectOptions">
                        <div class="custom-select__option active" data-value="shuitao">水豚噜噜</div>
                        <div class="custom-select__option" data-value="feishu">飞鼠表情包</div>
                        <div class="custom-select__option" data-value="chaiq">柴郡表情包</div>
                        <div class="custom-select__option" data-value="dou">斗图表情包</div>
                        <div class="custom-select__option" data-value="xyd">小云朵表情包</div>
                        <div class="custom-select__option" data-value="longt">龙图表情包</div>
                        <div class="custom-select__option" data-value="bing">必应表情包</div>
                        <div class="custom-select__option" data-value="wechat">微信表情包</div>
                        <div class="custom-select__option" data-value="qq">QQ表情包</div>
                        <div class="custom-select__option" data-value="qq2">QQ表情包2</div>
                        <div class="custom-select__option" data-value="sogou">搜狗表情包</div>
                        <div class="custom-select__option" data-value="lengy">冷颜表情包</div>
                        <!-- 新增：Doro表情包下拉选项 -->
                        <div class="custom-select__option" data-value="doro">Doro表情包</div>
                        <div class="custom-select__option" data-value="juhe">聚合表情包</div>
                    </div>
                </div>
                <!-- 原搜索功能：输入框+搜索按钮 -->
                <input id="searchInput" placeholder="水豚噜噜无需搜索，自动加载~" type="text"/>
                <button class="search-btn" id="searchBtn">搜索</button>
                <!-- 聚合分类按钮组：替换原搜索位置，初始隐藏 -->
                <div class="juhe-btn-group hidden" id="juheBtnGroup">
                    <button class="juhe-btn" data-type="一二布布">一二布布</button>
                    <button class="juhe-btn" data-type="丸子妹">丸子妹</button>
                    <button class="juhe-btn" data-type="小八嘎">小八嘎</button>
                    <button class="juhe-btn" data-type="动漫表情">动漫表情</button>
                </div>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="grid" id="emojiGrid">
            <div class="empty">切换分类，水豚噜噜将自动加载</div>
        </div>
        <div class="load-more hidden" id="loadMore">
            <button id="loadMoreBtn">加载更多水豚</button>
        </div>
        <div class="toast" id="toast"></div>
    </main>
    <script>
        // API配置：保留所有原有配置 + 新增冷颜表情包(lengy) + 新增Doro表情包(doro)
        const API_CONFIG = {
            shuitao: {
                url: 'https://api.lolimi.cn/API/stdd/api',
                params: () => '',
                extractData: (resUrl) => [resUrl],
                supportPagination: true,
                isSymbolApi: false
            },
            feishu: {
                url: 'https://api.lolimi.cn/API/bqb/fs',
                params: () => '',
                extractData: (resUrl) => [resUrl],
                supportPagination: true,
                isSymbolApi: false
            },
            chaiq: {
                url: 'https://api.lolimi.cn/API/chaiq/c',
                params: () => '',
                extractData: (resUrl) => [resUrl],
                supportPagination: true,
                isSymbolApi: false
            },
            dou: {
                url: 'https://api.lolimi.cn/API/dou/api',
                params: () => '?type=json',
                extractData: (data) => [data.data.image],
                supportPagination: true,
                isSymbolApi: false
            },
            xyd: {
                url: 'https://api.lolimi.cn/API/bqb/xyd',
                params: () => '',
                extractData: (resUrl) => [resUrl],
                supportPagination: true,
                isSymbolApi: false,
                supportStatic: true
            },
            longt: {
                url: 'https://api.lolimi.cn/API/longt/l',
                params: () => '',
                extractData: (resUrl) => [resUrl],
                supportPagination: true,
                isSymbolApi: false,
                supportStatic: true
            },
            bing: {
                url: 'https://yunzhiapi.cn/API/bybqss.php',
                params: (keyword, page) => `?token=XIZhAXKnSQcH&msg=${encodeURIComponent(keyword)}&limit=auto`,
                extractData: (data) => Array.isArray(data.data) ? data.data.map(item => item.url) : [],
                supportPagination: false,
                isSymbolApi: false
            },
            wechat: {
                url: 'https://yunzhiapi.cn/API/wxbqss.php',
                params: (keyword, page) => `?token=XIZhAXKnSQcH&count=40&msg=${encodeURIComponent(keyword)}`,
                extractData: (data) => Array.isArray(data.data) ? data.data : [],
                supportPagination: false,
                isSymbolApi: false
            },
            qq: {
                url: 'https://oiapi.net/api/EmoticonPack',
                params: (keyword, page) => `?keyword=${encodeURIComponent(keyword)}&page=${page}&limit=40`,
                extractData: (data) => Array.isArray(data.data) ? data.data.map(item => item.url) : [],
                supportPagination: true,
                isSymbolApi: false
            },
            qq2: {
                url: 'https://api.lolimi.cn/API/bqb/qqbqb',
                params: (keyword, page) => `?msg=${encodeURIComponent(keyword)}&page=${page}`,
                extractData: (data) => Array.isArray(data.data) ? data.data.map(item => item.sticker_url) : [],
                supportPagination: true,
                isSymbolApi: false
            },
            sogou: {
                url: 'https://oiapi.net/api/Emotion',
                params: (keyword, page) => `?msg=${encodeURIComponent(keyword)}&0=${encodeURIComponent(keyword)}&page=${page}&limit=40`,
                extractData: (data) => Array.isArray(data.data) ? data.data.map(item => item.pic) : [],
                supportPagination: true,
                isSymbolApi: false
            },
            // 冷颜表情包API配置
            lengy: {
                url: 'https://lengy.top/API/bqb_search.php',
                params: (keyword, page) => `?msg=${encodeURIComponent(keyword)}&page=${page}&num=40`,
                extractData: (data) => Array.isArray(data.data) ? data.data.map(item => item.sticker_url) : [],
                supportPagination: true,
                isSymbolApi: false
            },
            // 新增：Doro表情包API配置（适配所有必填参数）
            doro: {
                url: 'https://missqiu.icu/API/Doro.php',
                // 拼接page/size/search/apikey所有必填参数，size默认10条/页
                params: (keyword, page) => `?page=${page}&size=10&search=${encodeURIComponent(keyword)}&apikey=5c7f37a79ce1eef4eb1b79dc5d7a752ab139ac681ce02447389e6fc6a2eb5a52`,
                // 提取返回结果中items里的图片url
                extractData: (data) => Array.isArray(data.items) ? data.items.map(item => item.url) : [],
                supportPagination: true,
                isSymbolApi: false
            },
            juhe: {
                url: 'https://api.lolimi.cn/API/bqb/api',
                params: (type) => `?type=${encodeURIComponent(type)}`,
                extractData: (resUrl) => [resUrl],
                supportPagination: true,
                isSymbolApi: false
            }
        };
        // DOM元素获取：替换原apiSelect为自定义下拉元素
        const grid = document.getElementById('emojiGrid');
        const input = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const toast = document.getElementById('toast');
        const loadMore = document.getElementById('loadMore');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const juheBtnGroup = document.getElementById('juheBtnGroup');
        const juheBtns = document.querySelectorAll('.juhe-btn');
        // 自定义下拉元素
        const customSelect = document.getElementById('customSelect');
        const selectTrigger = document.getElementById('selectTrigger');
        const selectOptions = document.getElementById('selectOptions');
        const selectOptionItems = document.querySelectorAll('.custom-select__option');
        const selectText = document.querySelector('.select-text');
        // 全局状态：保留原有所有状态
        let isLoading = false;
        let currentKeyword = '';
        let currentPage = 1;
        let currentApi = 'shuitao'; // 默认水豚噜噜
        let currentJuheType = '';
        // 提示弹框
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        // 复制链接
        async function copyText(text) {
            try {
                const pureUrl = text.split('?')[0];
                await navigator.clipboard.writeText(pureUrl);
                showToast(currentApi === 'juhe' ? '已复制聚合表情直链' : '已复制表情链接');
            } catch (err) {
                showToast('复制失败');
            }
        }
        // 生成随机时间戳：击穿缓存
        function getCacheKey() {
            return new Date().getTime() + Math.floor(Math.random() * 1000);
        }
        // 聚合按钮激活状态
        function setJuheBtnActive(type) {
            juheBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.type === type));
        }
        // 核心加载方法：保留原有所有逻辑 + 适配冷颜+Doro表情包
        async function loadEmojis(type = '', page = 1, append = false) {
            if (isLoading) return;
            isLoading = true;
            currentKeyword = type;
            currentPage = page;
            currentJuheType = type;
            let loadingText = '搜索中...';
            if (currentApi === 'shuitao') loadingText = '正在捕捉水豚噜噜...';
            if (currentApi === 'feishu') loadingText = '正在捕捉飞鼠...';
            if (currentApi === 'chaiq') loadingText = '正在捕捉柴郡...';
            if (currentApi === 'dou') loadingText = '正在加载斗图表情...';
            if (currentApi === 'xyd') loadingText = '正在捕捉小云朵...';
            if (currentApi === 'longt') loadingText = '正在加载龙图表情...';
            if (currentApi === 'bing') loadingText = '正在搜索必应表情...';
            if (currentApi === 'wechat') loadingText = '正在搜索微信表情...';
            if (currentApi === 'lengy') loadingText = '正在搜索冷颜表情...';
            if (currentApi === 'doro') loadingText = '正在搜索Doro表情...'; // 新增Doro加载提示
            if (currentApi === 'juhe') loadingText = `正在加载${type === '动漫表情' ? '动漫表情' : type}...`;
            
            if (!append) {
                grid.innerHTML = `<div class="loading">${loadingText}</div>`;
                loadMore.classList.add('hidden');
            } else {
                loadMoreBtn.textContent = '加载中...';
                loadMoreBtn.disabled = true;
            }
            try {
                const config = API_CONFIG[currentApi];
                const requestUrl = currentApi === 'juhe' 
                    ? `${config.url}${config.params(type)}` 
                    : `${config.url}${config.params(type, page)}`;
                let items = [];
                if (currentApi === 'shuitao' || currentApi === 'feishu' || currentApi === 'chaiq' || currentApi === 'xyd' || currentApi === 'longt' || currentApi === 'juhe') {
                    const response = await fetch(requestUrl);
                    if (!response.ok) throw new Error(
                        currentApi === 'shuitao' ? '捕捉水豚失败' : 
                        currentApi === 'feishu' ? '捕捉飞鼠失败' : 
                        currentApi === 'chaiq' ? '捕捉柴郡失败' : 
                        currentApi === 'xyd' ? '捕捉小云朵失败' : 
                        currentApi === 'longt' ? '加载龙图失败' : '获取聚合表情失败'
                    );
                    const cacheKey = getCacheKey();
                    const newImgUrl = requestUrl.includes('?') ? `${requestUrl}&cache=${cacheKey}` : `${requestUrl}?cache=${cacheKey}`;
                    items = config.extractData(newImgUrl);
                } else {
                    const response = await fetch(requestUrl);
                    if (!response.ok) throw new Error('网络请求失败');
                    const data = await response.json();
                    // 新增Doro表情包成功判断（返回200即有数据，判断items是否存在）
                    const isSuccess = currentApi === 'dou' 
                        ? data.code === 1 
                        : currentApi === 'qq2' 
                            ? data.Code === 0 
                            : currentApi === 'lengy'
                                ? data.code === 0
                                : currentApi === 'doro'
                                    ? Array.isArray(data.items)
                                    : (currentApi === 'bing' || currentApi === 'wechat')
                                        ? data.code === 200 
                                        : data.code === 1;
                    if (!isSuccess) throw new Error(data.msg || data.text || '加载失败，请重试');
                    items = config.extractData(data);
                    // Doro表情包添加缓存击穿
                    if (currentApi === 'dou' || currentApi === 'bing' || currentApi === 'wechat' || currentApi === 'lengy' || currentApi === 'doro') {
                        const cacheKey = getCacheKey();
                        items = items.map(url => url.includes('?') ? `${url}&cache=${cacheKey}` : `${url}?cache=${cacheKey}`);
                    }
                }
                if (items.length === 0) {
                    const emptyText = currentApi === 'juhe' 
                        ? `暂无${type === '动漫表情' ? '动漫表情' : type}相关聚合表情` 
                        : '未找到相关表情';
                    grid.innerHTML = `<div class="empty">${emptyText}</div>`;
                    return;
                }
                const html = items.map(url => `
                    <div class="emoji-card" onclick="copyText('${url}')" title="点击复制链接">
                        <img src="${url}" loading="lazy" alt="${
                            currentApi === 'dou' ? '斗图表情' : 
                            currentApi === 'xyd' ? '小云朵表情' : 
                            currentApi === 'longt' ? '龙图表情' : 
                            currentApi === 'bing' ? '必应表情' : 
                            currentApi === 'wechat' ? '微信表情' : 
                            currentApi === 'lengy' ? '冷颜表情' : 
                            currentApi === 'doro' ? 'Doro表情' : // 新增Doro表情alt属性
                            (currentApi === 'juhe' ? (type === '动漫表情' ? '动漫表情' : type) : '表情')
                        }"/>
                    </div>
                `).join('');
                append ? grid.insertAdjacentHTML('beforeend', html) : grid.innerHTML = html;
                if (config.supportPagination) {
                    let moreText = '加载更多';
                    if (currentApi === 'shuitao') moreText = '加载更多水豚';
                    if (currentApi === 'feishu') moreText = '加载更多飞鼠';
                    if (currentApi === 'chaiq') moreText = '加载更多柴郡';
                    if (currentApi === 'dou') moreText = '加载更多斗图';
                    if (currentApi === 'xyd') moreText = '加载更多小云朵';
                    if (currentApi === 'longt') moreText = '加载更多龙图';
                    if (currentApi === 'lengy') moreText = '加载更多冷颜表情';
                    if (currentApi === 'doro') moreText = '加载更多Doro表情'; // 新增Doro加载更多文本
                    if (currentApi === 'juhe') moreText = `加载更多${type === '动漫表情' ? '动漫表情' : type}`;
                    loadMoreBtn.textContent = moreText;
                    loadMoreBtn.disabled = false;
                    loadMore.classList.remove('hidden');
                }
            } catch (error) {
                grid.innerHTML = `<div class="error">${error.message}</div>`;
                showToast(
                    currentApi === 'juhe' ? '加载聚合表情失败' : 
                    currentApi === 'feishu' ? '加载飞鼠表情失败' : 
                    currentApi === 'chaiq' ? '加载柴郡表情失败' : 
                    currentApi === 'dou' ? '加载斗图表情失败' : 
                    currentApi === 'xyd' ? '加载小云朵表情失败' : 
                    currentApi === 'longt' ? '加载龙图表情失败' : 
                    currentApi === 'bing' ? '加载必应表情失败' : 
                    currentApi === 'wechat' ? '加载微信表情失败' : 
                    currentApi === 'lengy' ? '加载冷颜表情失败' : 
                    currentApi === 'doro' ? '加载Doro表情失败' : // 新增Doro错误提示
                    error.message
                );
            } finally {
                isLoading = false;
            }
        }
        // 搜索方法：保留原有逻辑
        function handleSearch() {
            if (currentApi === 'shuitao' || currentApi === 'feishu' || currentApi === 'chaiq' || currentApi === 'dou' || currentApi === 'xyd' || currentApi === 'longt' || currentApi === 'juhe') return;
            loadEmojis(input.value.trim(), 1, false);
        }
        // 聚合按钮点击事件：保留原有逻辑
        function bindJuheBtnEvent() {
            juheBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const type = btn.dataset.type;
                    setJuheBtnActive(type);
                    loadEmojis(type, 1, false);
                });
            });
        }
        // 切换分类核心逻辑：保留原有所有功能 + 适配冷颜+Doro表情包
        function switchApi(api) {
            currentApi = api;
            currentPage = 1;
            currentJuheType = '';
            setJuheBtnActive('');
            if (api === 'shuitao' || api === 'feishu' || api === 'chaiq' || api === 'dou' || api === 'xyd' || api === 'longt') {
                juheBtnGroup.classList.add('hidden');
                input.classList.remove('hidden');
                searchBtn.classList.remove('hidden');
                input.disabled = true;
                searchBtn.disabled = true;
                input.placeholder = api === 'shuitao' ? '水豚噜噜无需搜索，自动加载~' : 
                                     api === 'feishu' ? '飞鼠表情包无需搜索，自动加载~' : 
                                     api === 'chaiq' ? '柴郡表情包无需搜索，自动加载~' : 
                                     api === 'dou' ? '斗图表情包无需搜索，自动加载~' : 
                                     api === 'xyd' ? '小云朵表情包无需搜索，自动加载~' : 
                                     '龙图表情包无需搜索，自动加载~';
                loadEmojis('', 1, false);
            } else if (api === 'juhe') {
                juheBtnGroup.classList.remove('hidden');
                input.classList.add('hidden');
                searchBtn.classList.add('hidden');
                grid.innerHTML = '<div class="empty">点击上方分类按钮，加载对应聚合表情</div>';
                loadMore.classList.add('hidden');
            } else {
                juheBtnGroup.classList.add('hidden');
                input.classList.remove('hidden');
                searchBtn.classList.remove('hidden');
                input.disabled = false;
                searchBtn.disabled = false;
                // 新增Doro表情包输入框占位符
                input.placeholder = api === 'bing' ? '必应表情搜索（如萌宠、搞笑、斗图）' : 
                                     api === 'wechat' ? '微信表情搜索（如哈哈、可爱、搞怪）' : 
                                     api === 'qq' ? 'QQ表情搜索（如萌宠、斗图）' : 
                                     api === 'qq2' ? 'QQ表情包2搜索（如萌宠、斗图）' : 
                                     api === 'sogou' ? '搜狗表情搜索（如表情包、搞笑）' : 
                                     api === 'lengy' ? '冷颜表情搜索（如搞笑、萌宠、可爱）' : 
                                     'Doro表情搜索（如泪水、摆烂、随便吧）';
                grid.innerHTML = '<div class="empty">输入关键词搜索表情</div>';
                loadMore.classList.add('hidden');
            }
        }
        // 自定义下拉核心交互逻辑
        // 展开/收起下拉
        selectTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            selectTrigger.classList.toggle('open');
            selectOptions.classList.toggle('show');
        });
        // 点击下拉选项切换分类
        selectOptionItems.forEach(item => {
            item.addEventListener('click', (e) => {
                const apiValue = item.dataset.value;
                const apiText = item.textContent;
                // 更新选中样式
                selectOptionItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                // 更新触发按钮文本
                selectText.textContent = apiText;
                // 收起下拉
                selectTrigger.classList.remove('open');
                selectOptions.classList.remove('show');
                // 执行分类切换
                switchApi(apiValue);
            });
        });
        // 点击页面其他区域收起下拉
        document.addEventListener('click', () => {
            selectTrigger.classList.remove('open');
            selectOptions.classList.remove('show');
        });
        // 阻止下拉内部点击冒泡
        customSelect.addEventListener('click', (e) => e.stopPropagation());
        // 原有事件监听：保留所有逻辑
        searchBtn.addEventListener('click', handleSearch);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && currentApi !== 'shuitao' && currentApi !== 'feishu' && currentApi !== 'chaiq' && currentApi !== 'dou' && currentApi !== 'xyd' && currentApi !== 'longt' && currentApi !== 'juhe') handleSearch();
        });
        loadMoreBtn.addEventListener('click', () => {
            loadEmojis(currentJuheType || currentKeyword, currentPage + 1, true);
        });
        // 初始化
        bindJuheBtnEvent();
        window.onload = () => switchApi('shuitao');
    </script>
</body></html>
