<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公开图床 | 一键上传</title>
    <!-- 引入CDN资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-100-M/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        success: '#16a34a',
                        danger: '#dc2626',
                        warning: '#f59e0b',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .drag-active {
                @apply border-primary bg-primary/5;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-6 px-4 sm:px-6">
    <div class="max-w-3xl mx-auto">
        <!-- 页面头部 -->
        <header class="text-center mb-6">
            <h1 class="text-[clamp(1.75rem,5vw,2.25rem)] font-bold text-slate-800 mb-1">公开图床</h1>
            <p class="text-slate-500 text-sm">静态响应式 | 一键上传 | 多格式链接复制</p>
        </header>

        <!-- 错误提示栏 -->
        <div id="error-box" class="hidden mb-5 bg-danger/10 border border-danger/20 rounded-lg p-3 text-sm text-danger">
            <i class="fa fa-exclamation-circle mr-2"></i>
            <span id="error-text"></span>
        </div>

        <!-- 接口配置区（默认已填好公开密钥，可直接使用） -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-5">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base font-semibold text-slate-800 flex items-center">
                    <i class="fa fa-cog text-primary mr-2"></i> 接口配置
                </h2>
                <button id="toggle-config" class="text-xs text-slate-500 hover:text-primary">
                    收起配置 <i class="fa fa-chevron-up ml-1"></i>
                </button>
            </div>
            <div id="config-content">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label for="dev-id" class="text-xs font-medium text-slate-700">开发者ID</label>
                        <input type="text" id="dev-id" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" value="10014221">
                    </div>
                    <div class="space-y-1">
                        <label for="dev-key" class="text-xs font-medium text-slate-700">开发者KEY</label>
                        <input type="text" id="dev-key" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" value="4a7768de1cf2e0f41fc0a4005240c837">
                    </div>
                </div>
                <p class="mt-3 text-xs text-slate-500">
                    <i class="fa fa-info-circle text-primary mr-1"></i> 默认已配置公开密钥，直接使用即可，无需修改
                </p>
            </div>
        </div>

        <!-- 上传核心区域 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-5">
            <!-- 拖拽上传区域 -->
            <div id="upload-area" class="border-2 border-dashed border-slate-300 rounded-lg p-8 text-center transition-all mb-4 cursor-pointer hover:border-primary hover:bg-primary/5">
                <input type="file" id="file-input" class="hidden" accept="image/jpeg,image/png,image/gif,image/webp">
                <i class="fa fa-cloud-upload text-4xl text-slate-400 mb-3"></i>
                <p class="text-slate-700 font-medium mb-1">点击选择图片 或 拖拽图片到此处</p>
                <p class="text-xs text-slate-500">支持 JPG/PNG/GIF/WebP 格式，文件编码后不超过1M</p>
            </div>

            <!-- 图片预览区 -->
            <div id="preview-area" class="hidden mb-4">
                <div class="border border-slate-200 rounded-lg p-3 bg-slate-50">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                        <img id="preview-img" src="" alt="预览图" class="w-20 h-20 object-cover rounded-lg border border-slate-200">
                        <div class="flex-1 min-w-0">
                            <p id="file-name" class="text-slate-800 font-medium truncate"></p>
                            <p id="file-size" class="text-xs text-slate-500 mt-1"></p>
                        </div>
                        <button id="reset-btn" class="shrink-0 text-slate-500 hover:text-danger transition">
                            <i class="fa fa-times-circle"></i> 移除
                        </button>
                    </div>
                </div>
            </div>

            <!-- 上传按钮 -->
            <button id="upload-btn" disabled class="w-full py-3 rounded-lg bg-primary text-white font-medium transition-all disabled:bg-slate-300 disabled:cursor-not-allowed hover:bg-primary/90 active:bg-primary/80">
                <i class="fa fa-cloud-upload mr-2"></i> 立即上传
            </button>
        </div>

        <!-- 上传结果区 -->
        <div id="result-area" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-5">
            <h2 class="text-base font-semibold text-slate-800 mb-4 flex items-center">
                <i class="fa fa-check-circle text-success mr-2"></i> 上传成功
            </h2>
            
            <!-- 结果图片预览 -->
            <div class="mb-4 flex justify-center">
                <img id="result-img" src="" alt="上传完成的图片" class="max-w-full max-h-64 rounded-lg border border-slate-200">
            </div>

            <!-- 链接格式区 -->
            <div class="space-y-3">
                <div class="space-y-1">
                    <label class="text-xs font-medium text-slate-700">原图直链</label>
                    <div class="flex">
                        <input type="text" id="direct-link" readonly class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-l-lg bg-slate-50 focus:outline-none">
                        <button class="copy-btn px-4 py-2 bg-primary text-white rounded-r-lg hover:bg-primary/90 transition text-sm" data-target="direct-link">
                            <i class="fa fa-copy"></i> 复制
                        </button>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-medium text-slate-700">Markdown 格式</label>
                    <div class="flex">
                        <input type="text" id="markdown-link" readonly class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-l-lg bg-slate-50 focus:outline-none">
                        <button class="copy-btn px-4 py-2 bg-primary text-white rounded-r-lg hover:bg-primary/90 transition text-sm" data-target="markdown-link">
                            <i class="fa fa-copy"></i> 复制
                        </button>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-medium text-slate-700">HTML 格式</label>
                    <div class="flex">
                        <input type="text" id="html-link" readonly class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-l-lg bg-slate-50 focus:outline-none">
                        <button class="copy-btn px-4 py-2 bg-primary text-white rounded-r-lg hover:bg-primary/90 transition text-sm" data-target="html-link">
                            <i class="fa fa-copy"></i> 复制
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 上传历史区 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-base font-semibold text-slate-800 flex items-center">
                    <i class="fa fa-history text-primary mr-2"></i> 上传历史
                </h2>
                <button id="clear-history" class="text-xs text-slate-500 hover:text-danger">清空全部</button>
            </div>

            <!-- 空状态 -->
            <div id="history-empty" class="text-center py-10 text-slate-500">
                <i class="fa fa-folder-open-o text-3xl mb-2 block"></i>
                <p class="text-sm">暂无上传记录</p>
            </div>

            <!-- 历史列表 -->
            <div id="history-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <!-- 历史记录动态渲染 -->
            </div>
        </div>
    </div>

    <!-- 大图预览弹窗 -->
    <div id="image-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="modal-img" src="" alt="大图预览" class="max-w-full max-h-full rounded" onclick="event.stopPropagation()">
    </div>

    <!-- Toast 提示组件 -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none flex items-center text-sm">
        <i id="toast-icon" class="mr-2"></i>
        <span id="toast-text"></span>
    </div>

    <script>
        // 全局配置
        const API_URL = 'https://cn.apihz.cn/api/ziyuan/pan.php';
        const MAX_BASE64_SIZE = 1024 * 1024; // 1M 接口限制
        let selectedFile = null;
        let base64Data = '';

        // DOM 元素获取
        const devIdInput = document.getElementById('dev-id');
        const devKeyInput = document.getElementById('dev-key');
        const errorBox = document.getElementById('error-box');
        const errorText = document.getElementById('error-text');
        const toggleConfigBtn = document.getElementById('toggle-config');
        const configContent = document.getElementById('config-content');
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const previewArea = document.getElementById('preview-area');
        const previewImg = document.getElementById('preview-img');
        const fileNameEl = document.getElementById('file-name');
        const fileSizeEl = document.getElementById('file-size');
        const resetBtn = document.getElementById('reset-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const resultArea = document.getElementById('result-area');
        const resultImg = document.getElementById('result-img');
        const directLinkInput = document.getElementById('direct-link');
        const markdownLinkInput = document.getElementById('markdown-link');
        const htmlLinkInput = document.getElementById('html-link');
        const copyBtns = document.querySelectorAll('.copy-btn');
        const historyEmpty = document.getElementById('history-empty');
        const historyList = document.getElementById('history-list');
        const clearHistoryBtn = document.getElementById('clear-history');
        const imageModal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-img');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toast-icon');
        const toastText = document.getElementById('toast-text');

        // 工具函数：Toast提示
        const showToast = (message, type = 'info') => {
            const typeConfig = {
                success: { icon: 'fa-check-circle', bg: 'bg-success', text: 'text-white' },
                error: { icon: 'fa-exclamation-circle', bg: 'bg-danger', text: 'text-white' },
                warning: { icon: 'fa-exclamation-triangle', bg: 'bg-warning', text: 'text-white' },
                info: { icon: 'fa-info-circle', bg: 'bg-primary', text: 'text-white' }
            };
            const config = typeConfig[type] || typeConfig.info;
            toast.className = toast.className.replace(/bg-\w+ text-\w+/g, '');
            toast.classList.add(config.bg, config.text);
            toastIcon.className = `fa ${config.icon} mr-2`;
            toastText.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-[-20px]', 'pointer-events-none'), 3000);
        };

        // 工具函数：显示/隐藏错误
        const showError = (message) => {
            errorText.textContent = message;
            errorBox.classList.remove('hidden');
            console.error('图床错误：', message);
        };
        const hideError = () => {
            errorBox.classList.add('hidden');
            errorText.textContent = '';
        };

        // 工具函数：文件大小格式化
        const formatFileSize = (bytes) => {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        };

        // 工具函数：安全文件名处理（解决name不能为空报错）
        const getSafeFileName = (file) => {
            // 提取文件名（不含后缀）
            const fullName = file.name;
            const lastDotIndex = fullName.lastIndexOf('.');
            let name = lastDotIndex === -1 ? fullName : fullName.substring(0, lastDotIndex);
            
            // 处理空文件名、纯空格文件名
            if (!name || name.trim() === '') {
                name = `image_${Date.now()}`;
            }
            
            // 限制长度不超过200字
            if (name.length > 200) {
                name = name.substring(0, 190) + `_${Date.now().toString().slice(-6)}`;
            }
            
            return name.trim();
        };

        // 工具函数：获取文件后缀（带. 适配接口示例）
        const getFileExt = (file) => {
            const fullName = file.name;
            const lastDotIndex = fullName.lastIndexOf('.');
            return lastDotIndex === -1 ? '.jpg' : fullName.substring(lastDotIndex).toLowerCase();
        };

        // 历史记录相关函数
        const loadHistory = () => {
            const history = JSON.parse(localStorage.getItem('imageBed_history') || '[]');
            if (history.length === 0) {
                historyEmpty.classList.remove('hidden');
                historyList.innerHTML = '';
                return;
            }
            historyEmpty.classList.add('hidden');
            // 最新的在最前面
            historyList.innerHTML = history.reverse().map((item, index) => `
                <div class="border border-slate-200 rounded-lg p-2 bg-slate-50 flex flex-col">
                    <img src="${item.resurl}" alt="${item.name}" class="w-full h-36 object-cover rounded mb-2 cursor-pointer hover:opacity-90 transition" onclick="openModal('${item.resurl}')">
                    <p class="text-sm font-medium text-slate-800 truncate mb-1" title="${item.name}">${item.name}</p>
                    <p class="text-xs text-slate-500 mb-2">${item.uploadTime} | ${item.size}</p>
                    <div class="flex gap-1 mt-auto">
                        <button class="flex-1 text-xs py-1 bg-primary/10 text-primary rounded hover:bg-primary/20 transition" onclick="copyLink('${item.resurl}')">
                            <i class="fa fa-copy mr-1"></i> 复制链接
                        </button>
                        <button class="w-8 text-xs py-1 bg-danger/10 text-danger rounded hover:bg-danger/20 transition" onclick="deleteHistory(${history.length - 1 - index})">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        };

        const addHistory = (item) => {
            const history = JSON.parse(localStorage.getItem('imageBed_history') || '[]');
            history.push({
                ...item,
                uploadTime: new Date().toLocaleString()
            });
            localStorage.setItem('imageBed_history', JSON.stringify(history));
            loadHistory();
        };

        window.deleteHistory = (index) => {
            const history = JSON.parse(localStorage.getItem('imageBed_history') || '[]');
            history.splice(index, 1);
            localStorage.setItem('imageBed_history', JSON.stringify(history));
            showToast('已删除该条记录', 'success');
            loadHistory();
        };

        clearHistoryBtn.addEventListener('click', () => {
            if (confirm('确定要清空全部上传历史吗？此操作不可恢复！')) {
                localStorage.removeItem('imageBed_history');
                showToast('已清空全部历史', 'success');
                loadHistory();
            }
        });

        // 大图预览
        window.openModal = (src) => {
            modalImg.src = src;
            imageModal.classList.remove('hidden');
        };

        // 复制链接函数
        window.copyLink = async (url) => {
            try {
                await navigator.clipboard.writeText(url);
                showToast('链接复制成功', 'success');
            } catch (err) {
                // 降级兼容方案
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('链接复制成功', 'success');
            }
        };

        // 文件选择处理
        const handleFileSelect = (file) => {
            hideError();
            // 校验文件类型
            if (!file.type.startsWith('image/')) {
                showToast('请选择有效的图片文件', 'error');
                return;
            }
            // 校验文件大小（预留base64膨胀空间）
            const maxOriginSize = 750 * 1024;
            if (file.size > maxOriginSize) {
                showToast('文件过大，请选择750KB以内的图片', 'warning');
                return;
            }

            selectedFile = file;
            // 读取文件生成预览和base64
            const reader = new FileReader();
            reader.onload = (e) => {
                const result = e.target.result;
                previewImg.src = result;
                base64Data = result.split(',')[1]; // 去除base64前缀，只保留编码数据
                
                // 校验base64大小
                if (base64Data.length > MAX_BASE64_SIZE) {
                    showToast('图片编码后超过1M限制，请压缩后再试', 'error');
                    resetFile();
                    return;
                }

                // 填充文件信息
                fileNameEl.textContent = file.name;
                fileSizeEl.textContent = `大小：${formatFileSize(file.size)}`;
                
                // 显示预览，启用上传按钮
                previewArea.classList.remove('hidden');
                uploadBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        };

        // 重置文件选择
        const resetFile = () => {
            selectedFile = null;
            base64Data = '';
            fileInput.value = '';
            previewArea.classList.add('hidden');
            uploadBtn.disabled = true;
            resultArea.classList.add('hidden');
            hideError();
        };

        // 页面初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadHistory();
        });

        // 配置收起/展开
        toggleConfigBtn.addEventListener('click', () => {
            const isHidden = configContent.classList.toggle('hidden');
            toggleConfigBtn.innerHTML = isHidden 
                ? '展开配置 <i class="fa fa-chevron-down ml-1"></i>' 
                : '收起配置 <i class="fa fa-chevron-up ml-1"></i>';
        });

        // 点击上传区域触发文件选择
        uploadArea.addEventListener('click', () => fileInput.click());

        // 监听文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFileSelect(e.target.files[0]);
        });

        // 拖拽事件处理
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        uploadArea.addEventListener('dragover', () => uploadArea.classList.add('drag-active'));
        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => uploadArea.classList.remove('drag-active'));
        });
        uploadArea.addEventListener('drop', (e) => {
            if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files[0]);
        });

        // 重置按钮事件
        resetBtn.addEventListener('click', resetFile);

        // 核心上传逻辑
        uploadBtn.addEventListener('click', async () => {
            hideError();
            // 基础参数校验
            const devId = devIdInput.value.trim();
            const devKey = devKeyInput.value.trim();
            if (!devId || !devKey) {
                showError('开发者ID和KEY不能为空');
                showToast('请检查配置参数', 'warning');
                return;
            }
            if (!selectedFile || !base64Data) {
                showToast('请先选择图片文件', 'warning');
                return;
            }

            // 处理文件名和后缀（解决name不能为空问题）
            const safeName = getSafeFileName(selectedFile);
            const fileExt = getFileExt(selectedFile);

            // 构建请求参数
            const params = new URLSearchParams({
                id: devId,
                key: devKey,
                type: fileExt,
                name: safeName,
                res: base64Data
            });

            // 构建完整请求URL
            const requestUrl = `${API_URL}?${params.toString()}`;

            // 按钮加载状态
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 上传中...';

            try {
                console.log('发起上传请求，文件名：', safeName, '后缀：', fileExt);
                const response = await fetch(requestUrl, { method: 'GET' });

                // 处理HTTP级错误
                if (!response.ok) {
                    throw new Error(`请求失败：${response.status} ${response.statusText}`);
                }

                const result = await response.json();
                console.log('接口返回结果：', result);

                // 处理接口业务逻辑
                if (result.code === 200 && result.resurl) {
                    showToast('图片上传成功，已自动复制直链', 'success');
                    
                    // 填充结果数据
                    const resUrl = result.resurl;
                    resultImg.src = resUrl;
                    directLinkInput.value = resUrl;
                    markdownLinkInput.value = `![${safeName}](${resUrl})`;
                    htmlLinkInput.value = `<img src="${resUrl}" alt="${safeName}">`;
                    resultArea.classList.remove('hidden');
                    
                    // 自动复制直链
                    await copyLink(resUrl);
                    
                    // 添加到历史记录
                    addHistory({
                        name: selectedFile.name,
                        resurl: resUrl,
                        size: formatFileSize(selectedFile.size)
                    });
                    
                    // 重置上传区域
                    resetFile();
                    
                } else {
                    // 显示接口返回的具体错误
                    const errorMsg = result.msg || '上传失败，接口返回未知错误';
                    showError(`接口报错：${errorMsg}`);
                    showToast(errorMsg, 'error');
                }
            } catch (err) {
                console.error('上传请求异常：', err);
                let errorMsg = '网络请求失败，请检查网络连接';
                // 识别常见错误
                if (err.message.includes('Failed to fetch') || err.message.includes('CORS')) {
                    errorMsg = '请求被浏览器跨域拦截，可安装CORS插件解决，或使用本地服务器打开页面';
                } else {
                    errorMsg = `请求失败：${err.message}`;
                }
                showError(errorMsg);
                showToast('上传失败', 'error');
            } finally {
                // 恢复按钮状态
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i class="fa fa-cloud-upload mr-2"></i> 立即上传';
            }
        });

        // 复制按钮事件绑定
        copyBtns.forEach(btn => {
            btn.addEventListener('click', async () => {
                const targetId = btn.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input.value) await copyLink(input.value);
            });
        });
    </script>
</body>
</html>
