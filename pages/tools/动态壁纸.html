<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易图床</title>
    <!-- 引入Tailwind CSS实现响应式，无需本地部署 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 md:py-12">
    <div class="max-w-3xl mx-auto">
        <!-- 页面标题 -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">简易图床</h1>
            <p class="text-gray-500">基于API接口的静态图片上传工具，支持全设备访问</p>
        </header>

        <!-- 核心上传卡片 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6">
            <!-- 图片选择与预览区 -->
            <div class="p-6 border-b border-gray-100">
                <label class="block w-full mb-4">
                    <span class="block text-sm font-medium text-gray-700 mb-2">选择图片</span>
                    <input 
                        type="file" 
                        id="imageInput" 
                        accept="image/*" 
                        class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-600 hover:file:bg-blue-100 cursor-pointer"
                    >
                </label>

                <!-- 图片预览区 -->
                <div id="previewBox" class="hidden w-full rounded-lg overflow-hidden bg-gray-50 border border-gray-200 mb-4">
                    <img id="imagePreview" src="" alt="图片预览" class="w-full h-auto max-h-[300px] object-contain">
                </div>

                <!-- 参数表单 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">开发者ID</label>
                        <input 
                            type="text" 
                            id="devId" 
                            value="10014221" 
                            class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">开发者KEY</label>
                        <input 
                            type="text" 
                            id="devKey" 
                            value="4a7768de1cf2e0f41fc0a4005240c837" 
                            class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">文件名</label>
                        <input 
                            type="text" 
                            id="fileName" 
                            placeholder="请输入文件名" 
                            class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">文件后缀</label>
                        <input 
                            type="text" 
                            id="fileType" 
                            placeholder="jpg/png/gif" 
                            class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                            readonly
                        >
                    </div>
                </div>

                <!-- 上传按钮 -->
                <button 
                    id="uploadBtn" 
                    disabled
                    class="w-full py-3 px-4 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition flex items-center justify-center gap-2"
                >
                    <span id="btnText">上传图片</span>
                </button>
            </div>

            <!-- 结果展示区 -->
            <div id="resultBox" class="hidden p-6 bg-gray-50">
                <!-- 成功状态 -->
                <div id="successBox" class="hidden">
                    <div class="mb-4 rounded-lg overflow-hidden border border-gray-200">
                        <img id="resultImage" src="" alt="上传成功" class="w-full h-auto">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">图片直链</label>
                        <div class="flex gap-2">
                            <input 
                                type="text" 
                                id="resultUrl" 
                                readonly 
                                class="flex-1 px-3 py-2 rounded-lg border border-gray-300 bg-white outline-none"
                            >
                            <button 
                                id="copyBtn" 
                                class="shrink-0 py-2 px-4 rounded-lg bg-gray-800 text-white font-medium hover:bg-gray-900 transition"
                            >
                                复制
                            </button>
                        </div>
                    </div>
                    <p class="text-green-600 text-sm">✅ 图片上传成功，可直接复制链接使用</p>
                </div>

                <!-- 失败状态 -->
                <div id="errorBox" class="hidden">
                    <div class="p-4 rounded-lg bg-red-50 border border-red-100">
                        <p class="text-red-600 font-medium" id="errorText"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 说明文案 -->
        <div class="text-center text-gray-400 text-sm">
            <p>支持jpg/png/gif等常见图片格式，单文件BASE64编码后不超过1M</p>
            <p class="mt-1">禁止上传违法违规、侵权文件，同一文件名仅可上传一次</p>
        </div>
    </div>

    <script>
        // 核心元素获取
        const imageInput = document.getElementById('imageInput');
        const previewBox = document.getElementById('previewBox');
        const imagePreview = document.getElementById('imagePreview');
        const devId = document.getElementById('devId');
        const devKey = document.getElementById('devKey');
        const fileName = document.getElementById('fileName');
        const fileType = document.getElementById('fileType');
        const uploadBtn = document.getElementById('uploadBtn');
        const btnText = document.getElementById('btnText');
        const resultBox = document.getElementById('resultBox');
        const successBox = document.getElementById('successBox');
        const errorBox = document.getElementById('errorBox');
        const resultImage = document.getElementById('resultImage');
        const resultUrl = document.getElementById('resultUrl');
        const copyBtn = document.getElementById('copyBtn');
        const errorText = document.getElementById('errorText');

        // 全局变量存储BASE64数据
        let base64Data = '';
        const apiBaseUrl = 'https://cn.apihz.cn/api/ziyuan/pan.php';
        const forbiddenTypes = ['php', 'html', 'htm'];

        // 图片选择处理
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 重置状态
            resetResult();
            
            // 提取文件名和后缀
            const nameArr = file.name.split('.');
            const name = nameArr.slice(0, -1).join('.');
            const ext = nameArr[nameArr.length - 1].toLowerCase();
            
            // 填充表单
            fileName.value = name;
            fileType.value = ext;

            // 校验禁止的后缀
            if (forbiddenTypes.includes(ext)) {
                showError(`禁止上传${ext}格式文件，仅支持图片格式`);
                uploadBtn.disabled = true;
                return;
            }

            // 转BASE64并预览
            const reader = new FileReader();
            reader.onload = (event) => {
                const fullBase64 = event.target.result;
                // 去除BASE64前缀，保留纯编码数据
                base64Data = fullBase64.split(',')[1];
                
                // 校验文件大小（编码后不超过1M）
                if (base64Data.length > 1024 * 1024) {
                    showError('文件过大，BASE64编码后不能超过1M，请压缩后再试');
                    uploadBtn.disabled = true;
                    return;
                }

                // 显示预览
                imagePreview.src = fullBase64;
                previewBox.classList.remove('hidden');
                uploadBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        });

        // 上传按钮点击事件
        uploadBtn.addEventListener('click', async () => {
            // 前置参数校验
            const id = devId.value.trim();
            const key = devKey.value.trim();
            const name = fileName.value.trim();
            const type = fileType.value.trim();

            if (!id || !key) {
                showError('开发者ID和KEY不能为空');
                return;
            }
            if (!name) {
                showError('文件名不能为空');
                return;
            }
            if (!type) {
                showError('文件后缀不能为空');
                return;
            }
            if (forbiddenTypes.includes(type.toLowerCase())) {
                showError(`禁止上传${type}格式文件`);
                return;
            }
            if (!base64Data) {
                showError('请先选择有效的图片文件');
                return;
            }

            // 按钮加载状态
            uploadBtn.disabled = true;
            btnText.textContent = '上传中...';
            resetResult();

            try {
                // 拼接GET请求URL，参数URL编码
                const requestUrl = `${apiBaseUrl}?id=${encodeURIComponent(id)}&key=${encodeURIComponent(key)}&type=${encodeURIComponent(type)}&name=${encodeURIComponent(name)}&res=${encodeURIComponent(base64Data)}`;
                
                // 发起请求
                const response = await fetch(requestUrl);
                const result = await response.json();

                // 处理返回结果
                if (result.code === 200 && result.resurl) {
                    // 上传成功
                    showSuccess(result.resurl);
                } else {
                    // 接口返回错误
                    showError(result.msg || '上传失败，未知错误');
                }
            } catch (err) {
                // 网络/请求错误
                showError('请求失败，网络异常或接口跨域限制，请稍后重试');
                console.error(err);
            } finally {
                // 恢复按钮状态
                uploadBtn.disabled = false;
                btnText.textContent = '上传图片';
            }
        });

        // 复制链接功能
        copyBtn.addEventListener('click', async () => {
            const url = resultUrl.value;
            if (!url) return;

            try {
                await navigator.clipboard.writeText(url);
                copyBtn.textContent = '已复制';
                setTimeout(() => {
                    copyBtn.textContent = '复制';
                }, 2000);
            } catch (err) {
                // 降级方案
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                copyBtn.textContent = '已复制';
                setTimeout(() => {
                    copyBtn.textContent = '复制';
                }, 2000);
            }
        });

        // 成功状态展示
        function showSuccess(url) {
            resultBox.classList.remove('hidden');
            successBox.classList.remove('hidden');
            errorBox.classList.add('hidden');
            resultImage.src = url;
            resultUrl.value = url;
        }

        // 错误状态展示
        function showError(msg) {
            resultBox.classList.remove('hidden');
            errorBox.classList.remove('hidden');
            successBox.classList.add('hidden');
            errorText.textContent = `❌ ${msg}`;
        }

        // 重置结果区域
        function resetResult() {
            resultBox.classList.add('hidden');
            successBox.classList.add('hidden');
            errorBox.classList.add('hidden');
            errorText.textContent = '';
            resultUrl.value = '';
        }
    </script>
</body>
</html>
