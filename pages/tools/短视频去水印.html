<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短视频去水印工具 · 新增B站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            success: '#10B981',
            danger: '#EF4444',
            warning: '#F59E0B',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .btn-transition {
        @apply transition-all duration-300 ease-in-out;
      }
      .input-focus {
        @apply focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary;
      }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
  <div class="max-w-4xl mx-auto px-4 py-12 md:py-16">
    <header class="text-center mb-10">
      <h1 class="text-[clamp(1.8rem,5vw,2.8rem)] font-bold mb-3">短视频去水印工具</h1>
      <p class="text-gray-500 text-lg">支持抖音、快手、皮皮虾、今日头条、微博、小红书、B站 一键解析</p>
    </header>
    <main class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-8">
      <!-- 平台选择 · B站添加只解析网页版说明 -->
      <div class="flex flex-wrap justify-center gap-4 md:gap-6 mb-6">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="radio" name="platform" value="douyin" checked class="w-4 h-4 text-primary focus:ring-primary">
          <span class="text-gray-700 font-medium group-hover:text-primary btn-transition">抖音</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="radio" name="platform" value="kuaishou" class="w-4 h-4 text-primary focus:ring-primary">
          <span class="text-gray-700 font-medium group-hover:text-primary btn-transition">快手</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="radio" name="platform" value="pipixia" class="w-4 h-4 text-primary focus:ring-primary">
          <span class="text-gray-700 font-medium group-hover:text-primary btn-transition">皮皮虾</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="radio" name="platform" value="toutiao" class="w-4 h-4 text-primary focus:ring-primary">
          <span class="text-gray-700 font-medium group-hover:text-primary btn-transition">今日头条</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="radio" name="platform" value="weibo" class="w-4 h-4 text-primary focus:ring-primary">
          <span class="text-gray-700 font-medium group-hover:text-primary btn-transition">微博</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="radio" name="platform" value="xhsjx" class="w-4 h-4 text-primary focus:ring-primary">
          <span class="text-gray-700 font-medium group-hover:text-primary btn-transition">小红书</span>
        </label>
        <!-- B站添加（只解析网页版）说明 -->
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="radio" name="platform" value="bilibili" class="w-4 h-4 text-primary focus:ring-primary">
          <span class="text-gray-700 font-medium group-hover:text-primary btn-transition">B站（只解析网页版）</span>
        </label>
      </div>
      <!-- 移除CORS代理复选框整段 -->
      <div class="flex flex-col md:flex-row gap-3 mb-6">
        <input 
          type="text" 
          id="videoUrl" 
          placeholder="请粘贴视频链接，支持整段文字复制..." 
          class="flex-1 px-4 py-3 rounded-lg border border-gray-300 input-focus btn-transition text-base"
        >
        <button 
          id="parseBtn" 
          class="px-6 py-3 bg-primary text-white font-medium rounded-lg hover:bg-primary/90 active:bg-primary/80 btn-transition flex items-center justify-center gap-2 min-w-[120px]"
        >
          <i class="fas fa-magnifying-glass"></i>
          <span>立即解析</span>
        </button>
      </div>
      <div id="loading" class="hidden flex flex-col items-center justify-center py-12">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-primary rounded-full animate-spin mb-4"></div>
        <p class="text-gray-500">正在解析视频，请稍候...</p>
      </div>
      <div id="errorTip" class="hidden bg-danger/10 border border-danger/20 rounded-lg p-4 mb-4">
        <div class="flex items-start gap-3">
          <i class="fas fa-exclamation-circle text-danger mt-0.5"></i>
          <div>
            <p class="text-danger font-medium">解析失败</p>
            <p id="errorText" class="text-gray-700 text-sm mt-1"></p>
          </div>
        </div>
      </div>
      <div id="warnTip" class="hidden bg-warning/10 border border-warning/20 rounded-lg p-4 mb-4">
        <div class="flex items-start gap-3">
          <i class="fas fa-info-circle text-warning mt-0.5"></i>
          <div>
            <p class="text-warning font-medium">提示</p>
            <p id="warnText" class="text-gray-700 text-sm mt-1"></p>
          </div>
        </div>
      </div>
      <div id="resultArea" class="hidden">
        <div class="rounded-xl border border-gray-200 overflow-hidden mb-2">
          <div class="aspect-video max-h-[450px] bg-gray-100">
            <video id="videoPlayer" controls class="w-full h-full object-contain"></video>
          </div>
          <div class="p-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <p class="text-gray-700 font-medium">✅ 解析成功！已获取无水印视频</p>
            <a 
              id="downloadBtn" 
              href="" 
              download 
              class="px-6 py-2.5 bg-success text-white font-medium rounded-lg hover:bg-success/90 active:bg-success/80 btn-transition flex items-center gap-2 w-full md:w-auto justify-center"
            >
              <i class="fas fa-download"></i>
              <span>下载视频</span>
            </a>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-center text-gray-400 text-sm">
      <p>本工具仅用于个人学习交流，请勿用于商业用途与侵权行为</p>
    </footer>
  </div>
  <script>
    // 接口配置（新增bilibili）
    const API_CONFIG = {
      douyin: { url: 'https://api.nxvav.cn/api/jiexi/', method: 'POST' },
      kuaishou: { url: 'https://api.bugpk.com/api/kuaishou', method: 'GET' },
      pipixia: { url: 'https://api.bugpk.com/api/pipixia', method: 'GET' },
      toutiao: { url: 'https://api.bugpk.com/api/toutiao', method: 'POST' },
      weibo: { url: 'https://api.bugpk.com/api/weibo', method: 'GET' },
      xhsjx: { url: 'https://api.bugpk.com/api/xhsjx', method: 'GET' },
      bilibili: { url: 'https://api.nxvav.cn/api/bilivideo/', method: 'GET' }
    };
    // 移除CORS_PROXY定义
    const DOM = {
      urlInput: document.getElementById('videoUrl'),
      parseBtn: document.getElementById('parseBtn'),
      loading: document.getElementById('loading'),
      errorTip: document.getElementById('errorTip'),
      errorText: document.getElementById('errorText'),
      warnTip: document.getElementById('warnTip'),
      warnText: document.getElementById('warnText'),
      resultArea: document.getElementById('resultArea'),
      videoPlayer: document.getElementById('videoPlayer'),
      downloadBtn: document.getElementById('downloadBtn'),
      platformRadios: document.querySelectorAll('input[name="platform"]')
      // 移除useProxy DOM引用
    };
    // 通用链接提取（补充B站链接模式）
    function extractValidUrl(input) {
      const patterns = [
        /https:\/\/v\.douyin\.com\/[a-zA-Z0-9\-_]+/, 
        /https:\/\/www\.douyin\.com\/video\/[a-zA-Z0-9]+/, 
        /https:\/\/[a-zA-Z0-9]+\.kuaishou\.com\/[a-zA-Z0-9]+/, 
        /https:\/\/www\.pipix\.com\/video\/[a-zA-Z0-9]+/, 
        /https:\/\/[a-zA-Z0-9]+\.xhslink\.com\/[a-zA-Z0-9]+/,
        /https:\/\/www\.bilibili\.com\/video\/[a-zA-Z0-9]+/,
        /https:\/\/b23\.tv\/[a-zA-Z0-9]+/,
        /https:\/\/www\.bilibili\.com\/bangumi\/play\/ep[0-9]+/,
        /https:\/\/www\.bilibili\.com\/bangumi\/play\/ss[0-9]+/
      ];
      for (const pattern of patterns) {
        const match = input.match(pattern);
        if (match) return match[0];
      }
      return input.trim(); 
    }
    // 从B站文本中提取 BV / AV / ep
    function extractBilibiliId(input) {
      let bv = null, av = null, ep = null;
      const bvMatch = input.match(/BV[a-zA-Z0-9]+/);
      if (bvMatch) bv = bvMatch[0];
      const avMatch = input.match(/[aA][vV](\d+)/);
      if (avMatch) av = avMatch[1];
      const epMatch = input.match(/[eE][pP](\d+)/);
      if (epMatch) ep = epMatch[1];
      if (!bv && !av && !ep) {
        const fallbackBv = input.match(/BV[a-zA-Z0-9]+/);
        if (fallbackBv) bv = fallbackBv[0];
      }
      return { bv, av, ep };
    }
    // 重置界面
    function resetState() {
      DOM.loading.classList.add('hidden');
      DOM.errorTip.classList.add('hidden');
      DOM.warnTip.classList.add('hidden');
      DOM.resultArea.classList.add('hidden');
      DOM.errorText.textContent = '';
      DOM.warnText.textContent = '';
      DOM.videoPlayer.src = '';
      DOM.downloadBtn.href = '';
    }
    function getSelectedPlatform() {
      return Array.from(DOM.platformRadios).find(radio => radio.checked)?.value || 'douyin';
    }
    function showError(msg) { DOM.errorText.textContent = msg; DOM.errorTip.classList.remove('hidden'); }
    function showWarn(msg) { DOM.warnText.textContent = msg; DOM.warnTip.classList.remove('hidden'); }
    // 核心解析
    async function parseVideo() {
      resetState();
      const rawInput = DOM.urlInput.value.trim();
      const platform = getSelectedPlatform();
      // 移除useProxy变量获取
      if (!rawInput) { showError('请输入视频链接'); return; }
      const validUrl = extractValidUrl(rawInput);
      
      if (validUrl !== rawInput) {
        DOM.urlInput.value = validUrl;
        if (platform !== 'bilibili') {
          showWarn('已自动提取链接，去除无关字符');
        } else {
          showWarn('已尝试提取链接，若解析失败请确保包含BV/av/ep号');
        }
      }
      const idExtractSource = (platform === 'bilibili') ? rawInput : validUrl;
      DOM.loading.classList.remove('hidden');
      DOM.parseBtn.disabled = true;
      DOM.parseBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>解析中...</span>';
      try {
        // B站单独处理
        if (platform === 'bilibili') {
          const { bv, av, ep } = extractBilibiliId(idExtractSource);
          if (!bv && !av && !ep) {
            throw new Error('未能识别到BV号/av号/ep号，请确保链接包含有效ID');
          }
          const params = new URLSearchParams();
          if (ep) {
            params.append('ep', ep);
            params.append('type', 'bangumi');
          } else if (bv) {
            params.append('bv', bv);
            params.append('type', 'video');
          } else if (av) {
            params.append('av', av);
            params.append('type', 'video');
          }
          params.append('p', '1');
          params.append('q', '32');
          params.append('format', 'mp4');
          params.append('otype', 'json');
          const baseUrl = API_CONFIG.bilibili.url;
          let requestUrl = baseUrl + '?' + params.toString();
          // 移除代理包装逻辑
          const response = await fetch(requestUrl, { method: 'GET' });
          if (!response.ok) throw new Error(`网络请求失败 (${response.status})`);
          const result = await response.json();
          if (result.code !== undefined && result.code !== 0 && result.code !== 200) {
            throw new Error(result.msg || result.message || '解析失败，错误码：' + result.code);
          }
          if (result.error) throw new Error(result.error);
          const videoUrl = result.url || (result.data && result.data.url);
          if (!videoUrl) throw new Error('未获取到视频地址');
          DOM.loading.classList.add('hidden');
          DOM.resultArea.classList.remove('hidden');
          DOM.videoPlayer.src = videoUrl;
          DOM.downloadBtn.href = videoUrl;
          DOM.downloadBtn.download = `B站无水印_${Date.now()}.mp4`;
        } else {  
          // 原有其他平台处理逻辑
          const config = API_CONFIG[platform];
          let requestUrl = config.url;
          let fetchOptions = { method: config.method };
          if (config.method === 'GET') {
            requestUrl += `?url=${encodeURIComponent(validUrl)}`;
          } else {
            fetchOptions.headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
            fetchOptions.body = `url=${encodeURIComponent(validUrl)}`;
          }
          // 移除代理包装逻辑
          const response = await fetch(requestUrl, fetchOptions);
          if (!response.ok) throw new Error(`网络请求失败 (${response.status})`);
          const result = await response.json();
          if (result.code !== undefined && result.code !== 200 && result.code !== 0) {
            throw new Error(result.msg || result.message || '解析失败');
          }
          if (result.error) throw new Error(result.error);
          const videoUrl = result.data?.url || result.url || '';
          if (!videoUrl) throw new Error('未获取到视频地址');
          DOM.loading.classList.add('hidden');
          DOM.resultArea.classList.remove('hidden');
          DOM.videoPlayer.src = videoUrl;
          DOM.downloadBtn.href = videoUrl;
          DOM.downloadBtn.download = `无水印视频_${Date.now()}.mp4`;
        }
      } catch (error) {
        console.error('解析错误:', error);
        DOM.loading.classList.add('hidden');
        // 移除跨域相关错误判断，统一错误提示
        showError(error.message || '解析失败，请检查链接/网络或重试');
      } finally {
        DOM.parseBtn.disabled = false;
        DOM.parseBtn.innerHTML = '<i class="fas fa-magnifying-glass"></i><span>立即解析</span>';
      }
    }
    // 事件绑定
    DOM.parseBtn.addEventListener('click', parseVideo);
    DOM.urlInput.addEventListener('keydown', (e) => e.key === 'Enter' && parseVideo());
  </script>
</body>
</html>
