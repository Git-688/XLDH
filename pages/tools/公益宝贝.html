<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公益宝贝 - 让爱回家</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-6 px-4 flex flex-col items-center">

<div class="text-center mb-4">
  <h1 class="text-red-600 text-2xl font-bold">❤️ 公益宝贝 · 让爱回家</h1>
  <p class="text-gray-500 mt-1">每一次看见，都是一次希望</p>
</div>

<!-- 图片展示区 -->
<div class="w-full max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-3 mb-4">
  <img 
    id="babyImg"
    src="https://api.lolimi.cn/API/baby/gohome?type=img" 
    alt="公益寻人宝贝" 
    class="w-full h-auto rounded-lg">
</div>

<!-- 下一位宝贝按钮 -->
<button 
  onclick="refreshBabyImg()" 
  class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg transition">
  下一位宝贝
</button>

<div class="text-center text-gray-400 text-xs mt-6">
  公益寻人 · 助力团圆
</div>

<script>
function refreshBabyImg() {
  const img = document.getElementById('babyImg');
  const timestamp = new Date().getTime();
  img.src = `https://api.lolimi.cn/API/baby/gohome?type=img&t=${timestamp}`;
}
</script>

</body>
</html>
