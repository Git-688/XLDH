<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月经周期计算器</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* 轻量 toast 提示 */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 18px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
.toast.success { background: #10b981; }
.toast.error { background: #ef4444; }
</style>
</head>
<body class="bg-pink-50 min-h-screen p-4 md:p-6">
<div class="max-w-xl mx-auto space-y-5">

  <div class="text-center py-4">
    <h1 class="text-[clamp(1.4rem,4vw,1.8rem)] font-semibold text-pink-600">月经周期计算器</h1>
    <p class="text-gray-400 text-sm">静态响应式 · 实时计算</p>
  </div>

  <!-- 表单卡片 -->
  <div class="bg-white rounded-2xl shadow-sm p-5 space-y-4">
    <form id="form">
      <div class="mb-3">
        <label class="text-sm text-gray-600 block mb-1">本次月经开始日期</label>
        <input type="date" id="msd" required
          class="w-full px-3 py-2.5 rounded-lg border border-gray-200 focus:ring-2 focus:ring-pink-300 outline-none">
      </div>

      <div class="mb-3">
        <label class="text-sm text-gray-600 block mb-1">平均周期（天）</label>
        <input type="number" id="acl" min="21" max="35" placeholder="28" required
          class="w-full px-3 py-2.5 rounded-lg border border-gray-200 focus:ring-2 focus:ring-pink-300 outline-none">
        <p class="text-xs text-gray-400 mt-0.5">21～35 天</p>
      </div>

      <div class="mb-4">
        <label class="text-sm text-gray-600 block mb-1">经期天数</label>
        <input type="number" id="mdays" min="3" max="7" placeholder="5" required
          class="w-full px-3 py-2.5 rounded-lg border border-gray-200 focus:ring-2 focus:ring-pink-300 outline-none">
        <p class="text-xs text-gray-400 mt-0.5">3～7 天</p>
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-pink-500 hover:bg-pink-600 text-white py-3 rounded-lg transition font-medium">
        计算周期
      </button>
    </form>
  </div>

  <!-- 结果卡片 -->
  <div id="resultCard" class="hidden bg-white rounded-2xl shadow-sm p-5 space-y-4">
    <h2 class="text-lg font-semibold text-gray-700 border-b pb-2">📊 周期计算结果</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
      <div class="p-2 bg-pink-50 rounded-lg">月经开始：<b id="d1">-</b></div>
      <div class="p-2 bg-pink-50 rounded-lg">月经结束：<b id="d2">-</b></div>
      <div class="p-2 bg-blue-50 rounded-lg">排卵日期：<b id="d3">-</b></div>
      <div class="p-2 bg-purple-50 rounded-lg">易孕开始：<b id="d4">-</b></div>
      <div class="p-2 bg-purple-50 rounded-lg">易孕结束：<b id="d5">-</b></div>
      <div class="p-2 bg-green-50 rounded-lg">安全期：<b id="d6">-</b> ~ <b id="d7">-</b></div>
      <div class="sm:col-span-2 p-2 bg-rose-50 rounded-lg text-rose-600">
        下次月经：<b id="d8">-</b> ～ <b id="d9">-</b>
      </div>
    </div>

    <!-- 健康建议 -->
    <div>
      <h3 class="font-medium text-gray-700 mb-2">💡 健康建议</h3>
      <div id="adviceBox" class="text-sm text-gray-600 bg-pink-50/50 p-3 rounded-lg space-y-2"></div>
    </div>
  </div>

</div>

<!-- toast 容器 -->
<div id="toast" class="toast"></div>

<script>
const form = document.getElementById('form')
const submitBtn = document.getElementById('submitBtn')
const resultCard = document.getElementById('resultCard')
const toast = document.getElementById('toast')

// toast 提示函数
function showToast(msg, type = 'success') {
  toast.textContent = msg
  toast.className = 'toast ' + type
  toast.classList.add('show')
  setTimeout(() => toast.classList.remove('show'), 2500)
}

form.addEventListener('submit', async e => {
  e.preventDefault()
  const msd = document.getElementById('msd').value
  const acl = document.getElementById('acl').value
  const mdays = document.getElementById('mdays').value

  if (!msd || !acl || !mdays) {
    showToast('请填写完整信息', 'error')
    return
  }

  submitBtn.disabled = true
  submitBtn.textContent = '计算中...'

  try {
    const res = await fetch(`https://api.lolimi.cn/API/gany/api?msd=${msd}&acl=${acl}&mdays=${mdays}`)
    const data = await res.json()

    // ✅ 关键修复：接口状态码字段从 状态码 → code
    if (data.code === 200) {
      showToast('计算成功！', 'success')

      document.getElementById('d1').textContent = data.月经开始日期
      document.getElementById('d2').textContent = data.月经结束日期
      document.getElementById('d3').textContent = data.排卵日期
      document.getElementById('d4').textContent = data.可受孕窗口开始日期
      document.getElementById('d5').textContent = data.可受孕窗口结束日期
      document.getElementById('d6').textContent = data.安全期开始日期
      document.getElementById('d7').textContent = data.安全期结束日期
      document.getElementById('d8').textContent = data.预期的下次月经开始日期
      document.getElementById('d9').textContent = data.预期的下次月经结束日期

      // 渲染健康建议
      const adviceBox = document.getElementById('adviceBox')
      adviceBox.innerHTML = ''
      const adv = data.健康建议[0]
      for (let k in adv) {
        const p = document.createElement('p')
        p.innerHTML = `<span class="text-pink-600 font-medium">${k}：</span>${adv[k]}`
        adviceBox.appendChild(p)
      }

      resultCard.classList.remove('hidden')
    } else {
      showToast('计算失败：' + (data.msg || '参数错误'), 'error')
    }
  } catch (err) {
    showToast('请求失败：网络或接口异常', 'error')
  } finally {
    submitBtn.disabled = false
    submitBtn.textContent = '计算周期'
  }
})
</script>
</body>
</html>
