<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合归属地查询工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-scroll{
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tab-scroll::-webkit-scrollbar{
            display: none;
        }
        .country-item {
            background: #f0f8ff;
            border-radius: 6px;
            padding: 8px;
            margin: 4px;
            flex: 1 1 calc(33.333% - 8px);
            min-width: 180px;
        }
        .country-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-6">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow p-6 md:p-8">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">综合归属地查询工具</h1>

        <!-- 可滚动标签栏 -->
        <div class="tab-scroll pb-4 mb-6 border-b">
            <div class="flex gap-2 inline-flex">
                <button class="tab-btn active px-4 py-2 rounded-lg bg-blue-500 text-white" data-tab="car">车牌号查询</button>
                <button class="tab-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700" data-tab="ip">IP归属地</button>
                <button class="tab-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700" data-tab="phone">手机号查询</button>
                <button class="tab-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700" data-tab="card">身份证号查询</button>
                <button class="tab-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700" data-tab="country">国家名称大全</button>
            </div>
        </div>

        <!-- 车牌号查询 -->
        <div class="tab-content" id="car">
            <div class="flex gap-2 mb-4">
                <input type="text" id="carInput" placeholder="例如：川B1234 / 川B" class="flex-1 px-4 py-2 border rounded-lg outline-none focus:border-blue-500">
                <button id="carBtn" class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600">查询</button>
            </div>
        </div>

        <!-- IP归属地 -->
        <div class="tab-content hidden" id="ip">
            <div class="flex gap-2 mb-4">
                <input type="text" id="ipInput" placeholder="例如：112.192.49.243（不填则查本机）" class="flex-1 px-4 py-2 border rounded-lg outline-none focus:border-blue-500">
                <button id="ipBtn" class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600">查询</button>
            </div>
        </div>

        <!-- 手机号查询 -->
        <div class="tab-content hidden" id="phone">
            <div class="flex gap-2 mb-4">
                <input type="text" id="phoneInput" placeholder="请输入手机号" class="flex-1 px-4 py-2 border rounded-lg outline-none focus:border-blue-500">
                <button id="phoneBtn" class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600">查询</button>
            </div>
        </div>

        <!-- 身份证号查询 -->
        <div class="tab-content hidden" id="card">
            <div class="flex gap-2 mb-4">
                <input type="text" id="cardInput" placeholder="请输入身份证号码" class="flex-1 px-4 py-2 border rounded-lg outline-none focus:border-blue-500">
                <button id="cardBtn" class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600">查询</button>
            </div>
        </div>

        <!-- 国家名称大全 -->
        <div class="tab-content hidden" id="country">
            <div class="flex gap-2 mb-4">
                <button id="countryBtn" class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600 w-full">获取国家名称大全</button>
            </div>
        </div>

        <!-- 结果区域 -->
        <div id="result" class="hidden space-y-3 p-4 bg-gray-50 rounded-lg mt-4 max-h-96 overflow-y-auto"></div>
        <div id="error" class="hidden text-red-500 text-center mt-4"></div>
    </div>

    <script>
        // 公共配置
        const API_CONFIG = {
            id: '10014221',
            key: '4a7768de1cf2e0f41fc0a4005240c837'
        };

        // 标签切换
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => {
                    b.classList.remove('active', 'bg-blue-500', 'text-white');
                    b.classList.add('bg-gray-200', 'text-gray-700');
                });
                btn.classList.add('active', 'bg-blue-500', 'text-white');
                btn.classList.remove('bg-gray-200', 'text-gray-700');
                const tab = btn.dataset.tab;
                tabContents.forEach(c => c.classList.add('hidden'));
                document.getElementById(tab).classList.remove('hidden');
                document.getElementById('result').classList.add('hidden');
                document.getElementById('error').classList.add('hidden');
            });
        });

        // 显示结果/错误
        function showResult(html) {
            const res = document.getElementById('result');
            res.innerHTML = html;
            res.classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');
        }
        function showError(msg) {
            const err = document.getElementById('error');
            err.textContent = msg;
            err.classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        // 加载状态
        function loadingBtn(btn, text = '查询中...') {
            btn.textContent = text;
            btn.disabled = true;
        }
        function resetBtn(btn, text = '查询') {
            btn.textContent = text;
            btn.disabled = false;
        }

        // 1.车牌号查询
        document.getElementById('carBtn').addEventListener('click', async () => {
            const btn = document.getElementById('carBtn');
            const words = document.getElementById('carInput').value.trim();
            if (!words) return showError('请输入车牌号');
            loadingBtn(btn);
            try {
                const res = await fetch(`https://cn.apihz.cn/api/other/chepai.php?id=${API_CONFIG.id}&key=${API_CONFIG.key}&words=${encodeURIComponent(words)}`);
                const data = await res.json();
                data.code === 200 ? showResult(`<p>车牌抬头：<strong>${data.idcode}</strong></p><p>省份：<strong>${data.sheng}</strong></p><p>城市：<strong>${data.shi}</strong></p>`) : showError(data.msg);
            } catch (e) { showError('网络请求异常'); } finally { resetBtn(btn); }
        });

        // 2.IP归属地
        document.getElementById('ipBtn').addEventListener('click', async () => {
            const btn = document.getElementById('ipBtn');
            const ip = document.getElementById('ipInput').value.trim();
            loadingBtn(btn);
            try {
                let url = `https://cn.apihz.cn/api/ip/ipjh.php?id=${API_CONFIG.id}&key=${API_CONFIG.key}`;
                if (ip) url += `&ip=${ip}`;
                const res = await fetch(url);
                const data = await res.json();
                if(data.code===200){
                    const no1 = data.no1;
                    showResult(`<p>查询IP：<strong>${data.ip}</strong></p><p>国家：<strong>${no1.guo}</strong></p><p>省份：<strong>${no1.sheng}</strong></p><p>城市：<strong>${no1.shi}</strong></p><p>区县：<strong>${no1.qu || '-'}</strong></p><p>运营商：<strong>${no1.isp}</strong></p>`);
                }else{
                    showError(data.msg);
                }
            } catch (e) { showError('网络请求异常'); } finally { resetBtn(btn); }
        });

        // 3.手机号查询
        document.getElementById('phoneBtn').addEventListener('click', async () => {
            const btn = document.getElementById('phoneBtn');
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) return showError('请输入手机号');
            loadingBtn(btn);
            try {
                const res = await fetch(`https://cn.apihz.cn/api/ip/shouji.php?id=${API_CONFIG.id}&key=${API_CONFIG.key}&phone=${phone}`);
                const data = await res.json();
                data.code===200 ? showResult(`<p>号段：<strong>${data.haoduan}</strong></p><p>省份：<strong>${data.shengfen}</strong></p><p>城市：<strong>${data.chengshi}</strong></p><p>运营商：<strong>${data.fuwushang}</strong></p><p>区号：<strong>${data.quhao}</strong></p><p>邮编：<strong>${data.youbian}</strong></p><p>区划代码：<strong>${data.qhdm}</strong></p>`) : showError(data.msg);
            } catch (e) { showError('网络请求异常'); } finally { resetBtn(btn); }
        });

        // 4.身份证号查询
        document.getElementById('cardBtn').addEventListener('click', async () => {
            const btn = document.getElementById('cardBtn');
            const card = document.getElementById('cardInput').value.trim();
            if (!card) return showError('请输入身份证号码');
            loadingBtn(btn);
            try {
                const res = await fetch(`https://cn.apihz.cn/api/other/card.php?id=${API_CONFIG.id}&key=${API_CONFIG.key}&card=${card}`);
                const data = await res.json();
                data.code===200 ? showResult(`<p>省份：<strong>${data.sheng}</strong></p><p>城市：<strong>${data.shi}</strong></p><p>区县：<strong>${data.xian}</strong></p>`) : showError(data.msg);
            } catch (e) { showError('网络请求异常'); } finally { resetBtn(btn); }
        });

        // 5.国家名称大全（修复对象数组显示，适配m_cn_name等字段）
        document.getElementById('countryBtn').addEventListener('click', async () => {
            const btn = document.getElementById('countryBtn');
            loadingBtn(btn, '加载中...');
            try {
                const res = await fetch(`https://cn.apihz.cn/api/other/country.php?id=${API_CONFIG.id}&key=${API_CONFIG.key}`);
                const data = await res.json();
                if(data.code === 200 && Array.isArray(data.data)){
                    let totalCount = data.data.length;
                    let listHtml = `<p class="font-bold mb-2">全球国家/地区列表（共${totalCount}个）：</p>`;
                    listHtml += '<div class="country-grid">';
                    
                    // 遍历国家数组，提取指定字段
                    data.data.forEach((country, index) => {
                        const cnName = country.m_cn_name || '未知';
                        const enName = country.m_en_name || 'Unknown';
                        const nationId = country.m_nationid || 'N/A';
                        const longitude = country.m_longitude || '0.000';
                        const latitude = country.m_latitude || '0.000';
                        
                        listHtml += `
                        <div class="country-item">
                            <p><strong>${index + 1}. ${cnName}</strong></p>
                            <p>英文：${enName}</p>
                            <p>代码：${nationId}</p>
                            <p>坐标：${latitude}, ${longitude}</p>
                        </div>
                        `;
                    });
                    
                    listHtml += '</div>';
                    showResult(listHtml);
                } else if(data.code === 200) {
                    showError('数据格式异常，返回的不是数组');
                } else {
                    showError(data.msg || '获取国家数据失败');
                }
            } catch (e) {
                showError(`网络请求异常：${e.message}`);
            } finally {
                resetBtn(btn, '获取国家名称大全');
            }
        });

        // 回车查询
        document.getElementById('carInput').addEventListener('keypress', e => e.key === 'Enter' && document.getElementById('carBtn').click());
        document.getElementById('ipInput').addEventListener('keypress', e => e.key === 'Enter' && document.getElementById('ipBtn').click());
        document.getElementById('phoneInput').addEventListener('keypress', e => e.key === 'Enter' && document.getElementById('phoneBtn').click());
        document.getElementById('cardInput').addEventListener('keypress', e => e.key === 'Enter' && document.getElementById('cardBtn').click());
    </script>
</body>
</html>
