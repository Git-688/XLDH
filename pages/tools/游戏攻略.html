<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>жёёжҲҸж”»з•Ҙ - дёүи§’жҙІеҜҶз Ғ | ж–№иҲҹи“қеӣҫ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #0f172a;
      color: #f1f5f9;
    }
    .tab-active {
      background: #1e293b;
      color: #facc15;
      border-color: #facc15;
    }
  </style>
</head>
<body class="min-h-screen pb-10">
<header class="py-6 px-4 text-center">
  <h1 class="text-[clamp(1.5rem,4vw,2.5rem)] font-bold text-white">жёёжҲҸж”»з•Ҙе·Ҙе…·з®ұ</h1>
  <p class="mt-2 text-slate-400">е®һж—¶жӣҙж–° | дёүи§’жҙІеҜҶз Ғ | ж–№иҲҹи“қеӣҫ</p>
  <div class="flex justify-center gap-2 mt-6 max-w-md mx-auto">
    <button id="tab-delta" class="tab-active px-6 py-2 rounded-lg border font-medium transition">дёүи§’жҙІиЎҢеҠЁеҜҶз Ғ</button>
    <button id="tab-ark" class="px-6 py-2 rounded-lg border border-slate-600 font-medium transition hover:border-slate-400">жҳҺж—Ҙж–№иҲҹи“қеӣҫ</button>
  </div>
</header>
<main class="max-w-7xl mx-auto px-4 mt-6">
  <!-- дёүи§’жҙІиЎҢеҠЁжЁЎеқ— -->
  <div id="delta-container">
    <div id="delta-loading" class="text-center py-10 text-lg">жӯЈеңЁеҠ иҪҪж•°жҚ®...</div>
    <div id="delta-error" class="hidden text-center py-10 text-red-400"></div>
    <div id="delta-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>
  <!-- жҳҺж—Ҙж–№иҲҹи“қеӣҫжЁЎеқ— -->
  <div id="ark-container" class="hidden">
    <div id="ark-loading" class="text-center py-10 text-lg">жӯЈеңЁеҠ иҪҪи“қеӣҫж•°жҚ®...</div>
    <div id="ark-error" class="hidden text-center py-10 text-red-400"></div>
    <div id="ark-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>
</main>
<script>
// е…ЁеұҖж ҮзӯҫеҲҮжҚўйҖ»иҫ‘
const tabDelta = document.getElementById('tab-delta');
const tabArk = document.getElementById('tab-ark');
const deltaContainer = document.getElementById('delta-container');
const arkContainer = document.getElementById('ark-container');

tabDelta.addEventListener('click', () => {
  tabDelta.classList.add('tab-active');
  tabArk.classList.remove('tab-active');
  deltaContainer.classList.remove('hidden');
  arkContainer.classList.add('hidden');
});
tabArk.addEventListener('click', () => {
  tabArk.classList.add('tab-active');
  tabDelta.classList.remove('tab-active');
  arkContainer.classList.remove('hidden');
  deltaContainer.classList.add('hidden');
  if (!arkLoaded) getArkData();
});

// рҹ”ҙ ж ёеҝғдҝ®ж”№пјҡдёүи§’жҙІиЎҢеҠЁж–°APIй…ҚзҪ®+иҜ·жұӮ+и§Јжһҗ+жёІжҹ“
const DELTA_API = 'https://115exuq280928.vicp.fun/API/sjz_password.php';
// жӢјжҺҘеҝ…еЎ«еҸӮж•°пјҡxz=1(й»ҳи®Ө)пјҢtype=json(й»ҳи®Ө)
const deltaParams = new URLSearchParams({
  xz: 1,
  type: 'json'
});
// ж–°жҺҘеҸЈиҜ·жұӮпјҲJSONж јејҸпјү
fetch(`${DELTA_API}?${deltaParams}`)
  .then(res => {
    if (!res.ok) throw new Error('жҺҘеҸЈиҜ·жұӮеӨұиҙҘ');
    return res.json(); // ж”№дёәи§ЈжһҗJSONпјҢжӣҝд»ЈеҺҹtext
  })
  .then(data => {
    document.getElementById('delta-loading').classList.add('hidden');
    // еҲӨж–ӯжҺҘеҸЈиҝ”еӣһзҠ¶жҖҒ
    if (data.code !== 0) {
      document.getElementById('delta-error').textContent = `иҺ·еҸ–еӨұиҙҘпјҡ${data.message || 'жңӘзҹҘй”ҷиҜҜ'}`;
      document.getElementById('delta-error').classList.remove('hidden');
      return;
    }
    const list = parseDeltaData(data);
    renderDelta(list);
    document.getElementById('delta-grid').classList.remove('hidden');
  })
  .catch(err => {
    document.getElementById('delta-loading').classList.add('hidden');
    document.getElementById('delta-error').textContent = `зҪ‘з»ң/и§Јжһҗй”ҷиҜҜпјҡ${err.message}`;
    document.getElementById('delta-error').classList.remove('hidden');
  });

// и§Јжһҗдёүи§’жҙІJSONж•°жҚ®пјҲз®ҖеҢ–пјҢж— йңҖжӯЈеҲҷпјү
function parseDeltaData(data) {
  // зӣҙжҺҘиҝ”еӣһеҜҶз ҒеҲ—иЎЁпјҢйҖӮй…Қж–°еӯ—ж®ө
  return data.daily_passwords.map(item => ({
    map: item.map.trim(),
    pwd: item.password.trim(),
    pos: item.description.trim(),
    img: item.icon.trim(), // ж–°жҺҘеҸЈдёәеҚ•еӣҫiconпјҢжӣҝд»ЈеҺҹеӨҡеӣҫimgs
    time: item.update_time.trim()
  }));
}

// жёІжҹ“дёүи§’жҙІеҚЎзүҮпјҲйҖӮй…Қж–°зҡ„еҚ•еӣҫеӯ—ж®өпјү
function renderDelta(list) {
  const grid = document.getElementById('delta-grid');
  list.forEach(item => {
    const card = document.createElement('div');
    card.className = 'bg-slate-800 rounded-xl overflow-hidden shadow flex flex-col h-full';
    // еӣҫзүҮеӨ„зҗҶпјҡйҖӮй…Қж–°жҺҘеҸЈеҚ•еӣҫicon
    let imgHtml = `<div class="aspect-video bg-slate-700 flex items-center justify-center text-slate-400">жҡӮж— еӣҫзүҮ</div>`;
    if (item.img && item.img.startsWith('http')) {
      imgHtml = `<img src="${item.img}" class="w-full h-full object-cover" alt="${item.map}">`;
    }
    card.innerHTML = `
      <div class="aspect-video overflow-hidden">${imgHtml}</div>
      <div class="p-4 flex flex-col gap-2 flex-1">
        <div class="font-semibold text-white text-base leading-snug">${item.map}</div>
        <div class="flex items-center gap-2">
          <span class="text-slate-400 text-sm">еҜҶз Ғпјҡ</span>
          <span class="text-yellow-400 text-lg font-bold">${item.pwd}</span>
        </div>
        <div class="text-sm text-slate-300 leading-relaxed">${item.pos}</div>
        <div class="mt-auto text-xs text-slate-500 pt-2">${item.time}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// жҳҺж—Ҙж–№иҲҹи“қеӣҫеҠҹиғҪпјҲж— дҝ®ж”№пјҢдҝқжҢҒеҺҹж ·пјү
let arkLoaded = false;
const ARK_API = 'https://api-v2.yuafeng.cn/API/mrfz.php';

function getArkData() {
  fetch(ARK_API, {
    method: 'GET',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
  })
  .then(res => res.text())
  .then(text => {
    document.getElementById('ark-loading').classList.add('hidden');
    try {
      const list = parseArkData(text);
      renderArk(list);
      document.getElementById('ark-grid').classList.remove('hidden');
      arkLoaded = true;
    } catch (e) {
      document.getElementById('ark-error').textContent = 'и“қеӣҫж•°жҚ®и§ЈжһҗеӨұиҙҘ';
      document.getElementById('ark-error').classList.remove('hidden');
    }
  })
  .catch(() => {
    document.getElementById('ark-loading').classList.add('hidden');
    document.getElementById('ark-error').textContent = 'и“қеӣҫзҪ‘з»ңиҜ·жұӮеӨұиҙҘ';
    document.getElementById('ark-error').classList.remove('hidden');
  });
}

function parseArkData(text) {
  const items = [];
  const reg = /рҹ”№\s*\d+\.\s*(.+?)\nрҹ“Қ\s*ең°еӣҫзұ»еһӢпјҡ(.+?)\nрҹ“қ\s*иҜҙжҳҺпјҡ(.+?)\nрҹ”‘\s*еҲҶдә«з Ғпјҡ(.+?)\nрҹ–јпёҸ\s*йў„и§Ҳеӣҫпјҡ(.+?)\nвҸұпёҸ\s*дёҠдј ж—¶й—ҙпјҡ(.+?)(?=\nрҹ”№|$)/gs;
  let m;
  while ((m = reg.exec(text)) !== null) {
    items.push({
      name: m[1].trim() || 'жңӘе‘ҪеҗҚи“қеӣҫ',
      mapType: m[2].trim() || 'жңӘзҹҘ',
      desc: m[3].trim() || 'ж— иҜҙжҳҺ',
      code: m[4].trim(),
      img: m[5].trim(),
      time: m[6].trim()
    });
  }
  return items;
}

function renderArk(list) {
  const grid = document.getElementById('ark-grid');
  list.forEach(item => {
    const card = document.createElement('div');
    card.className = 'bg-slate-800 rounded-xl overflow-hidden shadow flex flex-col h-full';
    let imgHtml = `<div class="aspect-video bg-slate-700 flex items-center justify-center text-slate-400">жҡӮж— йў„и§Ҳеӣҫ</div>`;
    if (item.img && item.img.startsWith('http')) {
      imgHtml = `<img src="${item.img}" class="w-full h-full object-cover" alt="${item.name}">`;
    }
    card.innerHTML = `
      <div class="aspect-video overflow-hidden">${imgHtml}</div>
      <div class="p-4 flex flex-col gap-2 flex-1">
        <div class="font-semibold text-white text-base leading-snug truncate" title="${item.name}">${item.name}</div>
        <div class="flex items-center gap-2">
          <span class="text-slate-400 text-sm">еҲҶдә«з Ғпјҡ</span>
          <span class="text-yellow-400 text-sm font-bold break-all">${item.code}</span>
        </div>
        <div class="text-xs text-slate-300">зұ»еһӢпјҡ${item.mapType} | иҜҙжҳҺпјҡ${item.desc}</div>
        <div class="mt-auto text-xs text-slate-500 pt-2">дёҠдј ж—¶й—ҙпјҡ${item.time}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
