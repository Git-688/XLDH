<script>
const API_ID = '10014221'
const API_KEY = '4a7768de1cf2e0f41fc0a4005240c837'
let toastTimer = null
// 提示
function showToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('show')
    clearTimeout(toastTimer)
    toastTimer = setTimeout(()=>t.classList.remove('show'),1600)
}
// 加载
function showLoading(show){
    document.getElementById('loading').classList.toggle('hidden',!show)
}
// 日期
function getToday(){
    return new Date().toISOString().split('T')[0]
}
// 格式化日期为YYYY-MM-DD
function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}
// 存储：日期 + 签文数据
function getQianData(key){
    const today = getToday()
    const lastDate = localStorage.getItem(key+'_date')
    if(lastDate !== today) return null
    const data = localStorage.getItem(key+'_data')
    return data ? JSON.parse(data) : null
}
function saveQianData(key,data){
    localStorage.setItem(key+'_date',getToday())
    localStorage.setItem(key+'_data',JSON.stringify(data))
}
// 标签切换
document.querySelectorAll('.tab-item').forEach(tab=>{
    tab.addEventListener('click',()=>{
        document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'))
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('show'))
        tab.classList.add('active')
        document.getElementById(tab.dataset.target).classList.add('show')
    })
})
// ------------------------------
// 自定义下拉选择器逻辑
// ------------------------------
function initCustomSelect() {
    const allSelects = document.querySelectorAll('.custom-select');
    
    allSelects.forEach(select => {
        const trigger = select.querySelector('.custom-select-trigger');
        const optionsWrapper = select.querySelector('.custom-select-options');
        const options = select.querySelectorAll('.custom-select-option');
        const valueEl = trigger.querySelector('.custom-select-value');
        
        // 存储选中的值
        select.dataset.selectedValue = '';
        
        // 点击触发框切换展开/收起
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            // 先关闭其他所有下拉
            allSelects.forEach(otherSelect => {
                if(otherSelect !== select) {
                    otherSelect.querySelector('.custom-select-trigger').classList.remove('open');
                    otherSelect.querySelector('.custom-select-options').classList.remove('open');
                }
            });
            // 切换当前下拉
            trigger.classList.toggle('open');
            optionsWrapper.classList.toggle('open');
        });
        
        // 点击选项选中
        options.forEach(option => {
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                const value = option.dataset.value;
                const text = option.textContent;
                
                // 更新选中状态
                options.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                
                // 更新触发框显示
                valueEl.textContent = text;
                if(value === '') {
                    valueEl.classList.add('placeholder');
                } else {
                    valueEl.classList.remove('placeholder');
                }
                
                // 存储选中值
                select.dataset.selectedValue = value;
                
                // 收起下拉
                trigger.classList.remove('open');
                optionsWrapper.classList.remove('open');
            });
        });
    });
    
    // 点击页面其他地方收起所有下拉
    document.addEventListener('click', () => {
        allSelects.forEach(select => {
            select.querySelector('.custom-select-trigger').classList.remove('open');
            select.querySelector('.custom-select-options').classList.remove('open');
        });
    });
}

    const gd = getQianData('gd')

    // 月老灵签

}
