<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本草药材查询工具</title>
    <style>
        /* 全局变量 以本草纲目样式为基准统一管控 */
        :root {
            --primary: #2c7a50;
            --primary-hover: #236340;
            --primary-light: rgba(44, 122, 80, 0.1);
            --bg-page: #f8faf9;
            --bg-card: #ffffff;
            --text-title: #1a1a1a;
            --text-main: #333333;
            --text-secondary: #666666;
            --text-weak: #999999;
            --border-color: #e5e7eb;
            --radius: 8px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.09);
            --transition: all 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.7;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* 头部样式 */
        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-title);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* 标签切换样式 */
        .tabs-wrap {
            display: flex;
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 4px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            gap: 4px;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            user-select: none;
        }

        .tab-item.active {
            background-color: var(--primary);
            color: #ffffff;
            box-shadow: var(--shadow-sm);
        }

        .tab-item:not(.active):hover {
            background-color: var(--bg-page);
            color: var(--text-title);
        }

        /* 标签内容容器 */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 搜索区域样式 全局统一 */
        .search-wrap {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 15px;
            color: var(--text-main);
            background-color: var(--bg-card);
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .search-input::placeholder {
            color: var(--text-weak);
        }

        .search-btn {
            padding: 14px 30px;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .search-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .search-btn:disabled {
            background-color: var(--text-weak);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 状态提示样式 全局统一 */
        .status-tip {
            padding: 16px;
            border-radius: var(--radius);
            text-align: center;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .loading-tip {
            background-color: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .error-tip {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
        }

        .hidden {
            display: none;
        }

        /* 结果卡片样式 全局统一 */
        .result-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
        }

        .result-card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* 药材标题样式 完全沿用本草纲目样式 两个模块100%统一 */
        .drug-name {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-title);
            padding-bottom: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            line-height: 1.3;
        }

        .drug-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 4px;
        }

        /* 核心内容块样式 完全沿用本草纲目样式 两个模块100%复用 */
        .section {
            margin-bottom: 24px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-label {
            display: inline-block;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .section-content {
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.8;
            white-space: pre-line;
        }

        /* 主治列表样式 本草纲目原生样式 统一复用 */
        .indication-list {
            padding-left: 20px;
        }

        .indication-list li {
            margin-bottom: 10px;
        }

        .indication-list li:last-child {
            margin-bottom: 0;
        }

        /* 移动端响应式 全局统一 */
        @media (max-width: 640px) {
            body {
                padding: 24px 16px;
            }

            header h1 {
                font-size: 26px;
            }

            header p {
                font-size: 14px;
            }

            .search-wrap {
                flex-direction: column;
                gap: 10px;
            }

            .search-btn {
                width: 100%;
            }

            .result-card {
                padding: 20px;
            }

            .drug-name {
                font-size: 22px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>本草药材查询工具</h1>
            <p>一站式查询本草纲目典籍信息与中草药专业药用知识</p>
        </header>

        <!-- 标签切换栏 -->
        <div class="tabs-wrap">
            <div class="tab-item active" data-tab="bencao">本草纲目</div>
            <div class="tab-item" data-tab="zhongcao">中草药</div>
        </div>

        <!-- 本草纲目标签内容 原生结构完全保留 -->
        <div class="tab-content active" id="bencao-tab">
            <div class="search-wrap">
                <input 
                    type="text" 
                    id="bencaoInput" 
                    class="search-input" 
                    placeholder="请输入药名，例如：丁香、人参、当归、甘草"
                />
                <button id="bencaoBtn" class="search-btn">立即查询</button>
            </div>

            <div id="bencaoLoading" class="status-tip loading-tip hidden">正在查询药材信息，请稍候...</div>
            <div id="bencaoError" class="status-tip error-tip hidden"></div>

            <div id="bencaoResult" class="result-card hidden">
                <div class="drug-name" id="bencaoDrugName"></div>
                
                <div class="section" id="bencaoShiming">
                    <span class="section-label">释名</span>
                    <div class="section-content" id="bencaoShimingContent"></div>
                </div>

                <div class="section" id="bencaoQiwei">
                    <span class="section-label">气味</span>
                    <div class="section-content" id="bencaoQiweiContent"></div>
                </div>

                <div class="section" id="bencaoZhuzhi">
                    <span class="section-label">主治</span>
                    <div class="section-content" id="bencaoZhuzhiContent"></div>
                </div>

                <div class="section" id="bencaoFufang">
                    <span class="section-label">附方</span>
                    <div class="section-content" id="bencaoFufangContent"></div>
                </div>
            </div>
        </div>

        <!-- 中草药标签内容 完全复刻本草纲目结构与样式 -->
        <div class="tab-content" id="zhongcao-tab">
            <div class="search-wrap">
                <input 
                    type="text" 
                    id="zhongcaoInput" 
                    class="search-input" 
                    placeholder="请输入中草药名，例如：黄连、黄芪、金银花、板蓝根"
                />
                <button id="zhongcaoBtn" class="search-btn">立即查询</button>
            </div>

            <div id="zhongcaoLoading" class="status-tip loading-tip hidden">正在查询药材信息，请稍候...</div>
            <div id="zhongcaoError" class="status-tip error-tip hidden"></div>

            <div id="zhongcaoResult" class="result-card hidden">
                <div class="drug-name" id="zhongcaoDrugName">
                    <span id="zhongcaoCnName"></span>
                    <div class="drug-subtitle" id="zhongcaoEnName"></div>
                </div>
                
                <div class="section" id="zhongcaoAlias">
                    <span class="section-label">别名</span>
                    <div class="section-content" id="zhongcaoAliasContent"></div>
                </div>

                <div class="section" id="zhongcaoPart">
                    <span class="section-label">药用部位</span>
                    <div class="section-content" id="zhongcaoPartContent"></div>
                </div>

                <div class="section" id="zhongcaoType">
                    <span class="section-label">性味归经</span>
                    <div class="section-content" id="zhongcaoTypeContent"></div>
                </div>

                <div class="section" id="zhongcaoEffect">
                    <span class="section-label">功效与作用</span>
                    <div class="section-content" id="zhongcaoEffectContent"></div>
                </div>

                <div class="section" id="zhongcaoUsage">
                    <span class="section-label">用法用量</span>
                    <div class="section-content" id="zhongcaoUsageContent"></div>
                </div>

                <div class="section" id="zhongcaoTaboo">
                    <span class="section-label">用药禁忌</span>
                    <div class="section-content" id="zhongcaoTabooContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 标签切换逻辑
        const tabItems = document.querySelectorAll('.tab-item');
        const tabContents = document.querySelectorAll('.tab-content');
        
        tabItems.forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.getAttribute('data-tab');
                // 切换激活状态
                tabItems.forEach(t => t.classList.remove('active'));
                tabContents.forEach(tc => tc.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${targetTab}-tab`).classList.add('active');
                // 自动聚焦当前标签的输入框
                if (targetTab === 'bencao') {
                    document.getElementById('bencaoInput').focus();
                } else {
                    document.getElementById('zhongcaoInput').focus();
                }
            });
        });

        // ====================== 本草纲目核心逻辑 完全保留 ======================
        // 元素获取
        const bencaoInput = document.getElementById('bencaoInput');
        const bencaoBtn = document.getElementById('bencaoBtn');
        const bencaoLoading = document.getElementById('bencaoLoading');
        const bencaoError = document.getElementById('bencaoError');
        const bencaoResult = document.getElementById('bencaoResult');
        const bencaoDrugName = document.getElementById('bencaoDrugName');
        
        // 本草纲目内容模块
        const bencaoShiming = document.getElementById('bencaoShiming');
        const bencaoShimingContent = document.getElementById('bencaoShimingContent');
        const bencaoQiwei = document.getElementById('bencaoQiwei');
        const bencaoQiweiContent = document.getElementById('bencaoQiweiContent');
        const bencaoZhuzhi = document.getElementById('bencaoZhuzhi');
        const bencaoZhuzhiContent = document.getElementById('bencaoZhuzhiContent');
        const bencaoFufang = document.getElementById('bencaoFufang');
        const bencaoFufangContent = document.getElementById('bencaoFufangContent');

        // 接口配置
        const BENCAO_API = 'https://api.lolimi.cn/API/benc/index';

        // 文本结构化解析函数
        function parseBencaoContent(rawText) {
            const result = {
                shiming: '',
                qiwei: '',
                zhuzhi: '',
                fufang: ''
            };

            // 提取释名
            const shimingMatch = rawText.match(/释名：([^。]*。)/);
            if (shimingMatch) result.shiming = shimingMatch[1].trim();

            // 提取气味
            const qiweiMatch = rawText.match(/气味：([^。]*。)/);
            if (qiweiMatch) result.qiwei = qiweiMatch[1].trim();

            // 提取主治和附方
            const zhuzhiStart = rawText.indexOf('主治：');
            const fufangStart = rawText.indexOf('附方：');

            if (zhuzhiStart !== -1) {
                if (fufangStart !== -1) {
                    result.zhuzhi = rawText.slice(zhuzhiStart + 3, fufangStart).trim();
                    result.fufang = rawText.slice(fufangStart + 3).trim();
                } else {
                    result.zhuzhi = rawText.slice(zhuzhiStart + 3).trim();
                }
            }

            return result;
        }

        // 主治条目拆分为有序列表
        function renderZhuzhiList(zhuzhiText) {
            if (!zhuzhiText) return '';
            const itemReg = /(\d+、[^1-9]+)/g;
            const items = zhuzhiText.match(itemReg);
            
            if (items && items.length > 0) {
                let listHtml = '<ol class="indication-list">';
                items.forEach(item => {
                    listHtml += `<li>${item.replace(/^\d+、/, '')}</li>`;
                });
                listHtml += '</ol>';
                return listHtml;
            }
            return zhuzhiText;
        }

        // 本草纲目核心查询函数
        async function queryBencao() {
            const keyword = bencaoInput.value.trim();
            if (!keyword) {
                showBencaoError('请输入药名后再进行查询');
                return;
            }

            // 切换加载状态
            bencaoLoading.classList.remove('hidden');
            bencaoError.classList.add('hidden');
            bencaoResult.classList.add('hidden');
            bencaoBtn.disabled = true;

            try {
                // 发起请求
                const response = await fetch(`${BENCAO_API}?msg=${encodeURIComponent(keyword)}`);
                if (!response.ok) throw new Error(`请求失败，状态码：${response.status}`);

                const data = await response.json();

                // 处理接口错误
                if (data.error) throw new Error(data.error);
                if (!data.yao || !data.Tans) throw new Error('未查询到该药材的相关信息');

                // 解析并渲染内容
                renderBencaoResult(data.yao, data.Tans);

            } catch (err) {
                showBencaoError(err.message || '查询异常，请检查网络后重试');
            } finally {
                bencaoLoading.classList.add('hidden');
                bencaoBtn.disabled = false;
            }
        }

        // 本草纲目结果渲染
        function renderBencaoResult(name, rawContent) {
            const parsed = parseBencaoContent(rawContent);
            
            // 填充药名
            bencaoDrugName.textContent = name;

            // 填充释名
            if (parsed.shiming) {
                bencaoShimingContent.textContent = parsed.shiming;
                bencaoShiming.classList.remove('hidden');
            } else {
                bencaoShiming.classList.add('hidden');
            }

            // 填充气味
            if (parsed.qiwei) {
                bencaoQiweiContent.textContent = parsed.qiwei;
                bencaoQiwei.classList.remove('hidden');
            } else {
                bencaoQiwei.classList.add('hidden');
            }

            // 填充主治
            if (parsed.zhuzhi) {
                bencaoZhuzhiContent.innerHTML = renderZhuzhiList(parsed.zhuzhi);
                bencaoZhuzhi.classList.remove('hidden');
            } else {
                bencaoZhuzhi.classList.add('hidden');
            }

            // 填充附方
            if (parsed.fufang) {
                bencaoFufangContent.textContent = parsed.fufang;
                bencaoFufang.classList.remove('hidden');
            } else {
                bencaoFufang.classList.add('hidden');
            }

            // 显示结果卡片
            bencaoResult.classList.remove('hidden');
        }

        // 本草纲目错误提示
        function showBencaoError(message) {
            bencaoError.textContent = message;
            bencaoError.classList.remove('hidden');
            bencaoResult.classList.add('hidden');
        }

        // 本草纲目事件绑定
        bencaoBtn.addEventListener('click', queryBencao);
        bencaoInput.addEventListener('keydown', (e) => e.key === 'Enter' && queryBencao());

        // ====================== 中草药核心逻辑 完全对齐本草纲目渲染规则 ======================
        // 元素获取
        const zhongcaoInput = document.getElementById('zhongcaoInput');
        const zhongcaoBtn = document.getElementById('zhongcaoBtn');
        const zhongcaoLoading = document.getElementById('zhongcaoLoading');
        const zhongcaoError = document.getElementById('zhongcaoError');
        const zhongcaoResult = document.getElementById('zhongcaoResult');
        const zhongcaoCnName = document.getElementById('zhongcaoCnName');
        const zhongcaoEnName = document.getElementById('zhongcaoEnName');
        
        // 中草药内容模块 完全对齐本草目的section结构
        const zhongcaoAlias = document.getElementById('zhongcaoAlias');
        const zhongcaoAliasContent = document.getElementById('zhongcaoAliasContent');
        const zhongcaoPart = document.getElementById('zhongcaoPart');
        const zhongcaoPartContent = document.getElementById('zhongcaoPartContent');
        const zhongcaoType = document.getElementById('zhongcaoType');
        const zhongcaoTypeContent = document.getElementById('zhongcaoTypeContent');
        const zhongcaoEffect = document.getElementById('zhongcaoEffect');
        const zhongcaoEffectContent = document.getElementById('zhongcaoEffectContent');
        const zhongcaoUsage = document.getElementById('zhongcaoUsage');
        const zhongcaoUsageContent = document.getElementById('zhongcaoUsageContent');
        const zhongcaoTaboo = document.getElementById('zhongcaoTaboo');
        const zhongcaoTabooContent = document.getElementById('zhongcaoTabooContent');

        // 接口配置
        const ZHONGCAO_API = 'https://api.qhsou.com/api/zcy.php';

        // 中草药核心查询函数
        async function queryZhongcao() {
            const keyword = zhongcaoInput.value.trim();
            if (!keyword) {
                showZhongcaoError('请输入药名后再进行查询');
                return;
            }

            // 切换加载状态 完全对齐本草目逻辑
            zhongcaoLoading.classList.remove('hidden');
            zhongcaoError.classList.add('hidden');
            zhongcaoResult.classList.add('hidden');
            zhongcaoBtn.disabled = true;

            try {
                // 发起请求
                const response = await fetch(`${ZHONGCAO_API}?name=${encodeURIComponent(keyword)}`);
                if (!response.ok) throw new Error(`请求失败，状态码：${response.status}`);

                const data = await response.json();

                // 处理接口返回
                if (!data || data.length === 0) throw new Error('未查询到该药材的相关信息');
                const drugData = data[0];

                // 渲染结果 完全对齐本草目渲染逻辑
                renderZhongcaoResult(drugData);

            } catch (err) {
                showZhongcaoError(err.message || '查询异常，请检查网络后重试');
            } finally {
                zhongcaoLoading.classList.add('hidden');
                zhongcaoBtn.disabled = false;
            }
        }

        // 中草药结果渲染 完全对齐本草目的显示/隐藏逻辑
        function renderZhongcaoResult(data) {
            // 填充药名 完全对齐本草目标题样式
            zhongcaoCnName.textContent = data.Name || '未知药材';
            zhongcaoEnName.textContent = data.English_Name || '';
            zhongcaoEnName.style.display = data.English_Name ? 'block' : 'none';

            // 填充别名 对齐本草目逻辑：有内容显示，无内容隐藏
            if (data.Alias && data.Alias !== '未知') {
                zhongcaoAliasContent.textContent = data.Alias;
                zhongcaoAlias.classList.remove('hidden');
            } else {
                zhongcaoAlias.classList.add('hidden');
            }

            // 填充药用部位
            if (data.Medicinal_Part && data.Medicinal_Part !== '未知') {
                zhongcaoPartContent.textContent = data.Medicinal_Part;
                zhongcaoPart.classList.remove('hidden');
            } else {
                zhongcaoPart.classList.add('hidden');
            }

            // 填充性味归经
            if (data.Type && data.Type !== '未知') {
                zhongcaoTypeContent.textContent = data.Type;
                zhongcaoType.classList.remove('hidden');
            } else {
                zhongcaoType.classList.add('hidden');
            }

            // 填充功效与作用
            if (data.Effect && data.Effect !== '未知') {
                zhongcaoEffectContent.textContent = data.Effect;
                zhongcaoEffect.classList.remove('hidden');
            } else {
                zhongcaoEffect.classList.add('hidden');
            }

            // 填充用法用量
            if (data.Usage && data.Usage !== '未知') {
                zhongcaoUsageContent.textContent = data.Usage;
                zhongcaoUsage.classList.remove('hidden');
            } else {
                zhongcaoUsage.classList.add('hidden');
            }

            // 填充用药禁忌
            if (data.Taboo && data.Taboo !== '未知') {
                zhongcaoTabooContent.textContent = data.Taboo;
                zhongcaoTaboo.classList.remove('hidden');
            } else {
                zhongcaoTaboo.classList.add('hidden');
            }

            // 显示结果卡片
            zhongcaoResult.classList.remove('hidden');
        }

        // 中草药错误提示 对齐本草目逻辑
        function showZhongcaoError(message) {
            zhongcaoError.textContent = message;
            zhongcaoError.classList.remove('hidden');
            zhongcaoResult.classList.add('hidden');
        }

        // 中草药事件绑定
        zhongcaoBtn.addEventListener('click', queryZhongcao);
        zhongcaoInput.addEventListener('keydown', (e) => e.key === 'Enter' && queryZhongcao());

        // 页面加载自动聚焦
        window.addEventListener('load', () => {
            bencaoInput.focus();
        });
    </script>
</body>
</html>
