<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摸鱼日历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <img id="calendar" alt="" draggable="false">
    <script>
        // 时间戳防缓存，确保获取当日最新日历
        document.getElementById('calendar').src = `https://api.lolimi.cn/API/60s/moyu_calendar?t=${Date.now()}`;
    </script>
</body>
</html>
