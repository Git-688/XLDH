<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史人物&诗人年轮查询</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 极简主题配置：统一字号、克制配色、现代圆角 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            secondary: '#10b981',
            neutral: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
            }
          },
          fontSize: {
            'xs': '0.75rem',    // 12px 辅助文字
            'sm': '0.875rem',   // 14px 正文基础
            'base': '1rem',     // 16px 次要标题
            'lg': '1.125rem',   // 18px 主标题
            'xl': '1.25rem',    // 20px 页面大标题
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <!-- 极简工具类：仅保留核心样式 -->
  <style type="text/tailwindcss">
    @layer utilities {
      .card-base {
        @apply bg-white rounded-lg border border-neutral-200;
      }
      .timeline-line {
        @apply absolute left-[7px] top-0 bottom-0 w-[1px] bg-neutral-200 md:left-1/2 md:-ml-[0.5px];
      }
      .timeline-dot {
        @apply absolute left-0 top-1.5 w-3.5 h-3.5 rounded-full bg-white border-2 border-primary z-10 md:left-1/2 md:-ml-[7px];
      }
      .tab-active {
        @apply border-b-2 border-primary text-primary font-medium;
      }
      .poet-avatar {
        @apply w-20 h-20 rounded-lg object-cover border-2 border-neutral-200;
      }
    }
  </style>
</head>
<body class="bg-neutral-50 min-h-screen font-sans text-neutral-800">
  <div class="max-w-3xl mx-auto px-4 py-8 sm:px-6 md:py-12 lg:px-8">
    <!-- 页面头部：极简紧凑 -->
    <header class="text-center mb-6">
      <h1 class="text-xl font-semibold text-neutral-900 mb-3">历史人物&诗人年轮查询</h1>
      <!-- 功能切换标签 -->
      <div class="flex justify-center gap-8 mb-1 border-b border-neutral-200">
        <button id="personTab" class="tab-active py-2 px-1 text-sm">历史人物</button>
        <button id="poetTab" class="py-2 px-1 text-sm text-neutral-600">诗人查询</button>
      </div>
    </header>

    <!-- 搜索区域：统一高度、紧凑排版 -->
    <div class="card-base p-4 mb-5">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
        <div class="flex-1">
          <label for="searchInput" class="block text-xs text-neutral-600 mb-1" id="searchLabel">人物姓名</label>
          <input 
            type="text" 
            id="searchInput" 
            class="w-full rounded-md border border-neutral-300 px-3 py-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary/20 outline-none transition"
            placeholder="如：曹操、李白、李世民"
            id="searchPlaceholder"
          >
        </div>
        <div class="sm:pt-[14px]">
          <button 
            id="searchBtn" 
            class="w-full bg-primary hover:bg-primary/90 text-white font-medium rounded-md px-5 py-2 text-sm transition-all active:scale-98 disabled:opacity-70 disabled:cursor-not-allowed sm:w-auto"
          >
            立即查询
          </button>
        </div>
      </div>
    </div>

    <!-- 加载状态：极简 -->
    <div id="loading" class="hidden text-center py-10">
      <div class="inline-block animate-spin rounded-full h-5 w-5 border-2 border-neutral-200 border-t-primary mb-2"></div>
      <p class="text-sm text-neutral-600">查询中...</p>
    </div>

    <!-- 错误提示：温和样式 -->
    <div id="error" class="hidden bg-red-50 border border-red-100 rounded-md p-3 mb-5">
      <p id="errorText" class="text-sm text-red-600"></p>
    </div>

    <!-- 历史人物结果展示区域：严格对齐、层级清晰 -->
    <div id="personResult" class="hidden space-y-5">
      <!-- 人物基本信息：紧凑规整 -->
      <div id="baseInfo" class="card-base p-4">
        <h2 id="personName" class="text-lg font-semibold text-neutral-900 mb-1"></h2>
        <div class="flex flex-wrap gap-x-4 gap-y-1 items-center">
          <p id="personDynasty" class="text-sm text-neutral-600"></p>
          <p id="personDesc" class="text-sm text-neutral-600"></p>
        </div>
      </div>
      <!-- 人物详情：网格对齐、无冗余装饰 -->
      <div id="infoSection" class="card-base p-4">
        <h3 class="text-base font-medium text-neutral-900 mb-3">人物详情</h3>
        <div id="infoList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-4 gap-y-2"></div>
      </div>
      <!-- 历史事件时间线：极简样式、全端适配对齐 -->
      <div id="eventSection" class="card-base p-4">
        <h3 class="text-base font-medium text-neutral-900 mb-4">历史年轮事件</h3>
        <div id="eventTimeline" class="relative"></div>
      </div>
    </div>

    <!-- 诗人结果展示区域：适配诗人接口返回字段 -->
    <div id="poetResult" class="hidden space-y-5">
      <!-- 诗人基本信息：含头像、称号、朝代 -->
      <div id="poetBaseInfo" class="card-base p-4 flex flex-col sm:flex-row gap-4 items-start sm:items-center">
        <img id="poetAvatar" class="poet-avatar" src="" alt="诗人头像">
        <div>
          <h2 id="poetName" class="text-lg font-semibold text-neutral-900 mb-1"></h2>
          <div class="flex flex-wrap gap-x-3 gap-y-1 items-center mb-2">
            <p id="poetTag" class="text-sm bg-primary/10 text-primary px-2 py-0.5 rounded-full"></p>
            <p id="poetDynasty" class="text-sm text-neutral-600"></p>
            <p id="poetDesignation" class="text-sm text-neutral-600"></p>
          </div>
          <p id="poetTags" class="text-xs text-neutral-500 flex flex-wrap gap-1"><span>标签：</span></p>
        </div>
      </div>
      <!-- 诗人核心介绍 -->
      <div id="poetIntro" class="card-base p-4">
        <h3 class="text-base font-medium text-neutral-900 mb-3">诗人介绍</h3>
        <div id="poetContent" class="text-sm text-neutral-700 leading-relaxed"></div>
      </div>
      <!-- 诗人详情标签页：生平、成就、轶事、家族、纪念 -->
      <div class="card-base p-4">
        <div class="flex flex-wrap gap-4 border-b border-neutral-200 mb-3">
          <button class="poet-detail-tab active py-2 px-1 text-sm border-b-2 border-secondary text-secondary" data-tab="life">人物生平</button>
          <button class="poet-detail-tab py-2 px-1 text-sm text-neutral-600" data-tab="achievement">主要成就</button>
          <button class="poet-detail-tab py-2 px-1 text-sm text-neutral-600" data-tab="story">轶事典故</button>
          <button class="poet-detail-tab py-2 px-1 text-sm text-neutral-600" data-tab="family">家庭成员</button>
          <button class="poet-detail-tab py-2 px-1 text-sm text-neutral-600" data-tab="memorial">后世纪念</button>
        </div>
        <div class="poet-detail-content" id="lifeContent" class="text-sm text-neutral-700 leading-relaxed"></div>
        <div class="poet-detail-content hidden" id="achievementContent" class="text-sm text-neutral-700 leading-relaxed"></div>
        <div class="poet-detail-content hidden" id="storyContent" class="text-sm text-neutral-700 leading-relaxed"></div>
        <div class="poet-detail-content hidden" id="familyContent" class="text-sm text-neutral-700 leading-relaxed"></div>
        <div class="poet-detail-content hidden" id="memorialContent" class="text-sm text-neutral-700 leading-relaxed"></div>
      </div>
    </div>
  </div>

  <script>
    // 接口配置
    const PERSON_API_URL = 'https://api.pearktrue.cn/api/yearsmap/';
    const POET_API_URL = 'https://cn.apihz.cn/api/zici/poet.php';
    // 诗人接口固定参数（需替换为实际有效id和key）
    const POET_PARAMS = {
      id: '10014221',
      key: '4a7768de1cf2e0f41fc0a4005240c837',
      page: 1
    };

    // DOM元素
    // 功能切换
    const personTab = document.getElementById('personTab');
    const poetTab = document.getElementById('poetTab');
    const searchLabel = document.getElementById('searchLabel');
    const searchInput = document.getElementById('searchInput');
    // 通用
    const searchBtn = document.getElementById('searchBtn');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const errorTextEl = document.getElementById('errorText');
    // 历史人物结果
    const personResultEl = document.getElementById('personResult');
    const personNameEl = document.getElementById('personName');
    const personDynastyEl = document.getElementById('personDynasty');
    const personDescEl = document.getElementById('personDesc');
    const infoListEl = document.getElementById('infoList');
    const eventTimelineEl = document.getElementById('eventTimeline');
    // 诗人结果
    const poetResultEl = document.getElementById('poetResult');
    const poetAvatarEl = document.getElementById('poetAvatar');
    const poetNameEl = document.getElementById('poetName');
    const poetTagEl = document.getElementById('poetTag');
    const poetDynastyEl = document.getElementById('poetDynasty');
    const poetDesignationEl = document.getElementById('poetDesignation');
    const poetTagsEl = document.getElementById('poetTags');
    const poetContentEl = document.getElementById('poetContent');
    const poetDetailTabs = document.querySelectorAll('.poet-detail-tab');
    const poetDetailContents = document.querySelectorAll('.poet-detail-content');
    const lifeContentEl = document.getElementById('lifeContent');
    const achievementContentEl = document.getElementById('achievementContent');
    const storyContentEl = document.getElementById('storyContent');
    const familyContentEl = document.getElementById('familyContent');
    const memorialContentEl = document.getElementById('memorialContent');

    // 全局状态：标记当前查询类型（person/poet）
    let currentType = 'person';

    // 功能切换标签事件
    personTab.addEventListener('click', () => {
      currentType = 'person';
      personTab.classList.add('tab-active');
      poetTab.classList.remove('tab-active');
      searchLabel.textContent = '人物姓名';
      searchInput.placeholder = '如：曹操、李白、李世民';
      hideAllResult();
    });
    poetTab.addEventListener('click', () => {
      currentType = 'poet';
      poetTab.classList.add('tab-active');
      personTab.classList.remove('tab-active');
      searchLabel.textContent = '诗人姓名';
      searchInput.placeholder = '如：李白、杜甫、白居易';
      hideAllResult();
    });

    // 诗人详情子标签切换
    poetDetailTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        // 移除所有激活状态
        poetDetailTabs.forEach(t => {
          t.classList.remove('active', 'border-b-2', 'border-secondary', 'text-secondary');
          t.classList.add('text-neutral-600');
        });
        // 添加当前激活状态
        tab.classList.add('active', 'border-b-2', 'border-secondary', 'text-secondary');
        tab.classList.remove('text-neutral-600');
        // 隐藏所有内容
        poetDetailContents.forEach(c => c.classList.add('hidden'));
        // 显示当前内容
        const tabId = tab.dataset.tab;
        document.getElementById(`${tabId}Content`).classList.remove('hidden');
      });
    });

    // 核心搜索函数
    async function search() {
      const keyword = searchInput.value.trim();
      // 输入校验
      if (!keyword) {
        showError(`请输入${currentType === 'person' ? '历史人物' : '诗人'}姓名`);
        return;
      }
      // 重置状态
      resetState();
      showLoading();
      searchBtn.disabled = true;
      searchBtn.textContent = '查询中';

      try {
        if (currentType === 'person') {
          // 历史人物查询
          const response = await fetch(`${PERSON_API_URL}?name=${encodeURIComponent(keyword)}`);
          const data = await response.json();
          if (data.code === 200 && data.data?.length > 0) {
            renderPersonData(data.data[0]);
            showPersonResult();
          } else {
            showError(data.msg || '未查询到该历史人物相关信息');
          }
        } else {
          // 诗人查询：拼接参数
          const params = new URLSearchParams({
            ...POET_PARAMS,
            name: encodeURIComponent(keyword)
          });
          const response = await fetch(`${POET_API_URL}?${params}`);
          const data = await response.json();
          if (data.code === 200 && data.data?.length > 0) {
            renderPoetData(data.data[0]);
            showPoetResult();
          } else {
            showError(data.msg || '未查询到该诗人相关信息');
          }
        }
      } catch (err) {
        console.error('请求失败：', err);
        showError('网络请求失败，请检查网络后重试');
      } finally {
        hideLoading();
        searchBtn.disabled = false;
        searchBtn.textContent = '立即查询';
      }
    }

    // 渲染历史人物数据（原有逻辑保留）
    function renderPersonData(data) {
      // 基本信息
      personNameEl.textContent = data.name || '';
      personDynastyEl.textContent = data.dynasty || '';
      personDescEl.textContent = data.desc || '';
      // 人物详情列表
      infoListEl.innerHTML = '';
      if (data.info?.length > 0) {
        data.info.forEach(item => {
          const div = document.createElement('div');
          div.className = 'text-sm text-neutral-700 break-all';
          div.textContent = item;
          infoListEl.appendChild(div);
        });
      } else {
        infoListEl.innerHTML = '<p class="text-sm text-neutral-500 col-span-full">暂无详情信息</p>';
      }
      // 时间线渲染
      eventTimelineEl.innerHTML = '';
      if (data.event?.length > 0) {
        // 时间线中轴线
        const line = document.createElement('div');
        line.className = 'timeline-line';
        eventTimelineEl.appendChild(line);
        // 事件项
        data.event.forEach(eventItem => {
          const [year, ...contentArr] = eventItem.split(' ----> ');
          const eventYear = year.trim();
          const eventContent = contentArr.join(' ----> ').trim();
          const item = document.createElement('div');
          item.className = 'relative pl-6 mb-4 last:mb-0 md:pl-0 md:mb-6';
          item.innerHTML = `
            <div class="timeline-dot"></div>
            <div class="md:flex md:items-start">
              <div class="md:w-[48%] md:text-right mb-0.5 md:mb-0">
                <span class="text-sm font-medium text-primary">${eventYear}</span>
              </div>
              <div class="md:w-[48%] md:ml-auto">
                <p class="text-sm text-neutral-700 leading-relaxed">${eventContent}</p>
              </div>
            </div>
          `;
          eventTimelineEl.appendChild(item);
        });
      } else {
        eventTimelineEl.innerHTML = '<p class="text-sm text-neutral-500">暂无事件信息</p>';
      }
    }

    // 渲染诗人数据（适配接口返回字段）
    function renderPoetData(data) {
      // 基本信息
      poetNameEl.textContent = data.name || '';
      poetTagEl.textContent = data.tag || '暂无称号';
      poetDynastyEl.textContent = data.dynasty || '暂无朝代';
      poetDesignationEl.textContent = data.designation || '暂无组合';
      // 诗人头像（默认图兜底）
      poetAvatarEl.src = data.image || 'https://picsum.photos/80/80?text=头像';
      poetAvatarEl.alt = `${data.name || '诗人'}头像`;
      // 诗人标签（分割为标签组）
      poetTagsEl.innerHTML = '<span>标签：</span>';
      if (data.tags) {
        const tags = data.tags.split(',');
        tags.forEach(tag => {
          const span = document.createElement('span');
          span.className = 'bg-neutral-100 px-1.5 py-0.5 rounded';
          span.textContent = tag;
          poetTagsEl.appendChild(span);
        });
      } else {
        poetTagsEl.innerHTML += '<span class="text-neutral-500">暂无标签</span>';
      }
      // 核心介绍（保留HTML，适配接口）
      poetContentEl.innerHTML = data.content || '<p class="text-neutral-500">暂无介绍</p>';
      // 详情内容（保留HTML，适配接口）
      lifeContentEl.innerHTML = data.rwsp || '<p class="text-neutral-500">暂无生平信息</p>';
      achievementContentEl.innerHTML = data.zycj || '<p class="text-neutral-500">暂无成就信息</p>';
      storyContentEl.innerHTML = data.ysdg || '<p class="text-neutral-500">暂无轶事典故</p>';
      familyContentEl.innerHTML = data.jtcy || '<p class="text-neutral-500">暂无家庭成员信息</p>';
      memorialContentEl.innerHTML = data.hsjn || '<p class="text-neutral-500">暂无后世纪念信息</p>';
    }

    // 状态辅助函数
    function resetState() {
      hideError();
      hideAllResult();
    }
    function showLoading() { loadingEl.classList.remove('hidden'); }
    function hideLoading() { loadingEl.classList.add('hidden'); }
    function showError(msg) {
      errorTextEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }
    function hideError() { errorEl.classList.add('hidden'); }
    // 结果显示/隐藏
    function showPersonResult() { personResultEl.classList.remove('hidden'); }
    function showPoetResult() { poetResultEl.classList.remove('hidden'); }
    function hideAllResult() {
      personResultEl.classList.add('hidden');
      poetResultEl.classList.add('hidden');
    }

    // 事件绑定
    searchBtn.addEventListener('click', search);
    searchInput.addEventListener('keydown', (e) => e.key === 'Enter' && search());
  </script>
</body>
</html>
