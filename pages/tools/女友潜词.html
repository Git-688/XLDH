<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>女友潜台词翻译器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background: #fdf6f8;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      color: #333;
    }
    .container {
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    h1 {
      text-align: center;
      color: #e67a92;
      margin-bottom: 20px;
      font-size: 22px;
    }
    .input-box {
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 14px;
      border: 1px solid #eee;
      border-radius: 12px;
      resize: none;
      font-size: 15px;
      outline: none;
    }
    textarea:focus {
      border-color: #e67a92;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #e67a92;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #d66682;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      background: #fef7f9;
      border-radius: 12px;
      white-space: pre-line;
      line-height: 1.6;
      font-size: 15px;
      display: none;
    }
    .loading {
      text-align: center;
      padding: 10px;
      color: #999;
      display: none;
    }
    .tip {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💬 女友潜台词翻译器</h1>
    <p class="tip">输入她的原话，一键读懂小心思～最好是自己先提供前情概要使得回复更加精准🍻</p>
    <div class="input-box">
      <textarea id="msg" placeholder="比如：吃饭了、随便、我没事、不用管我..."></textarea>
    </div>
    <button id="parseBtn">开始翻译潜台词</button>
    <div class="loading" id="loading">正在解读中...</div>
    <div class="result" id="result"></div>
  </div>

  <script>
    const parseBtn = document.getElementById('parseBtn')
    const msgInput = document.getElementById('msg')
    const resultBox = document.getElementById('result')
    const loading = document.getElementById('loading')
    const token = 'XIZhAXKnSQcH'

    parseBtn.addEventListener('click', async () => {
      const msg = msgInput.value.trim()
      if (!msg) {
        alert('请输入女友的话')
        return
      }

      parseBtn.disabled = true
      loading.style.display = 'block'
      resultBox.style.display = 'none'

      try {
        const res = await fetch(`https://yunzhiapi.cn/API/nyzyz.php?token=${token}&msg=${encodeURIComponent(msg)}`)
        const text = await res.text()
        resultBox.innerText = text
        resultBox.style.display = 'block'
      } catch (err) {
        resultBox.innerText = '解析失败，请检查网络或稍后重试'
        resultBox.style.display = 'block'
      } finally {
        parseBtn.disabled = false
        loading.style.display = 'none'
      }
    })
  </script>
</body>
</html>
