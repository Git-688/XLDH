<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音文字互转工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1677ff',
            dark: '#1f2937',
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .card-shadow { @apply shadow-lg shadow-gray-200 dark:shadow-gray-800/20; }
      .btn-hover { @apply hover:shadow-md hover:-translate-y-0.5 transition-all; }
      /* 自定义滚动条隐藏 */
      .scroll-hide { @apply overflow-y-auto; }
      .scroll-hide::-webkit-scrollbar { width: 0px; }
      .scroll-hide::-webkit-scrollbar-track { background: transparent; }
      .scroll-hide::-webkit-scrollbar-thumb { background: transparent; }
      /* 下拉触发框样式 */
      .select-trigger { @apply w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-transparent outline-none focus:border-primary focus:ring-1 focus:ring-primary cursor-pointer flex justify-between items-center; }
      /* 下拉面板样式 */
      .select-panel { @apply absolute left-0 right-0 top-full mt-1 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 card-shadow z-10 max-h-64 scroll-hide; }
      /* 下拉选项样式 */
      .select-option { @apply px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors; }
      .select-option-active { @apply bg-primary/10 text-primary dark:bg-primary/20; }
      /* 下拉分组标题 */
      .select-group { @apply px-4 py-1 text-sm text-gray-500 dark:text-gray-400 font-medium border-b border-gray-200 dark:border-gray-800; }
      /* 🔥 优化Toast：小巧+居中下方+无偏移 */
      .toast { @apply fixed left-1/2 bottom-8 -translate-x-1/2 bg-gray-800 dark:bg-gray-700 text-white text-sm px-3 py-1.5 rounded-lg shadow-2xl z-50 opacity-0 translate-y-2 transition-all duration-300 flex items-center gap-2 max-w-[70%] justify-center; }
      .toast-error { @apply bg-red-600 dark:bg-red-700; }
      .toast-show { @apply opacity-100 translate-y-0; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-12 dark:bg-dark text-dark dark:text-white">
  <div class="max-w-4xl mx-auto px-4 pt-8">
    <!-- 头部 -->
    <div class="text-center mb-8">
      <h1 class="text-[clamp(1.5rem,4vw,2.5rem)] font-bold text-primary mb-2">
        <i class="fa-solid fa-microphone-lines mr-2"></i>语音文字互转工具
      </h1>
      <p class="text-gray-500 dark:text-gray-400">文字转语音 & 语音转文字 在线转换</p>
    </div>
    <!-- 功能切换 -->
    <div class="flex gap-2 mb-6 justify-center">
      <button id="tab1" class="px-6 py-2 rounded-full bg-primary text-white font-medium btn-hover">
        <i class="fa-solid fa-text-height mr-1"></i>文字转语音
      </button>
      <button id="tab2" class="px-6 py-2 rounded-full bg-white dark:bg-gray-700 font-medium btn-hover">
        <i class="fa-solid fa-file-audio mr-1"></i>语音转文字
      </button>
    </div>
    <!-- 容器 -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl card-shadow p-6">
      <!-- 通用Token输入：内置Token+隐藏 -->
      <div class="mb-6 hidden">
        <label class="block font-medium mb-1">接口 Token</label>
        <input type="text" id="m_token" value="961D28A9C59C411C49C75FA3E9FAF24C" placeholder="请输入 m_token" 
          class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-transparent outline-none focus:border-primary focus:ring-1 focus:ring-primary">
      </div>
      <!-- ====================================== -->
      <!-- 文字转语音模块 -->
      <!-- ====================================== -->
      <div id="panel1" class="space-y-5">
        <!-- 合成引擎：自定义下拉 -->
        <div class="relative" id="ttsTypeWrap">
          <label class="block font-medium mb-1">合成引擎</label>
          <div class="select-trigger" id="ttsTypeTrigger">
            <span id="ttsTypeText">百度引擎</span>
            <i class="fa-solid fa-chevron-down text-xs transition-transform duration-300"></i>
          </div>
          <div class="select-panel hidden opacity-0 translate-y-1 transition-all duration-300" id="ttsTypePanel">
            <div class="select-option select-option-active" data-value="baidu">百度引擎</div>
            <div class="select-option" data-value="xunfei">讯飞引擎</div>
          </div>
          <input type="hidden" id="tts_type" value="baidu">
        </div>
        <!-- 音色选择：自定义下拉 -->
        <div class="relative" id="ttsIdWrap">
          <label class="block font-medium mb-1">发音人</label>
          <div class="select-trigger" id="ttsIdTrigger">
            <span id="ttsIdText">度小美-标准女主播</span>
            <i class="fa-solid fa-chevron-down text-xs transition-transform duration-300"></i>
          </div>
          <div class="select-panel hidden opacity-0 translate-y-1 transition-all duration-300" id="ttsIdPanel">
            <!-- JS动态填充 -->
          </div>
          <input type="hidden" id="tts_id" value="0">
        </div>
        <!-- 文字内容 -->
        <div>
          <label class="block font-medium mb-1">转换文字 <span class="text-red-500">*</span></label>
          <textarea id="tts_msg" rows="5" placeholder="请输入需要转换的文字"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-transparent outline-none focus:border-primary resize-none"></textarea>
        </div>
        <!-- 转换按钮 -->
        <button id="tts_submit" class="w-full py-3 bg-primary text-white rounded-lg font-medium btn-hover flex items-center justify-center gap-2">
          <i class="fa-solid fa-music"></i> 开始转换语音
        </button>
        <!-- 结果区域 -->
        <div id="tts_result" class="mt-6 hidden">
          <div class="p-4 bg-gray-100 dark:bg-gray-800 rounded-lg">
            <p class="mb-2 font-medium">转换结果</p>
            <p class="text-sm text-gray-500 mb-3" id="tts_info"></p>
            <audio id="tts_audio" controls class="w-full h-10">
          </div>
        </div>
      </div>
      <!-- ====================================== -->
      <!-- 语音转文字模块 -->
      <!-- ====================================== -->
      <div id="panel2" class="space-y-5 hidden">
        <!-- 音频上传 -->
        <div>
          <label class="block font-medium mb-1">上传音频文件 <span class="text-red-500">*</span></label>
          <div class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center cursor-pointer hover:border-primary transition-colors" id="audio_upload">
            <input type="file" id="audio_file" accept="audio/*" class="hidden">
            <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 mb-2"></i>
            <p class="text-gray-500">点击或拖拽音频文件到此处</p>
            <p class="text-xs text-gray-400 mt-1">支持 MP3/WAV/M4A 等常见音频格式</p>
          </div>
          <p id="audio_name" class="mt-2 text-sm text-primary hidden"></p>
        </div>
        <!-- 转换按钮 -->
        <button id="asr_submit" class="w-full py-3 bg-primary text-white rounded-lg font-medium btn-hover flex items-center justify-center gap-2">
          <i class="fa-solid fa-file-lines"></i> 开始提取文字
        </button>
        <!-- 结果区域 -->
        <div id="asr_result" class="mt-6 hidden">
          <div class="p-4 bg-gray-100 dark:bg-gray-800 rounded-lg">
            <p class="mb-2 font-medium">识别结果</p>
            <p id="asr_text" class="whitespace-pre-wrap"></p>
          </div>
        </div>
      </div>
    </div>
    <!-- 底部提示 -->
    <div class="text-center text-sm text-gray-400 mt-8">
      <p>本工具仅做前端展示，接口来源于网络，内置有效Token可直接使用</p>
    </div>
  </div>
  <script>
    // ==========================
    // 全局通用：Toast提示（无偏移+小巧+居中下方）
    // ==========================
    function showToast(text, isError = false) {
      // 移除已有Toast，避免叠加
      const oldToast = document.querySelector('.toast');
      if (oldToast) oldToast.remove();
      // 创建Toast元素
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'toast-error' : ''}`;
      // 图标+文字（图标缩小，适配小巧Toast）
      toast.innerHTML = `
        <i class="fa-solid ${isError ? 'fa-circle-exclamation' : 'fa-circle-check'} text-xs"></i>
        <span>${text}</span>
      `;
      document.body.appendChild(toast);
      // 显示动画
      setTimeout(() => toast.classList.add('toast-show'), 10);
      // 3秒后隐藏并移除
      setTimeout(() => {
        toast.classList.remove('toast-show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ==========================
    // 音色数据配置（原数据不变）
    // ==========================
    const voiceData = {
      xunfei: [
        {id:1, name:'七哥(男声)'},
        {id:2, name:'子晴(女声)'},
        {id:3, name:'一菲(女声)'},
        {id:4, name:'小露(女声)'},
        {id:5, name:'小鹏(男声)'},
        {id:6, name:'萌小新(男声)'},
        {id:7, name:'小雪(女声)'},
        {id:8, name:'超哥(男声)'},
        {id:9, name:'小媛(女声)'},
        {id:10, name:'叶子(女声)'},
        {id:11, name:'千雪(女声)'},
        {id:12, name:'小忠(男声)'},
        {id:13, name:'万叔(男声)'},
        {id:14, name:'虫虫(女声)'},
        {id:15, name:'楠楠(儿童男)'},
        {id:16, name:'晓璇(女声)'},
        {id:17, name:'芳芳(儿童女)'},
        {id:18, name:'嘉嘉(女声)'},
        {id:19, name:'小倩(女声)'},
        {id:20, name:'Catherine(英文专用)'}
      ],
      baidu: [
        {group:'男声', list:[
          {id:0, name:'度小美-标准女主播'},
          {id:3, name:'度逍遥-情感男声'},
          {id:106, name:'度博文-专业男主播'},
          {id:4003, name:'度逍遥-情感男声'},
          {id:4106, name:'度博文-专业男主播'},
          {id:4115, name:'度小贤-电台男主播'},
          {id:4129, name:'度小彦-知识男主播'},
          {id:4164, name:'度阿肯-主播男声'},
          {id:4176, name:'度有为-磁性男声'},
          {id:5003, name:'度逍遥-情感男声'},
          {id:5971, name:'度皮特-老外男声'},
          {id:6205, name:'度悠然-旁白男声'},
          {id:6546, name:'度清豪-逍遥侠客'},
          {id:6602, name:'度清柔-温柔男神'},
          {id:6746, name:'度书道-沉稳男声'},
          {id:6747, name:'度书古-情感男声'},
          {id:6748, name:'度书严-沉稳男声'},
        ]},
        {group:'女声', list:[
          {id:5, name:'度小娇-成熟女主播'},
          {id:4100, name:'度小雯-活力女主播'},
          {id:4140, name:'度小新-专业女主播'},
          {id:4148, name:'度小夏-甜美女声'},
          {id:4226, name:'南方-电台女主播'},
          {id:4259, name:'度小新-播音女声'},
          {id:4278, name:'度小贝-知识女主播'},
          {id:5147, name:'度常盈-电台女主播'},
          {id:6221, name:'度云萱-旁白女声'},
          {id:6543, name:'度雨萌-邻家女孩'},
          {id:6562, name:'度雨楠-元气少女'},
          {id:6644, name:'度书宁-亲和女声'},
        ]},
        {group:'童声', list:[
          {id:4, name:'度丫丫-童声'},
          {id:110, name:'度小童-童声主播'},
          {id:111, name:'度小萌-软萌妹子'},
          {id:5976, name:'度小皮-萌娃童声'},
        ]}
      ]
    };

    // ==========================
    // Tab按钮切换（原逻辑不变）
    // ==========================
    const tab1 = document.getElementById('tab1');
    const tab2 = document.getElementById('tab2');
    const panel1 = document.getElementById('panel1');
    const panel2 = document.getElementById('panel2');
    const switchTab = (activeTab, inactiveTab, showPanel, hidePanel) => {
      activeTab.classList.add('bg-primary', 'text-white');
      activeTab.classList.remove('bg-white', 'dark:bg-gray-700');
      inactiveTab.classList.add('bg-white', 'dark:bg-gray-700');
      inactiveTab.classList.remove('bg-primary', 'text-white');
      showPanel.classList.remove('hidden');
      hidePanel.classList.add('hidden');
      closeAllSelect();
    };
    tab1.onclick = () => switchTab(tab1, tab2, panel1, panel2);
    tab2.onclick = () => switchTab(tab2, tab1, panel2, panel1);

    // ==========================
    // 自定义下拉核心逻辑（原逻辑不变）
    // ==========================
    const ttsTypeWrap = document.getElementById('ttsTypeWrap');
    const ttsTypeTrigger = document.getElementById('ttsTypeTrigger');
    const ttsTypeText = document.getElementById('ttsTypeText');
    const ttsTypePanel = document.getElementById('ttsTypePanel');
    const ttsTypeInput = document.getElementById('tts_type');
    const ttsIdWrap = document.getElementById('ttsIdWrap');
    const ttsIdTrigger = document.getElementById('ttsIdTrigger');
    const ttsIdText = document.getElementById('ttsIdText');
    const ttsIdPanel = document.getElementById('ttsIdPanel');
    const ttsIdInput = document.getElementById('tts_id');

    const toggleSelect = (panel) => {
      closeAllSelect(panel);
      const isHidden = panel.classList.contains('hidden');
      if (isHidden) {
        panel.classList.remove('hidden');
        setTimeout(() => {
          panel.classList.remove('opacity-0', 'translate-y-1');
        }, 10);
      } else {
        panel.classList.add('opacity-0', 'translate-y-1');
        setTimeout(() => panel.classList.add('hidden'), 300);
      }
      const icon = panel.previousElementSibling.querySelector('i');
      icon.classList.toggle('rotate-180');
    };

    const closeAllSelect = (excludePanel) => {
      const allPanels = [ttsTypePanel, ttsIdPanel];
      allPanels.forEach(panel => {
        if (panel !== excludePanel && !panel.classList.contains('hidden')) {
          panel.classList.add('opacity-0', 'translate-y-1');
          setTimeout(() => panel.classList.add('hidden'), 300);
          panel.previousElementSibling.querySelector('i').classList.remove('rotate-180');
        }
      });
    };

    const selectOption = (panel, textEl, inputEl, e) => {
      const target = e.target;
      if (!target.classList.contains('select-option')) return;
      panel.querySelectorAll('.select-option').forEach(opt => opt.classList.remove('select-option-active'));
      target.classList.add('select-option-active');
      const val = target.dataset.value;
      const text = target.textContent;
      textEl.textContent = text;
      inputEl.value = val;
      panel.classList.add('opacity-0', 'translate-y-1');
      setTimeout(() => panel.classList.add('hidden'), 300);
      panel.previousElementSibling.querySelector('i').classList.remove('rotate-180');
      if (inputEl.id === 'tts_type') renderVoiceList(val);
    };

    document.addEventListener('click', (e) => {
      if (!ttsTypeWrap.contains(e.target) && !ttsIdWrap.contains(e.target)) {
        closeAllSelect();
      }
    });

    ttsTypeTrigger.onclick = () => toggleSelect(ttsTypePanel);
    ttsTypePanel.onclick = (e) => selectOption(ttsTypePanel, ttsTypeText, ttsTypeInput, e);
    ttsIdTrigger.onclick = () => toggleSelect(ttsIdPanel);
    ttsIdPanel.onclick = (e) => selectOption(ttsIdPanel, ttsIdText, ttsIdInput, e);

    // ==========================
    // 动态渲染发音人下拉列表（原逻辑不变）
    // ==========================
    function renderVoiceList(type) {
      ttsIdPanel.innerHTML = '';
      let defaultId = '';
      let defaultName = '';
      if (type === 'xunfei') {
        voiceData.xunfei.forEach((item, index) => {
          const opt = document.createElement('div');
          opt.className = `select-option ${index === 0 ? 'select-option-active' : ''}`;
          opt.dataset.value = item.id;
          opt.textContent = item.name;
          ttsIdPanel.appendChild(opt);
          if (index === 0) {
            defaultId = item.id;
            defaultName = item.name;
          }
        });
      } else {
        voiceData.baidu.forEach(group => {
          const groupTitle = document.createElement('div');
          groupTitle.className = 'select-group';
          groupTitle.textContent = group.group;
          ttsIdPanel.appendChild(groupTitle);
          group.list.forEach((item, index) => {
            const opt = document.createElement('div');
            opt.className = `select-option ${index === 0 && group.group === '男声' ? 'select-option-active' : ''}`;
            opt.dataset.value = item.id;
            opt.textContent = item.name;
            ttsIdPanel.appendChild(opt);
            if (index === 0 && group.group === '男声') {
              defaultId = item.id;
              defaultName = item.name;
            }
          });
        });
      }
      ttsIdInput.value = defaultId;
      ttsIdText.textContent = defaultName;
    }
    renderVoiceList('baidu');

    // ==========================
    // 文字转语音（讯飞修复+Toast优化）
    // ==========================
    const ttsSubmit = document.getElementById('tts_submit');
    const ttsResult = document.getElementById('tts_result');
    const ttsAudio = document.getElementById('tts_audio');
    const ttsInfo = document.getElementById('tts_info');
    ttsSubmit.onclick = async () => {
      const token = document.getElementById('m_token').value.trim();
      const type = ttsTypeInput.value;
      const id = ttsIdInput.value;
      const msg = document.getElementById('tts_msg').value.trim();
      
      // 文字为空判断
      if (!msg) return showToast('请输入需要转换的文字', true);

      ttsSubmit.disabled = true;
      ttsSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 转换中...';
      ttsResult.classList.add('hidden');
      try {
        const res = await fetch(`https://api.suol.cc/v1/zs_tts.php?m_token=${token}&type=${type}&msg=${encodeURIComponent(msg)}&id=${id}`);
        const data = await res.json();
        
        if (data.code === 200) {
          // 兼容百度/讯飞不同返回结构
          if (type === 'baidu' && data.voice) {
            ttsInfo.textContent = `发音人：${data.voice.voice_name} | ${data.voice.quality_name}`;
          } else if (type === 'xunfei') {
            const voiceName = ttsIdText.textContent;
            ttsInfo.textContent = `发音人：${voiceName} | 讯飞标准音质`;
          }
          ttsAudio.src = data.tts || '';
          ttsResult.classList.remove('hidden');
          showToast('语音转换成功');
        } else {
          showToast(`转换失败：${data.msg || '未知错误'}`, true);
        }
      } catch (err) {
        showToast(`请求异常：${err.message}`, true);
      } finally {
        ttsSubmit.disabled = false;
        ttsSubmit.innerHTML = '<i class="fa-solid fa-music"></i> 开始转换语音';
      }
    };

    // ==========================
    // 语音转文字（Toast优化）
    // ==========================
    const audioUpload = document.getElementById('audio_upload');
    const audioFile = document.getElementById('audio_file');
    const audioName = document.getElementById('audio_name');
    let audioBase64 = '';
    audioUpload.onclick = () => audioFile.click();
    audioFile.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      audioName.textContent = `已选择：${file.name}`;
      audioName.classList.remove('hidden');
      const reader = new FileReader();
      reader.onload = () => {
        audioBase64 = reader.result.split(',')[1];
      };
      reader.readAsDataURL(file);
    };

    const asrSubmit = document.getElementById('asr_submit');
    const asrResult = document.getElementById('asr_result');
    const asrText = document.getElementById('asr_text');
    asrSubmit.onclick = async () => {
      const token = document.getElementById('m_token').value.trim();
      // 音频未上传判断
      if (!audioBase64) return showToast('请先上传音频文件', true);

      asrSubmit.disabled = true;
      asrSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 识别中...';
      asrResult.classList.add('hidden');
      try {
        const res = await fetch(`https://api.suol.cc/v1/audio_text.php?m_token=${token}&audio=${encodeURIComponent(audioBase64)}`);
        const data = await res.json();
        if (data.code === 200) {
          asrText.textContent = data.text || '未识别到文字';
          asrResult.classList.remove('hidden');
          showToast('文字提取成功');
        } else {
          showToast(`识别失败：${data.msg || '未知错误'}`, true);
        }
      } catch (err) {
        showToast(`请求异常：${err.message}`, true);
      } finally {
        asrSubmit.disabled = false;
        asrSubmit.innerHTML = '<i class="fa-solid fa-file-lines"></i> 开始提取文字';
      }
    };
  </script>
</body>
</html>
