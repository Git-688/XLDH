<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源搜索工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                    }
                }
            }
        }
    </script>
    <style>
        html.dark { background-color: #121212; }
        html:not(.dark) { background-color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen transition-colors duration-300">

<div class="container mx-auto px-4 py-6 md:py-8 max-w-6xl">
    <header class="text-center mb-6 md:mb-8">
        <h1 class="text-[clamp(1.5rem,5vw,2.2rem)] font-bold text-primary mb-1">
            <i class="fas fa-search mr-2"></i>全网资源搜索
        </h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm">双接口切换 · 多网盘资源搜索</p>
    </header>

    <!-- 统一搜索面板 -->
    <section class="bg-white dark:bg-gray-800 rounded-xl p-4 md:p-6 shadow-lg mb-6 transition-colors duration-300">
        <div class="space-y-4 md:space-y-5">
            <!-- 接口切换 -->
            <div class="flex gap-3">
                <label class="flex items-center gap-1.5 cursor-pointer text-sm">
                    <input type="radio" name="apiType" value="api1" checked> 资源搜索1号
                </label>
                <label class="flex items-center gap-1.5 cursor-pointer text-sm">
                    <input type="radio" name="apiType" value="api2"> 资源搜索2号
                </label>
            </div>

            <!-- 搜索关键词 -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm text-gray-600 dark:text-gray-300">搜索关键词</span>
                    <!-- 主题切换小按钮 -->
                    <button id="themeToggle" 
                        class="w-6 h-6 flex items-center justify-center rounded-full bg-gray-200 dark:bg-gray-700 hover:opacity-80 shrink-0">
                        <i class="fas fa-sun dark:hidden text-yellow-500 text-xs"></i>
                        <i class="fas fa-moon hidden dark:block text-blue-300 text-xs"></i>
                    </button>
                </div>
                <div class="flex gap-2 items-center">
                    <input id="kw" placeholder="请输入关键词"
                        class="flex-1 px-4 py-3 bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none text-gray-800 dark:text-white">
                    <button id="searchBtn" 
                        class="bg-primary hover:bg-primary/90 text-white px-5 py-3 rounded-lg font-medium whitespace-nowrap">
                        <i class="fas fa-search mr-1"></i>搜索
                    </button>
                </div>
            </div>

            <!-- 资源类型（两个接口都显示） -->
            <div>
                <label class="block text-sm text-gray-600 dark:text-gray-300 mb-2">选择资源类型（可多选）</label>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2 text-sm">
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="baidu">百度网盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="aliyun">阿里云盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="quark">夸克网盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="tianyi">天翼云盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="uc">UC网盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="mobile">移动云盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="115">115网盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="pikpak">PikPak</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="xunlei">迅雷网盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="123">123网盘</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="magnet">磁力链接</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" name="cloud" value="ed2k">电驴链接</label>
                </div>
            </div>
        </div>
    </section>

    <!-- 统一结果区 -->
    <section id="resultSection" class="hidden space-y-4 md:space-y-5 mb-8">
        <div class="flex justify-between items-center">
            <h2 class="text-lg font-semibold">搜索结果 <span id="totalCount" class="text-primary"></span></h2>
            <button id="resetBtn" class="text-sm bg-gray-200 dark:bg-gray-700 hover:opacity-80 px-3 py-1 rounded">
                <i class="fas fa-redo mr-1"></i>重置
            </button>
        </div>
        <div id="resultContainer" class="space-y-3 md:space-y-4"></div>
    </section>

    <!-- 统一状态提示 -->
    <div id="statusBox" class="text-center py-12 md:py-16 text-gray-500 dark:text-gray-400">
        <i class="fas fa-inbox text-3xl mb-2 text-gray-400 dark:text-gray-600"></i>
        <p>请输入关键词开始搜索</p>
    </div>
</div>

<script>
    // 接口配置
    const API_CONFIG = {
        api1: "https://wzapi.com/api/jhsj",
        api2: "https://wzapi.com/api/sj"
    };

    // DOM
    const kw = document.getElementById("kw");
    const searchBtn = document.getElementById("searchBtn");
    const resetBtn = document.getElementById("resetBtn");
    const themeToggle = document.getElementById("themeToggle");
    const resultSection = document.getElementById("resultSection");
    const resultContainer = document.getElementById("resultContainer");
    const totalCount = document.getElementById("totalCount");
    const statusBox = document.getElementById("statusBox");
    const cloudChecks = document.querySelectorAll('input[name="cloud"]');
    const apiTypeRadios = document.querySelectorAll('input[name="apiType"]');

    // 网盘映射
    const typeMap = {
        baidu:'百度网盘',aliyun:'阿里云盘',quark:'夸克网盘',tianyi:'天翼云盘',
        uc:'UC网盘',mobile:'移动云盘','115':'115网盘',pikpak:'PikPak',
        xunlei:'迅雷网盘','123':'123网盘',magnet:'磁力链接',ed2k:'电驴链接'
    };

    // ========== 主题切换 ==========
    function initTheme() {
        const isDark = localStorage.getItem('theme') !== 'light';
        document.documentElement.classList.toggle('dark', isDark);
    }
    themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ========== 复制 ==========
    function copy(text) {
        navigator.clipboard.writeText(text).then(() => alert('复制成功！')).catch(() => alert('复制失败'));
    }
    window.copy = copy;

    // ========== 统一搜索 ==========
    async function doSearch() {
        const key = kw.value.trim();
        if (!key) { showStatus('请输入关键词', 'warn'); return; }

        // 获取选中的资源类型
        const selectedClouds = Array.from(cloudChecks).filter(c => c.checked).map(c => c.value);
        if (selectedClouds.length === 0) { showStatus('请选择至少一种资源类型', 'warn'); return; }
        const cloudTypes = selectedClouds.join(',');

        // 获取当前接口
        const apiType = document.querySelector('input[name="apiType"]:checked').value;
        let url;

        // 拼接对应接口参数
        if (apiType === 'api1') {
            // 接口1：kw + cloud_types
            const params = new URLSearchParams({ 
                kw: key, 
                cloud_types: cloudTypes 
            });
            url = `${API_CONFIG.api1}?${params}`;
        } else {
            // 接口2：title + cloud_types
            const params = new URLSearchParams({ 
                title: key, 
                cloud_types: cloudTypes 
            });
            url = `${API_CONFIG.api2}?${params}`;
        }

        searchBtn.disabled = true;
        searchBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>搜索中';
        showStatus('<i class="fas fa-spinner fa-spin text-xl"></i><p class="mt-2">正在获取资源...</p>', 'load');

        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.code === 0 && data.data) renderResult(data.data);
            else showStatus(`搜索失败：${data.message || '无数据'}`, 'err');
        } catch (e) {
            showStatus('网络错误或接口跨域限制', 'err');
        } finally {
            searchBtn.disabled = false;
            searchBtn.innerHTML = '<i class="fas fa-search mr-1"></i>搜索';
        }
    }

    // ========== 渲染结果（双接口总数兼容修复） ==========
    function renderResult(data) {
        statusBox.classList.add('hidden');
        resultSection.classList.remove('hidden');
        
        // 核心修复：双接口兼容，优先取pagination里的total，再取data里的total，兜底0
        const total = data.pagination?.total || data.total || 0;
        totalCount.textContent = `共 ${total} 条`;
        
        resultContainer.innerHTML = '';

        const types = data.merged_by_type || {};
        for (const [t, items] of Object.entries(types)) {
            if (!items?.length) continue;
            const html = `
            <div class="bg-white dark:bg-gray-800 rounded-lg p-3 shadow transition-colors">
                <h3 class="text-primary font-medium mb-2"><i class="fas fa-cloud mr-1"></i>${typeMap[t] || t}</h3>
                <div class="space-y-2">
                    ${items.map(i => `
                    <div class="bg-gray-100 dark:bg-gray-700/50 rounded p-3 border-l-2 border-primary">
                        <p class="text-sm mb-2">${i.note || '无描述'}</p>
                        <div class="flex gap-2 mb-2">
                            <input value="${i.url}" readonly class="flex-1 bg-gray-200 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded px-2 py-1 text-xs">
                            <button onclick="copy('${i.url}')" class="bg-primary/80 text-white px-2 py-1 rounded text-xs">复制</button>
                        </div>
                        ${i.password ? `
                        <div class="flex gap-2">
                            <input value="${i.password}" readonly class="flex-1 bg-gray-200 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded px-2 py-1 text-xs">
                            <button onclick="copy('${i.password}')" class="bg-primary/80 text-white px-2 py-1 rounded text-xs">复制密码</button>
                        </div>` : ''}
                    </div>`).join('')}
                </div>
            </div>`;
            resultContainer.innerHTML += html;
        }
        // 兜底：如果接口返回总数，但选中的类型无结果，显示空提示
        if (!resultContainer.innerHTML) showStatus('未找到对应类型的资源', 'empty');
    }

    // ========== 状态提示 ==========
    function showStatus(html, type) {
        resultSection.classList.add('hidden');
        statusBox.classList.remove('hidden');
        const icons = {
            load: '<i class="fas fa-spinner fa-spin text-xl text-blue-400"></i>',
            warn: '<i class="fas fa-exclamation-triangle text-yellow-500"></i>',
            err: '<i class="fas fa-times-circle text-red-500"></i>',
            empty: '<i class="fas fa-search-minus text-gray-500"></i>'
        };
        statusBox.innerHTML = icons[type] + `<p class="mt-2">${html}</p>`;
    }

    // ========== 重置 ==========
    function reset() {
        kw.value = '';
        cloudChecks.forEach(c => c.checked = false);
        resultSection.classList.add('hidden');
        statusBox.classList.remove('hidden');
        statusBox.innerHTML = '<i class="fas fa-inbox text-3xl mb-2 text-gray-400 dark:text-gray-600"></i><p>请输入关键词开始搜索</p>';
    }

    // 事件绑定
    initTheme();
    searchBtn.addEventListener('click', doSearch);
    resetBtn.addEventListener('click', reset);
    kw.addEventListener('keydown', e => e.key === 'Enter' && doSearch());
</script>
</body>
</html>
