<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视搜索</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #eef2ff;
            --secondary: #64748b;
            --accent: #f43f5e;
            --light: #f8fafc;
            --dark: #1e293b;
            --text: #334155;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 6px 15px rgba(0, 0, 0, 0.12);
            --transition: all 0.2s ease;
            --radius: 10px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: #f5f7fa;
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 12px;
            flex: 1;
            width: 100%;
        }
        
        header {
            padding: 16px 0;
            text-align: center;
            margin-bottom: 16px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .logo i {
            font-size: 22px;
            color: var(--primary);
        }
        
        .logo h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
        }
        
        .tagline {
            color: var(--text-light);
            font-size: 12px;
            margin-bottom: 16px;
        }
        
        main {
            padding: 16px 0;
            width: 100%;
        }
        
        .tabs-container {
            margin-bottom: 16px;
            position: relative;
            width: 100%;
        }
        
        .tabs-scroll {
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            background: white;
            border-radius: var(--radius);
            padding: 4px;
            box-shadow: var(--shadow);
            width: 100%;
        }
        
        .tabs-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .tab {
            background: transparent;
            border: none;
            padding: 10px 14px;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            margin-right: 4px;
            color: var(--text-light);
            flex: 1;
            text-align: center;
            position: relative;
        }
        
        .tab.active {
            background: var(--primary);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .vertical-list {
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            width: 100%;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .vertical-list::-webkit-scrollbar {
            display: none;
        }
        
        .douban-item {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: stretch;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .douban-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .douban-poster {
            width: 80px;
            object-fit: cover;
            object-position: center;
            flex-shrink: 0;
            align-self: stretch;
            background: #f1f5f9;
        }
        
        .douban-info {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .douban-rank {
            display: inline-block;
            background: var(--accent);
            color: white;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
            margin-bottom: 6px;
            font-size: 11px;
            width: fit-content;
        }
        
        .douban-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .douban-rating {
            display: flex;
            align-items: center;
            gap: 3px;
            color: #f59e0b;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 12px;
        }
        
        .douban-quote {
            color: var(--text-light);
            font-style: italic;
            font-size: 11px;
            margin-top: auto;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .boxoffice-item {
            display: flex;
            align-items: center;
            background: white;
            border-radius: var(--radius);
            padding: 12px;
            transition: var(--transition);
            cursor: pointer;
            margin-bottom: 10px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .boxoffice-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .boxoffice-rank {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .boxoffice-info {
            flex: 1;
        }
        
        .boxoffice-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 3px;
        }
        
        .boxoffice-meta {
            display: flex;
            font-size: 11px;
            color: var(--text-light);
        }
        
        .boxoffice-year {
            margin-right: 10px;
        }
        
        .boxoffice-value {
            font-weight: 700;
            color: var(--accent);
            margin-left: auto;
        }
        
        .fullscreen-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
        }
        
        .fullscreen-player.active {
            display: flex;
        }
        
        .player-header {
            height: 50px;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .player-controls {
            display: flex;
            gap: 10px;
        }
        
        .player-control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .player-control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        #fullscreen-video {
            flex: 1;
            width: 100%;
            object-fit: contain;
        }
        
        .no-results {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-light);
        }
        
        .no-results i {
            font-size: 36px;
            margin-bottom: 12px;
            color: #cbd5e1;
        }
        
        .no-results h3 {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 16px;
        }
        
        .no-results p {
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 30px 16px;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(67, 97, 238, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .search-box {
            display: flex;
            width: 100%;
            margin-bottom: 16px;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        
        .search-input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-right: none;
            font-size: 14px;
            transition: var(--transition);
            background: white;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .search-btn:hover {
            background: #3a56d4;
        }
        
        .search-hint {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 8px;
            padding: 0 4px;
        }
        
        .footer-note {
            text-align: center;
            padding: 12px 0;
            margin-top: 16px;
            color: var(--text-light);
            font-size: 11px;
            border-top: 1px solid var(--border);
        }
        
        .movie-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 12px;
            transition: var(--transition);
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .movie-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .movie-header {
            display: flex;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .movie-poster {
            width: 70px;
            height: 95px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            background: #f1f5f9;
        }
        
        .movie-title-section {
            flex: 1;
            margin-left: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .movie-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 4px;
        }
        
        .movie-subtitle {
            color: var(--text-light);
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .meta-item {
            background: var(--primary-light);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: 500;
        }
        
        .movie-details {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .movie-description {
            color: var(--text);
            line-height: 1.4;
            font-size: 12px;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .director-list, .actor-list {
            color: var(--text);
            font-size: 12px;
            margin-bottom: 6px;
        }
        
        .play-section {
            padding: 12px;
        }
        
        .episodes-container {
            margin-bottom: 10px;
        }
        
        .episodes-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--dark);
        }
        
        .episodes-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .episode-btn {
            background: var(--light);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
        }
        
        .episode-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .episode-btn.disabled, .play-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            display: none;
        }
        
        .play-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }
        
        .play-btn:hover {
            background: #e11d48;
            transform: translateY(-1px);
        }
        
        .play-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* Toast 提示样式 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 20px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            font-size: 14px;
            z-index: 10001;
            text-align: center;
            min-width: 120px;
            max-width: 80%;
            word-break: break-all;
            animation: toastFadeIn 0.3s ease, toastFadeOut 0.3s ease 2.5s;
            pointer-events: none;
        }
        .toast.success {
            background: rgba(16, 185, 129, 0.9);
        }
        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }
        .toast.warning {
            background: rgba(245, 158, 11, 0.9);
        }
        @keyframes toastFadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        @keyframes toastFadeOut {
            from {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
        }
        
        @media (max-width: 767px) {
            .container {
                padding: 0 10px;
            }
            
            header {
                padding: 12px 0;
                margin-bottom: 12px;
            }
            
            .logo h1 {
                font-size: 16px;
            }
            
            .tagline {
                font-size: 11px;
            }
            
            .tab {
                padding: 8px 12px;
                font-size: 12px;
                flex: none;
                min-width: 80px;
            }
            
            .search-input {
                padding: 10px 12px;
                font-size: 13px;
            }
            
            .search-btn {
                padding: 0 14px;
                font-size: 13px;
            }
            
            .douban-poster {
                width: 70px;
            }
            
            .movie-poster {
                width: 60px;
                height: 80px;
            }
            
            .douban-info, .movie-header, .movie-details, .play-section {
                padding: 10px;
            }
            
            .movie-title {
                font-size: 14px;
            }
            
            .meta-item {
                font-size: 10px;
                padding: 2px 6px;
            }
            
            .movie-description, .director-list, .actor-list {
                font-size: 11px;
            }
            
            .episode-btn, .play-btn {
                font-size: 10px;
                padding: 4px 8px;
            }
            
            .vertical-list {
                max-height: calc(100vh - 160px);
            }
            
            .player-header {
                height: 40px;
                padding: 0 12px;
                font-size: 14px;
            }
            
            .player-control-btn {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }
        
        @media (min-width: 768px) {
            .container {
                max-width: 1000px;
            }
            
            .douban-item {
                flex-direction: row;
            }
            
            .douban-poster {
                width: 100px;
            }
            
            .movie-poster {
                width: 90px;
                height: 120px;
            }
            
            .tabs-scroll {
                justify-content: center;
            }
            
            .tab {
                flex: none;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-film"></i>
            <h1>影视搜索</h1>
        </div>
        <p class="tagline">发现精彩影视内容，尽在掌握</p>
    </header>
    <main class="container">
        <!-- 选项卡 -->
        <div class="tabs-container">
            <div class="tabs-scroll">
                <div class="tab active" data-tab="douban">豆瓣TOP榜</div>
                <div class="tab" data-tab="boxoffice">全球票房榜</div>
                <div class="tab" data-tab="movie-search">影视搜索</div>
                <div class="tab" data-tab="full-film-search">全量影视搜索</div>
            </div>
        </div>
        
        <!-- 豆瓣排行榜 -->
        <div id="douban" class="tab-content active">
            <div id="douban-container" class="vertical-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载豆瓣排行榜...</p>
                </div>
            </div>
        </div>
        
        <!-- 票房排行榜 -->
        <div id="boxoffice" class="tab-content">
            <div id="boxoffice-container" class="vertical-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载票房排行榜...</p>
                </div>
            </div>
        </div>
        
        <!-- 影视搜索 -->
        <div id="movie-search" class="tab-content">
            <div class="search-box">
                <input type="text" class="search-input" id="movie-search-input" placeholder="搜索电影、电视剧、动漫...">
                <button class="search-btn" id="movie-search-btn">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
            <div id="movie-search-results" class="vertical-list">
                <div class="no-results">
                    <i class="fas fa-film"></i>
                    <h3>搜索影视内容</h3>
                    <p>输入关键词并点击搜索按钮</p>
                </div>
            </div>
        </div>

        <!-- 全量影视搜索 -->
        <div id="full-film-search" class="tab-content">
            <div class="search-box">
                <input type="text" class="search-input" id="full-film-search-input" placeholder="搜索电影、电视剧、动漫...">
                <button class="search-btn" id="full-film-search-btn">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
            <div id="full-film-search-results" class="vertical-list">
                <div class="no-results">
                    <i class="fas fa-film"></i>
                    <h3>全量影视搜索</h3>
                    <p>输入关键词并点击搜索按钮</p>
                </div>
            </div>
        </div>
        
        <!-- 全屏视频播放器 -->
        <div class="fullscreen-player" id="fullscreen-player">
            <div class="player-header">
                <span class="player-title">视频播放器</span>
                <div class="player-controls">
                    <button class="player-control-btn" id="player-close-btn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            <video id="fullscreen-video" controls>
                您的浏览器不支持视频播放
            </video>
        </div>
        
        <!-- 底部提示文字 -->
        <div class="footer-note">
            当前搜索工具支持影视榜单查询、多源影视内容搜索和播放
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取所有需要的DOM元素
            const movieSearchInput = document.getElementById('movie-search-input');
            const movieSearchBtn = document.getElementById('movie-search-btn');
            const fullFilmSearchInput = document.getElementById('full-film-search-input');
            const fullFilmSearchBtn = document.getElementById('full-film-search-btn');
            const fullFilmSearchResults = document.getElementById('full-film-search-results');
            
            const doubanContainer = document.getElementById('douban-container');
            const boxofficeContainer = document.getElementById('boxoffice-container');
            const movieSearchResults = document.getElementById('movie-search-results');
            
            const fullscreenPlayer = document.getElementById('fullscreen-player');
            const fullscreenVideo = document.getElementById('fullscreen-video');
            const tabs = document.querySelectorAll('.tab');
            const tabContents = document.querySelectorAll('.tab-content');
            
            const playerCloseBtn = document.getElementById('player-close-btn');
            let currentPlayBtn = null;

            // Toast 提示函数
            function toast(message, type = 'normal') {
                const oldToast = document.querySelector('.toast');
                if (oldToast) oldToast.remove();
                const toastEl = document.createElement('div');
                toastEl.className = `toast ${type}`;
                toastEl.textContent = message;
                document.body.appendChild(toastEl);
                setTimeout(() => {
                    if (toastEl.parentNode) toastEl.remove();
                }, 2800);
            }
            
            // 播放器控制功能
            playerCloseBtn.addEventListener('click', function() {
                fullscreenPlayer.classList.remove('active');
                fullscreenVideo.pause();
                fullscreenVideo.src = '';
                currentPlayBtn = null;
            });
            
            // 点击播放器外部关闭播放器
            fullscreenPlayer.addEventListener('click', function(e) {
                if (e.target === fullscreenPlayer) {
                    fullscreenPlayer.classList.remove('active');
                    fullscreenVideo.pause();
                    fullscreenVideo.src = '';
                    currentPlayBtn = null;
                }
            });

            // 监听视频播放错误
            fullscreenVideo.addEventListener('error', function() {
                toast('当前播放源失效，已自动隐藏该播放按钮', 'error');
                if (currentPlayBtn) {
                    currentPlayBtn.classList.add('disabled');
                }
                fullscreenPlayer.classList.remove('active');
                fullscreenVideo.src = '';
                currentPlayBtn = null;
            });
            
            // 选项卡切换功能
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));
                    
                    tab.classList.add('active');
                    const tabId = tab.getAttribute('data-tab');
                    document.getElementById(tabId).classList.add('active');
                    
                    if (tabId === 'douban' && !doubanData) {
                        loadDoubanList();
                    } else if (tabId === 'boxoffice' && !boxofficeData) {
                        loadBoxofficeList();
                    }
                });
            });
            
            // 数据缓存
            let doubanData = null;
            let boxofficeData = null;
            let movieSearchData = null;
            
            // 加载豆瓣排行榜
            function loadDoubanList() {
                fetch('https://api.qhsou.com/api/douban.php')
                    .then(response => response.json())
                    .then(data => {
                        doubanData = data;
                        displayDoubanList(data);
                    })
                    .catch(error => {
                        console.error('加载豆瓣排行榜出错:', error);
                        doubanContainer.innerHTML = `
                            <div class="no-results">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h3>加载失败</h3>
                                <p>请检查网络连接或稍后重试</p>
                            </div>
                        `;
                        toast('豆瓣榜单加载失败，请检查网络', 'error');
                    });
            }
            
            // 加载票房排行榜
            function loadBoxofficeList() {
                fetch('https://api.qhsou.com/api/qqys.php')
                    .then(response => response.json())
                    .then(data => {
                        boxofficeData = data;
                        displayBoxofficeList(data);
                    })
                    .catch(error => {
                        console.error('加载票房排行榜出错:', error);
                        boxofficeContainer.innerHTML = `
                            <div class="no-results">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h3>加载失败</h3>
                                <p>请检查网络连接或稍后重试</p>
                            </div>
                        `;
                        toast('票房榜单加载失败，请检查网络', 'error');
                    });
            }
            
            // 初始化加载豆瓣数据
            loadDoubanList();
            
            // 搜索功能绑定
            movieSearchBtn.addEventListener('click', performMovieSearch);
            movieSearchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') performMovieSearch();
            });

            // 全量影视搜索绑定
            fullFilmSearchBtn.addEventListener('click', performFullFilmSearch);
            fullFilmSearchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') performFullFilmSearch();
            });
            
            // 显示豆瓣排行榜
            function displayDoubanList(data) {
                if (data && data.length > 0) {
                    let html = '';
                    // 默认占位图，解决封面空白问题
                    const defaultPoster = 'https://via.placeholder.com/100x150/4361ee/ffffff?text=电影';
                    
                    data.forEach(movie => {
                        const mainName = movie.name.split('/')[0].trim();
                        
                        html += `
                            <div class="douban-item" data-name="${mainName}">
                                <img src="${movie.poster}" alt="${mainName}" class="douban-poster" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='${defaultPoster}'">
                                <div class="douban-info">
                                    <div class="douban-rank">TOP ${movie.rank}</div>
                                    <h3 class="douban-name">${mainName}</h3>
                                    <div class="douban-rating">
                                        <i class="fas fa-star"></i> ${movie.rating}
                                    </div>
                                    <p class="douban-quote">${movie.quote}</p>
                                </div>
                            </div>
                        `;
                    });
                    
                    doubanContainer.innerHTML = html;
                    
                    // 添加点击事件
                    document.querySelectorAll('.douban-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const movieName = this.getAttribute('data-name');
                            movieSearchInput.value = movieName;
                            performMovieSearch();
                            
                            tabs.forEach(t => t.classList.remove('active'));
                            tabContents.forEach(c => c.classList.remove('active'));
                            document.querySelector('[data-tab="movie-search"]').classList.add('active');
                            document.getElementById('movie-search').classList.add('active');
                        });
                    });
                } else {
                    doubanContainer.innerHTML = `
                        <div class="no-results">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>加载失败</h3>
                            <p>请检查网络连接或稍后重试</p>
                        </div>
                    `;
                }
            }
            
            // 显示票房排行榜
            function displayBoxofficeList(data) {
                if (data && data.movies && data.movies.length > 0) {
                    let html = '';
                    
                    data.movies.forEach(movie => {
                        html += `
                            <div class="boxoffice-item" data-name="${movie.movieName}">
                                <div class="boxoffice-rank">${movie.rank}</div>
                                <div class="boxoffice-info">
                                    <div class="boxoffice-name">${movie.movieName}</div>
                                    <div class="boxoffice-meta">
                                        <span class="boxoffice-year">${movie.releaseTime}</span>
                                        <span class="boxoffice-value">${movie.box} 亿</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    boxofficeContainer.innerHTML = html;
                    
                    // 添加点击事件
                    document.querySelectorAll('.boxoffice-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const movieName = this.getAttribute('data-name');
                            movieSearchInput.value = movieName;
                            performMovieSearch();
                            
                            tabs.forEach(t => t.classList.remove('active'));
                            tabContents.forEach(c => c.classList.remove('active'));
                            document.querySelector('[data-tab="movie-search"]').classList.add('active');
                            document.getElementById('movie-search').classList.add('active');
                        });
                    });
                } else {
                    boxofficeContainer.innerHTML = `
                        <div class="no-results">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>加载失败</h3>
                            <p>请检查网络连接或稍后重试</p>
                        </div>
                    `;
                }
            }
            
            // 影视搜索
            function performMovieSearch() {
                const query = movieSearchInput.value.trim();
                if (!query) {
                    toast('请输入搜索关键词', 'warning');
                    return;
                }
                
                movieSearchResults.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>正在搜索 "${query}"...</p>
                    </div>
                `;
                
                fetch(`https://api.qhsou.com/api/movie.php?wd=${encodeURIComponent(query)}`)
                    .then(response => response.json())
                    .then(data => {
                        movieSearchData = data;
                        displayMovieSearchResults(data);
                    })
                    .catch(error => {
                        console.error('搜索出错:', error);
                        movieSearchResults.innerHTML = `
                            <div class="no-results">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h3>搜索失败</h3>
                                <p>请检查网络连接或稍后重试</p>
                            </div>
                        `;
                        toast('搜索失败，请检查网络', 'error');
                    });
            }

            // 全量影视搜索
            function performFullFilmSearch() {
                const query = fullFilmSearchInput.value.trim();
                if (!query) {
                    toast('请输入搜索关键词', 'warning');
                    return;
                }
                
                fullFilmSearchResults.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>正在搜索 "${query}"...</p>
                    </div>
                `;
                
                fetch(`https://lengy.top/API/film_search.php?msg=${encodeURIComponent(query)}`)
                    .then(response => response.json())
                    .then(data => {
                        displayFullFilmSearchResults(data);
                    })
                    .catch(error => {
                        console.error('全量影视搜索出错:', error);
                        fullFilmSearchResults.innerHTML = `
                            <div class="no-results">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h3>搜索失败</h3>
                                <p>请检查网络连接或稍后重试</p>
                            </div>
                        `;
                        toast('搜索失败，请检查网络', 'error');
                    });
            }
            
            // 显示影视搜索结果
            function displayMovieSearchResults(data) {
                const defaultPoster = 'https://via.placeholder.com/70x95/4361ee/ffffff?text=电影';
                if (data.code === 1 && data.list && data.list.length > 0) {
                    const movies = data.list;
                    let html = '';
                    
                    movies.forEach(movie => {
                        const playUrls = movie.vod_play_url.split('$$$');
                        const playOptions = playUrls.map(url => {
                            const parts = url.split('$');
                            return {
                                quality: parts[0],
                                url: parts[1]
                            };
                        }).filter(item => item.url && item.url.startsWith('http'));
                        
                        let playButtons = '';
                        playOptions.forEach(option => {
                            playButtons += `
                                <button class="play-btn" data-url="${option.url}">
                                    <i class="fas fa-play"></i> ${option.quality}
                                </button>
                            `;
                        });
                        
                        let episodesHtml = '';
                        const isSeries = movie.vod_class && (movie.vod_class.includes('电视剧') || movie.vod_class.includes('动漫'));
                        
                        if (isSeries && playOptions.length > 0) {
                            episodesHtml = `
                                <div class="episodes-container">
                                    <div class="episodes-title">选集：</div>
                                    <div class="episodes-list">
                                        ${playOptions.map((option, index) => `
                                            <button class="episode-btn" data-url="${option.url}">
                                                第${index + 1}集
                                            </button>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }
                        
                        html += `
                            <div class="movie-card">
                                <div class="movie-header">
                                    <img src="${movie.vod_pic}" alt="${movie.vod_name}" class="movie-poster" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='${defaultPoster}'">
                                    <div class="movie-title-section">
                                        <h2 class="movie-title">${movie.vod_name}</h2>
                                        <p class="movie-subtitle">${movie.vod_sub}</p>
                                        <div class="movie-meta">
                                            <span class="meta-item"><i class="fas fa-calendar-alt"></i> ${movie.vod_year}</span>
                                            <span class="meta-item"><i class="fas fa-map-marker-alt"></i> ${movie.vod_area}</span>
                                            <span class="meta-item"><i class="fas fa-tags"></i> ${movie.type_name}</span>
                                            <span class="meta-item"><i class="fas fa-film"></i> ${movie.vod_class}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="movie-details">
                                    <p class="movie-description">${movie.vod_blurb}</p>
                                    <p class="director-list"><strong>导演：</strong>${movie.vod_director}</p>
                                    <p class="actor-list"><strong>主演：</strong>${movie.vod_actor}</p>
                                </div>
                                <div class="play-section">
                                    ${episodesHtml}
                                    <div class="play-options">
                                        ${playButtons}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    movieSearchResults.innerHTML = html;
                    
                    // 添加播放事件
                    document.querySelectorAll('#movie-search .play-btn, #movie-search .episode-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const videoUrl = this.getAttribute('data-url');
                            currentPlayBtn = this;
                            playVideo(videoUrl);
                        });
                    });
                } else {
                    movieSearchResults.innerHTML = `
                        <div class="no-results">
                            <i class="fas fa-search"></i>
                            <h3>未找到相关影片</h3>
                            <p>请尝试使用其他关键词搜索</p>
                        </div>
                    `;
                    toast('未找到相关影片，请换个关键词试试', 'warning');
                }
            }

            // 显示全量影视搜索结果
            function displayFullFilmSearchResults(data) {
                const defaultPoster = 'https://via.placeholder.com/70x95/4361ee/ffffff?text=电影';
                if (data.code === 0 && data.data && data.data.length > 0) {
                    const movies = data.data;
                    let html = '';
                    
                    movies.forEach(movie => {
                        // 严格过滤有效播放源：有tag、有http开头的有效链接
                        const validVideos = movie.video_list.filter(item => {
                            const hasValidUrl = (item.m3u8 && item.m3u8.startsWith('http')) || (item.mp4 && item.mp4.startsWith('http'));
                            return item.tag && hasValidUrl;
                        });
                        
                        let playButtons = '';
                        validVideos.forEach(option => {
                            const videoUrl = option.m3u8 || option.mp4;
                            playButtons += `
                                <button class="play-btn" data-url="${videoUrl}">
                                    <i class="fas fa-play"></i> ${option.tag}
                                </button>
                            `;
                        });
                        
                        let episodesHtml = '';
                        const isSeries = validVideos.length > 1;
                        
                        if (isSeries) {
                            episodesHtml = `
                                <div class="episodes-container">
                                    <div class="episodes-title">选集：</div>
                                    <div class="episodes-list">
                                        ${validVideos.map((option) => {
                                            const videoUrl = option.m3u8 || option.mp4;
                                            return `
                                                <button class="episode-btn" data-url="${videoUrl}">
                                                    ${option.tag}
                                                </button>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `;
                        }
                        
                        // 处理评分显示
                        const scoreHtml = movie.douban_score && movie.douban_score !== "0.0" ? 
                            `<div class="douban-rating" style="margin-top: 4px;">
                                <i class="fas fa-star"></i> ${movie.douban_score}
                            </div>` : '';
                        
                        html += `
                            <div class="movie-card">
                                <div class="movie-header">
                                    <img src="${movie.cover}" alt="${movie.title}" class="movie-poster" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='${defaultPoster}'">
                                    <div class="movie-title-section">
                                        <h2 class="movie-title">${movie.title}</h2>
                                        ${scoreHtml}
                                        <div class="movie-meta" style="margin-top: 8px;">
                                            <span class="meta-item"><i class="fas fa-calendar-alt"></i> ${movie.publish_date || '未知'}</span>
                                            <span class="meta-item"><i class="fas fa-map-marker-alt"></i> ${movie.publish_area || '未知'}</span>
                                            <span class="meta-item"><i class="fas fa-language"></i> ${movie.language || '未知'}</span>
                                            <span class="meta-item"><i class="fas fa-film"></i> ${movie.class || '未知'}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="movie-details">
                                    <p class="movie-description">${movie.desc || movie.content || '暂无简介'}</p>
                                    ${movie.director ? `<p class="director-list"><strong>导演：</strong>${movie.director}</p>` : ''}
                                    ${movie.writer ? `<p class="director-list"><strong>编剧：</strong>${movie.writer}</p>` : ''}
                                    ${movie.actor ? `<p class="actor-list"><strong>主演：</strong>${movie.actor}</p>` : ''}
                                </div>
                                <div class="play-section">
                                    ${episodesHtml}
                                    <div class="play-options">
                                        ${playButtons}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    fullFilmSearchResults.innerHTML = html;
                    
                    // 添加播放事件
                    document.querySelectorAll('#full-film-search .play-btn, #full-film-search .episode-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const videoUrl = this.getAttribute('data-url');
                            currentPlayBtn = this;
                            playVideo(videoUrl);
                        });
                    });
                } else {
                    fullFilmSearchResults.innerHTML = `
                        <div class="no-results">
                            <i class="fas fa-search"></i>
                            <h3>未找到相关影片</h3>
                            <p>请尝试使用其他关键词搜索</p>
                        </div>
                    `;
                    toast('未找到相关影片，请换个关键词试试', 'warning');
                }
            }
            
            // 播放视频函数
            function playVideo(url) {
                if (!url) {
                    toast('视频链接无效，无法播放', 'error');
                    return;
                }
                
                fullscreenPlayer.classList.add('active');
                fullscreenVideo.src = url;
                
                fullscreenVideo.play().catch(error => {
                    console.error('播放失败:', error);
                    toast('视频播放失败，请尝试其他播放源', 'error');
                    if (currentPlayBtn) {
                        currentPlayBtn.classList.add('disabled');
                    }
                });
                
                document.querySelector('.player-title').textContent = '视频播放器';
            }
        });
    </script>
</body>
</html>
