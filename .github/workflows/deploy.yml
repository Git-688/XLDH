# 文件名：.github/workflows/deploy.yml
# 作用：定义 GitHub Actions 自动化流程，实现代码推送后自动部署

name: Deploy to Cloudflare Pages       # 工作流名称

on:
  push:
    branches:
      - main          # 当 main 分支有推送时触发
  workflow_dispatch:  # 允许在 GitHub 网页中手动触发

jobs:
  lint-and-build:                      # 作业名
    runs-on: ubuntu-latest             # 运行环境

    steps:
      # 步骤1：检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4      # 使用官方 checkout 动作

      # 步骤2：安装 Node.js 环境
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'           # 指定 Node 版本

      # 步骤3：安装项目依赖（根据 package.json）
      - name: 安装依赖
        run: npm install                   # ci 比 install 更快且严格

      # 步骤4：运行 ESLint 代码检查
      - name: 运行 ESLint 代码检查
        run: npm run lint             # 执行 package.json 中的 lint 命令

      # 步骤5：构建压缩静态资源
      - name: 压缩 HTML/CSS/JS
        run: npm run build            # 执行 build 命令，生成最小化文件

      # 步骤6：部署到 Cloudflare Pages
      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3   # 官方 Wrangler 动作
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=xjdh-navigation --branch=main

