<script>
    (function() {
        try {
            const theme = localStorage.getItem('starlink_theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            } else if (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark-mode');
            }
            // 如果 theme 为 'light' 或不存在，保持默认（无 dark-mode 类）
        } catch (e) {}
    })();
</script>
